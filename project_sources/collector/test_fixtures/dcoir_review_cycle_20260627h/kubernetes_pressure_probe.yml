apiVersion: v1
kind: Pod
metadata:
  name: dcoir-review-pressure
spec:
  hostNetwork: true
  containers:
    - name: collector
      image: example.invalid/collector:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsUser: 0
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
