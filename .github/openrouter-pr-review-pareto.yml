# Governed OpenRouter PR Review configuration for DCOIR-Collector/dcoir-collector.
# This production config is used by .github/workflows/openrouter-pr-review.yml
# through scripts/openrouter_pr_review_pareto_context.py.

commands:
  - /or-review
  - /openrouter-review
  - /dcoir-review

# Use OpenRouter Pareto Code as the governed coding-review default so the
# review gate gets a coding-model quality floor without pinning one provider.
model: openrouter/pareto-code
model_stack:
  - openrouter/pareto-code
  - openrouter/auto
smoke_test_free_model: false

# Pareto Router plugin controls. Higher min_coding_score values require
# stronger coding models. OpenRouter currently maps >= 0.66 to its high tier.
pareto_min_coding_score: 0.80

# Auto Router remains only as a secondary fallback.
# OpenRouter Auto Router allowed_models uses documented model patterns:
# https://openrouter.ai/docs/guides/routing/routers/auto-router#pattern-syntax
# Keep the list narrow and coding-focused instead of allowing broad family globs.
auto_cost_quality_tradeoff: 2
auto_allowed_models:
  - anthropic/claude-sonnet*
  - openai/gpt-5*
  - google/gemini-2.5-pro*
  - google/gemini-3.1-pro-preview*
  - qwen/qwen3-coder*
  - deepseek/deepseek-v3*

# Keep native OpenRouter fallback, route, and service-tier controls unset here.
# The governed model_stack above owns the explicit model fallback order.
fallback_models:

openrouter_route:
openrouter_service_tier:
openrouter_session_id_prefix: dcoir-openrouter-pr-review

max_prompt_chars: 60000
max_files: 30
max_inline_comments: 12

# First successful governed review after this wrapper is in use gets broader
# changed-file context. Later reruns stay diff-focused unless requested.
first_pass_deep_review: true
deep_review_max_files: 8
deep_review_max_file_chars: 12000
deep_review_max_total_chars: 24000

request_changes_on_findings: false
minimum_confidence: 0.70
fail_on_unanchored_findings: true
fail_on_summary_only_problem: true

risk_sentinel_quality_gate: true
risk_sentinel_retry_on_empty: true
risk_sentinel_max_anchors: 12

post_summary_when_findings: false
include_confidence: false
redact_secret_literals: true

openrouter_max_attempts: 4
openrouter_retry_max_seconds: 45
script_timeout_seconds: 1500
post_progress_comment: true

ignored_providers:

validation_commands:
  - python3 scripts/openrouter_pr_review_pareto_context_selftest.py
  - python3 scripts/openrouter_pr_review_hardened_selftest.py
  # Requires a real git checkout for full changed-file discovery; extracted
  # workspaces may only exercise this as a smoke check.
  - bash scripts/validate-codex-local.sh
  - pwsh -NoProfile -File scripts/validate-windows-powershell-51.ps1 -AllowPowerShell7 -AllowEmpty
  - python3 scripts/validate-codeql-security-workflow.py

guidance_files:
  - AGENTS.md
  - docs/review/codex-pr-review-playbook.md
  - README.md

allowed_authors:
  - malwaredevil

ignored_authors:
  - github-actions[bot]
  - dependabot[bot]
  - chatgpt-codex-connector[bot]
