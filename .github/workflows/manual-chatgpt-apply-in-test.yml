name: manual-chatgpt-apply-in-test

on:
  workflow_dispatch:
    inputs:
      apply_manifest_path:
        description: "Repo-relative apply_manifest.json under chatgpt_staging/in/"
        required: true
        default: "chatgpt_staging/in/test_apply_001/apply_manifest.json"
        type: string
      commit_changes:
        description: "Commit applied file changes"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: manual-chatgpt-apply-in-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-in:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and apply test bundle
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST='${{ inputs.apply_manifest_path }}'

          if [[ "$MANIFEST" != chatgpt_staging/in/*/apply_manifest.json ]]; then
            echo "Manifest must match chatgpt_staging/in/<request_id>/apply_manifest.json" >&2
            exit 1
          fi
          if [[ ! -f "$MANIFEST" ]]; then
            echo "Apply manifest not found: $MANIFEST" >&2
            exit 1
          fi

          python - "$MANIFEST" <<'PY'
          import json, pathlib, shutil, sys

          manifest_path = pathlib.Path(sys.argv[1])
          base_dir = manifest_path.parent
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          allowed_roots = manifest.get("allowed_roots") or ["chatgpt_staging/testdata/"]

          def safe_rel(path: str) -> bool:
              if path.startswith("/") or ".." in pathlib.PurePosixPath(path).parts:
                  return False
              return any(path == root.rstrip("/") or path.startswith(root) for root in allowed_roots)

          applied = []
          for item in manifest.get("files", []):
              target = item.get("path", "")
              source = item.get("source", "")
              if not safe_rel(target):
                  raise SystemExit(f"Unsafe or disallowed target path: {target}")
              if not source or source.startswith("/") or ".." in pathlib.PurePosixPath(source).parts:
                  raise SystemExit(f"Unsafe source path: {source}")
              src_path = base_dir / source
              if not src_path.is_file():
                  raise SystemExit(f"Source file missing: {src_path}")
              dst_path = pathlib.Path(target)
              dst_path.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src_path, dst_path)
              applied.append(target)

          if not applied:
              raise SystemExit("No files applied")

          out = pathlib.Path("chatgpt_staging/apply_reports")
          out.mkdir(parents=True, exist_ok=True)
          report = out / f"{manifest.get('request_id', 'unknown')}_apply_report.md"
          report.write_text("# ChatGPT apply-in test report\n\n" + "\n".join(f"- applied: `{p}`" for p in applied) + "\n", encoding="utf-8")
          PY

      - name: Commit applied changes
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chatgpt_staging/testdata/source chatgpt_staging/apply_reports
          git commit -m "Apply ChatGPT staging lane test bundle" || exit 0
          git push
