# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-validate-gemini-production-like-harness-0001
# Purpose:
# - Validate the #179 production-like Gemini Agent behavioral harness, blind scenario prompt boundaries, stored-artifact boundaries, and manifest-based construct loading.
# Use when:
# - Use on PR/push when Gemini harness tools, blind scenarios, committed sanitized fixture trees, Gemini bundle source, maintained knowledge, or harness workflows change.
# Do not use when:
# - Do not treat this as proof of live Gemini behavior; manual live replay artifacts remain separate evidence.
# Result semantics:
# - Workflow success means the harness produced trustworthy static/construct evidence. Behavior success is reported separately and may be not_scored when no live/deterministic model replay ran.
# Trigger model:
# - push and pull_request on Gemini harness tools, blind fixtures, collector blind fixtures, Gemini bundle source, maintained knowledge, workflow path, and .gitignore; workflow_dispatch with harness depth inputs.
# Required inputs:
# - harness_mode and require_stored_artifacts when manually dispatched.
# Required secrets/config:
# - none
# Runtime dependencies:
# - Uses project_sources/gemini/tools/validate_gemini_production_like_harness.py, blind fixture trees, Gemini bundle source, and maintained knowledge files.
# Expected outputs/readback:
# - Production-like harness output, validation artifacts, chatgpt-workflow-report-section artifact, and repo-workflows report.
# Safety notes:
# - Do not treat static/construct harness success as proof of live Gemini behavior.
# Maintenance notes:
# - Keep harness inputs, path filters, artifact names, and report-section behavior aligned with the workflow inventory and production-like harness contract.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: validate-gemini-production-like-harness

on:
  push:
    paths:
      - 'project_sources/gemini/tools/validate_gemini_production_like_harness.py'
      - 'project_sources/gemini/fixtures/behavioral_replay/blind/**'
      - '!project_sources/gemini/fixtures/behavioral_replay/blind_artifacts/**'
      - 'project_sources/gemini/fixtures/behavioral_replay/blind_artifacts/collector_fixture179_t2_sanitized/**'
      - 'project_sources/collector/fixtures/blind/**'
      - '!project_sources/collector/fixtures/blind_artifacts/**'
      - 'project_sources/gemini/bundle_source/**'
      - 'knowledge/Knowledge - *.md'
      - 'knowledge/README.md'
      - '.github/workflows/validate-gemini-production-like-harness.yml'
      - '.gitignore'
  pull_request:
    paths:
      - 'project_sources/gemini/tools/validate_gemini_production_like_harness.py'
      - 'project_sources/gemini/fixtures/behavioral_replay/blind/**'
      - '!project_sources/gemini/fixtures/behavioral_replay/blind_artifacts/**'
      - 'project_sources/gemini/fixtures/behavioral_replay/blind_artifacts/collector_fixture179_t2_sanitized/**'
      - 'project_sources/collector/fixtures/blind/**'
      - '!project_sources/collector/fixtures/blind_artifacts/**'
      - 'project_sources/gemini/bundle_source/**'
      - 'knowledge/Knowledge - *.md'
      - 'knowledge/README.md'
      - '.github/workflows/validate-gemini-production-like-harness.yml'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      harness_mode:
        description: Harness depth to run
        required: true
        default: medium
        type: choice
        options:
          - light
          - medium
          - full
      require_stored_artifacts:
        description: Fail if ignored/operator-supplied stored artifacts are missing
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: validate-gemini-production-like-harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_harness:
    uses: ./.github/workflows/reusable-validate-gemini-production-like-harness.yml
    permissions:
      contents: read
    with:
      caller_event_name: ${{ github.event_name }}
      harness_mode: ${{ inputs.harness_mode || 'medium' }}
      require_stored_artifacts: ${{ github.event_name == 'workflow_dispatch' && inputs.require_stored_artifacts || false }}
