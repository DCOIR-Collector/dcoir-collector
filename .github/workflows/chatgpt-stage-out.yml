# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-staging_lane-chatgpt-stage-out-0004
# Purpose:
# - Stage a reviewed output bundle from a request JSON into chatgpt_staging/out for ChatGPT/operator download and readback.
# Use when:
# - Use when GitHub Actions should produce a ChatGPT-readable outbound package from an approved staging request.
# Do not use when:
# - Do not use for arbitrary repo source edits or for payload application; use chatgpt-apply-in for inbound repo updates.
# Trigger model:
# - workflow_dispatch inputs: request_path, commit_outputs; push branches: main paths: chatgpt_staging/requests/*.json
# Required inputs:
# - request_path: Repo-relative request JSON under chatgpt_staging/requests/ default=chatgpt_staging/requests/request.json; commit_outputs: Commit generated out bundle into chatgpt_staging/out/ default=true
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Requires request JSON under chatgpt_staging/requests/ and staging scripts referenced by the workflow.
# Expected outputs/readback:
# - Generated output bundle under chatgpt_staging/out/ and status reports under chatgpt_staging/status_reports/chatgpt-stage-out/.
# Safety notes:
# - Only operate on approved request paths; clean generated outputs through the cleanup lane after readback.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: chatgpt-stage-out

on:
  workflow_dispatch:
    inputs:
      request_path:
        description: "Repo-relative request JSON under chatgpt_staging/requests/"
        required: true
        default: "chatgpt_staging/requests/request.json"
        type: string
      commit_outputs:
        description: "Commit generated out bundle into chatgpt_staging/out/"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - "chatgpt_staging/requests/*.json"

permissions:
  contents: write

concurrency:
  group: chatgpt-stage-out-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stage-out:
    uses: ./.github/workflows/reusable-chatgpt-stage-out.yml
    permissions:
      contents: write
    with:
      caller_event_name: ${{ github.event_name }}
      request_path: ${{ inputs.request_path || 'chatgpt_staging/requests/request.json' }}
      commit_outputs: ${{ github.event_name != 'workflow_dispatch' || inputs.commit_outputs }}
