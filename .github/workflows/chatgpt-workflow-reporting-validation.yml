# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-chatgpt-workflow-reporting-validation-0006
# Purpose:
# - Validate the repo-wide workflow reporting path, including success and deliberate failure report behavior.
# Use when:
# - Use after changes to workflow reporting, report writer scripts, or reporter allowlist behavior.
# Do not use when:
# - Do not use as a general workflow health check; it intentionally supports a failure scenario.
# Trigger model:
# - workflow_dispatch inputs: scenario, debug_marker, upload_artifact
# Required inputs:
# - scenario: Validation scenario to run default=success; debug_marker: Marker text to include in logs for ChatGPT report readback default=CHATGPT_REPORTING_VALIDATION_MARKER; upload_artifact: Upload a small validation artifact default=true
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses .github/scripts/write_workflow_report.py indirectly through the reporter workflow and optional validation artifact upload.
# Expected outputs/readback:
# - Reporter-generated repo-workflows report and optional artifact.
# Safety notes:
# - The failure scenario is expected to fail; judge success by the reporter readback, not only the source workflow conclusion.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: chatgpt-workflow-reporting-validation

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Validation scenario to run"
        required: true
        default: success
        type: choice
        options:
          - success
          - failure
      debug_marker:
        description: "Marker text to include in logs for ChatGPT report readback"
        required: true
        default: CHATGPT_REPORTING_VALIDATION_MARKER
        type: string
      upload_artifact:
        description: "Upload a small validation artifact"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  CHATGPT_VALIDATION_SCENARIO: ${{ github.event.inputs.scenario }}
  CHATGPT_VALIDATION_MARKER: ${{ github.event.inputs.debug_marker }}

concurrency:
  group: chatgpt-workflow-reporting-validation-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  validate-reporting-path:
    name: Validate ChatGPT workflow reporting path
    runs-on: ubuntu-latest
    steps:
      - name: Emit validation context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p validation_artifacts
          {
            echo "scenario=${CHATGPT_VALIDATION_SCENARIO}"
            echo "marker=${CHATGPT_VALIDATION_MARKER}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
          } | tee validation_artifacts/chatgpt_reporting_validation_context.txt

      - name: Success scenario
        if: ${{ github.event.inputs.scenario == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${CHATGPT_VALIDATION_MARKER}: success scenario reached"
          echo "This run is expected to complete successfully and produce a success report via the central reporter."

      - name: Deliberate failure scenario with bounded debug signal
        if: ${{ github.event.inputs.scenario == 'failure' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${CHATGPT_VALIDATION_MARKER}: expected deliberate failure begins"
          echo "CHATGPT_EXPECTED_FAILURE_CLASS=repo-wide-workflow-reporting-validation"
          echo "CHATGPT_EXPECTED_FAILURE_REASON=Intentional failure used to verify that workflow_report.md embeds bounded debug logs."
          echo "CHATGPT_EXPECTED_NEXT_ACTION=Confirm central reporter captured this marker and failure reason without operator screenshots or pasted logs."
          echo "::error title=Intentional ChatGPT reporting validation failure::This failure is expected and should appear in the central workflow_report.md debug excerpt."
          exit 42

      - name: Write post-scenario artifact note
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "ChatGPT workflow reporting validation artifact"
            echo "scenario=${CHATGPT_VALIDATION_SCENARIO}"
            echo "marker=${CHATGPT_VALIDATION_MARKER}"
            echo "result is determined by the workflow conclusion"
          } > validation_artifacts/chatgpt_reporting_validation_artifact.txt

      - name: Upload validation artifact
        if: ${{ always() && github.event.inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-workflow-reporting-validation-${{ github.event.inputs.scenario }}
          path: validation_artifacts/**
          if-no-files-found: warn
          retention-days: 7
