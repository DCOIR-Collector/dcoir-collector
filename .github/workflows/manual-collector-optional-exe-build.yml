# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-build_package-manual-collector-optional-exe-build-0011
# Purpose:
# - Build the optional collector EXE variant and validate it with a selected harness suite.
# Use when:
# - Use when an optional EXE artifact is needed for operator testing or release assessment.
# Do not use when:
# - Do not use for the standard collector runtime package; use manual-collector-runtime-package-build.
# Trigger model:
# - workflow_dispatch inputs: package_version_override, exe_validation_suite, skip_ps2exe_install
# Required inputs:
# - package_version_override: Optional package version override forwarded to the PS1 package builder default=; exe_validation_suite: Harness suite to run against the produced optional EXE default=Core; skip_ps2exe_install: Fail if PS2EXE is not already available instead of acquiring it for the build default=false
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses collector runtime packaging scripts, harness assembly parity, PS2EXE availability/acquisition, and collector harness suites.
# Expected outputs/readback:
# - Optional EXE package artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Treat PS2EXE acquisition and selected suite as explicit inputs; do not claim full regression unless FullRegression is selected and passes.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: manual-collector-optional-exe-build

on:
  workflow_dispatch:
    inputs:
      package_version_override:
        description: Optional package version override forwarded to the PS1 package builder
        required: false
        default: ''
        type: string
      exe_validation_suite:
        description: Harness suite to run against the produced optional EXE
        required: true
        default: Core
        type: choice
        options:
          - Core
          - Retrieval
          - QuickAliases
          - SessionBehavior
          - TargetedCollection
          - ChunkingOversizeArtifact
          - ChunkingReconstructionMetadata
          - MajorVersion
          - FailureGates
          - FullRegression
      skip_ps2exe_install:
        description: Fail if PS2EXE is not already available instead of acquiring it for the build
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-collector-optional-exe-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_optional_exe_variant:
    uses: ./.github/workflows/reusable-manual-collector-optional-exe-build.yml
    permissions:
      contents: read
    with:
      caller_event_name: ${{ github.event_name }}
      package_version_override: ${{ inputs.package_version_override || '' }}
      exe_validation_suite: ${{ inputs.exe_validation_suite || 'Core' }}
      skip_ps2exe_install: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_ps2exe_install || false }}
