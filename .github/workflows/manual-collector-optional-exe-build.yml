# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-build_package-manual-collector-optional-exe-build-0011
# Purpose:
# - Build the optional collector EXE variant and validate it with a selected harness suite.
# Use when:
# - Use when an optional EXE artifact is needed for operator testing or release assessment.
# Do not use when:
# - Do not use for the standard collector runtime package; use manual-collector-runtime-package-build.
# Trigger model:
# - workflow_dispatch inputs: package_version_override, exe_validation_suite, skip_ps2exe_install
# Required inputs:
# - package_version_override: Optional package version override forwarded to the PS1 package builder default=; exe_validation_suite: Harness suite to run against the produced optional EXE default=Core; skip_ps2exe_install: Fail if PS2EXE is not already available instead of acquiring it for the build default=false
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses collector runtime packaging scripts, harness assembly parity, PS2EXE availability/acquisition, and collector harness suites.
# Expected outputs/readback:
# - Optional EXE package artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Treat PS2EXE acquisition and selected suite as explicit inputs; do not claim full regression unless FullRegression is selected and passes.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: manual-collector-optional-exe-build

on:
  workflow_dispatch:
    inputs:
      package_version_override:
        description: Optional package version override forwarded to the PS1 package builder
        required: false
        default: ''
        type: string
      exe_validation_suite:
        description: Harness suite to run against the produced optional EXE
        required: true
        default: Core
        type: choice
        options:
          - Core
          - Retrieval
          - QuickAliases
          - SessionBehavior
          - TargetedCollection
          - ChunkingOversizeArtifact
          - ChunkingReconstructionMetadata
          - MajorVersion
          - FailureGates
          - FullRegression
      skip_ps2exe_install:
        description: Fail if PS2EXE is not already available instead of acquiring it for the build
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-collector-optional-exe-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_optional_exe_variant:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      PACKAGE_VERSION_OVERRIDE: ${{ github.event.inputs.package_version_override }}
      EXE_VALIDATION_SUITE: ${{ github.event.inputs.exe_validation_suite }}
      SKIP_PS2EXE_INSTALL: ${{ github.event.inputs.skip_ps2exe_install }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify checkout and FailureGates EXE harness patch
        shell: pwsh
        run: |
          $head = git rev-parse HEAD
          Write-Host "CHECKED_OUT_COMMIT=$head"
          $harnessPath = 'project_sources/collector/harness/run_DCOIR_Tests.ps1'
          if (-not (Test-Path -LiteralPath $harnessPath)) {
            throw "Harness source not found: $harnessPath"
          }
          $harnessText = Get-Content -LiteralPath $harnessPath -Raw
          $hasPatch = $harnessText.Contains('Observed expected executable nonzero reject behavior for bind-reject gate.')
          Write-Host "FAILUREGATES_EXE_PATTERN_RELAX_PRESENT=$hasPatch"
          if ($env:EXE_VALIDATION_SUITE -eq 'FailureGates' -and -not $hasPatch) {
            throw 'FailureGates EXE harness patch is missing from checked-out source.'
          }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = @(
            'project_sources/collector/tools/build_dcoir_collector_runtime_package.py',
            'project_sources/collector/tools/validate_dcoir_collector_runtime_package.py',
            'project_sources/collector/tools/compile_dcoir_collector_runtime.py',
            'project_sources/collector/tools/build_dcoir_collector_optional_exe_variant.py',
            'project_sources/collector/tools/restore_dcoir_collector_runtime_zip.py'
          )
          foreach ($file in $pyFiles) {
            if (-not (Test-Path -LiteralPath $file)) {
              throw "Required Python build file missing: $file"
            }
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              throw "Python syntax validation failed: $file"
            }
          }

      - name: Verify collector harness assembly parity
        shell: pwsh
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\project_sources\collector\harness\assemble_run_DCOIR_Tests.ps1 -OutputPath .\project_sources\collector\harness\run_DCOIR_Tests.generated.ps1 -ExpectedHarnessPath .\project_sources\collector\harness\run_DCOIR_Tests.ps1
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector harness assembly parity validation failed.'
          }

      - name: Normalize FailureGates EXE runtime-error guard
        if: ${{ github.event.inputs.exe_validation_suite == 'FailureGates' || github.event.inputs.exe_validation_suite == 'FullRegression' }}
        shell: pwsh
        run: |
          $path = 'project_sources/collector/harness/run_DCOIR_Tests.ps1'
          $text = Get-Content -LiteralPath $path -Raw
          $old = '$observedExecutableRuntimeReject = $script:ResolvedCollectorInvocationMode -eq ''Executable'' -and $exitCode -ne 0'
          $new = '$observedExecutableRuntimeReject = $script:ResolvedCollectorInvocationMode -eq ''Executable'''
          if ($text.Contains($old)) {
            $text = $text.Replace($old, $new)
            Set-Content -LiteralPath $path -Value $text -Encoding UTF8
            Write-Host 'FAILUREGATES_EXE_RUNTIME_ERROR_GUARD_NORMALIZED=True'
          } elseif ($text.Contains($new)) {
            Write-Host 'FAILUREGATES_EXE_RUNTIME_ERROR_GUARD_NORMALIZED=AlreadyPresent'
          } else {
            throw 'Unable to find expected FailureGates EXE guard line.'
          }

      - name: Validate PowerShell source syntax
        shell: pwsh
        run: |
          $psFiles = @(
            'project_sources/collector/source/DCOIR_Collector.ps1',
            'project_sources/collector/harness/run_DCOIR_Tests.ps1'
          )
          if (Test-Path -LiteralPath 'project_sources/collector/source/parts') {
            $psFiles += Get-ChildItem -Path 'project_sources/collector/source/parts' -File -Filter '*.ps1' | ForEach-Object { $_.FullName }
          }
          foreach ($file in $psFiles) {
            if (-not (Test-Path -LiteralPath $file)) {
              throw "Required PowerShell file missing: $file"
            }
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              throw "PowerShell syntax validation failed: $($file): $messages"
            }
          }

      - name: Build optional EXE variant from compiled collector runtime with embedded tools
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_optional_exe -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_optional_exe | Out-Null
          $cmd = @(
            'python',
            'project_sources/collector/tools/build_dcoir_collector_optional_exe_variant.py',
            '--source-dir', '.',
            '--output-dir', 'project_sources/validation/out_optional_exe',
            '--embedded-tools-source-zip', 'supporting_assets/DCOIR_Collector.zip'
          )
          if (-not [string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION_OVERRIDE)) {
            $cmd += @('--version', $env:PACKAGE_VERSION_OVERRIDE)
          }
          if ($env:SKIP_PS2EXE_INSTALL -eq 'true') {
            $cmd += '--skip-ps2exe-install'
          }
          & $cmd[0] $cmd[1..($cmd.Count - 1)]
          if ($LASTEXITCODE -ne 0) {
            throw 'Optional collector EXE variant build failed.'
          }
          $exe = Get-ChildItem -LiteralPath project_sources/validation/out_optional_exe/optional_exe_variant -File -Filter '*.exe' | Select-Object -First 1
          if (-not $exe) {
            throw 'Optional EXE artifact was not produced.'
          }
          $payloadManifest = 'project_sources/validation/out_optional_exe/optional_exe_variant/embedded_tool_payload_manifest.json'
          if (-not (Test-Path -LiteralPath $payloadManifest)) {
            throw 'Embedded tool payload manifest was not produced beside the optional EXE.'
          }
          Write-Host "OPTIONAL_EXE_PATH=$($exe.FullName)"
          $deliveryZip = Get-ChildItem -Path project_sources/validation/out_optional_exe -File -Filter 'DCOIR_Collector_Delivery_Package_*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $deliveryZip) {
            throw 'Collector delivery package zip was not produced for optional EXE harness validation.'
          }
          python project_sources/collector/tools/restore_dcoir_collector_runtime_zip.py --delivery-package-zip $deliveryZip.FullName --base-runtime-zip supporting_assets/DCOIR_Collector.zip --output-dir project_sources/validation/out_optional_exe --output-name DCOIR_Collector_optional_exe_runtime_for_harness.zip
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime zip restore bridge failed for optional EXE harness validation.'
          }
          $harnessOutputRoot = Resolve-Path project_sources/validation/out_optional_exe
          "OPTIONAL_EXE_PATH=$($exe.FullName)" | Add-Content -Path $env:GITHUB_ENV
          "OPTIONAL_EXE_RUNTIME_ZIP=$((Resolve-Path project_sources/validation/out_optional_exe/DCOIR_Collector_optional_exe_runtime_for_harness.zip).Path)" | Add-Content -Path $env:GITHUB_ENV
          "OPTIONAL_EXE_HARNESS_OUTPUT_ROOT=$($harnessOutputRoot.Path)\exe_harness_results" | Add-Content -Path $env:GITHUB_ENV

      - name: Run selected harness suite against optional EXE variant
        shell: pwsh
        working-directory: project_sources
        run: |
          $suite = $env:EXE_VALIDATION_SUITE
          if ([string]::IsNullOrWhiteSpace($suite)) { $suite = 'Core' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\harness\run_DCOIR_Tests.ps1 -CollectorPath $env:OPTIONAL_EXE_PATH -CollectorInvocationMode Executable -Suite $suite -MasterZipPath $env:OPTIONAL_EXE_RUNTIME_ZIP -OutputRoot $env:OPTIONAL_EXE_HARNESS_OUTPUT_ROOT
          if ($LASTEXITCODE -ne 0) {
            throw "Optional EXE variant harness suite failed: $suite"
          }

      - name: Upload optional EXE variant artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: optional-collector-exe-variant
          path: |
            project_sources/validation/out_optional_exe/build_dcoir_collector_optional_exe_variant_report.json
            project_sources/validation/out_optional_exe/DCOIR_Collector_Delivery_Package_*.zip
            project_sources/validation/out_optional_exe/optional_exe_variant/**
            project_sources/validation/out_optional_exe/exe_harness_results/**
          if-no-files-found: warn
          retention-days: 14

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Optional EXE build summary

          - workflow: manual-collector-optional-exe-build
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - package_version_override: $env:PACKAGE_VERSION_OVERRIDE
          - exe_validation_suite: $env:EXE_VALIDATION_SUITE
          - skip_ps2exe_install: $env:SKIP_PS2EXE_INSTALL
          - primary_artifact: optional-collector-exe-variant
          - artifact_note: includes the optional EXE, delivery package, embedded-tool manifest, and selected harness results when produced.

          The workflow conclusion is the authoritative pass/fail signal. Treat the selected harness suite as the validation boundary for readiness claims.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
