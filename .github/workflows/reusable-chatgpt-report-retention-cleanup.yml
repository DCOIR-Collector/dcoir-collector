# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: chatgpt-report-retention-cleanup.yml
# Purpose: reusable implementation module for chatgpt-report-retention-cleanup; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Chatgpt Report Retention Cleanup
run-name: Module Chatgpt Report Retention Cleanup | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
      dry_run:
        description: Forwarded `dry_run` input from the entry workflow.
        required: false
        type: boolean
        default: false
      success_days:
        description: Forwarded `success_days` input from the entry workflow.
        required: false
        type: string
        default: '1'
      failure_days:
        description: Forwarded `failure_days` input from the entry workflow.
        required: false
        type: string
        default: '7'
      cleanup_days:
        description: Forwarded `cleanup_days` input from the entry workflow.
        required: false
        type: string
        default: '2'
      request_days:
        description: Forwarded `request_days` input from the entry workflow.
        required: false
        type: string
        default: '1'
      bundle_days:
        description: Forwarded `bundle_days` input from the entry workflow.
        required: false
        type: string
        default: '2'
      workflow_filter:
        description: Forwarded `workflow_filter` input from the entry workflow.
        required: false
        type: string
        default: ''
    outputs: {}
    secrets: {}

permissions:
  contents: write
jobs:
  cleanup-reports:
    name: Cleanup ChatGPT staging retention surfaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'

      - name: Set up Python runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          python-version: '3.11'

      - name: Build retention cleanup plan
        shell: bash
        run: |
          set -euo pipefail
          DRY_RUN="false"
          SUCCESS_DAYS="1"
          FAILURE_DAYS="7"
          CLEANUP_DAYS="2"
          REQUEST_DAYS="1"
          BUNDLE_DAYS="2"
          WORKFLOW_FILTER=""
          if [[ "${{ inputs.caller_event_name }}" == "workflow_dispatch" ]]; then
            DRY_RUN="${{ inputs.dry_run }}"
            SUCCESS_DAYS="${{ inputs.success_days }}"
            FAILURE_DAYS="${{ inputs.failure_days }}"
            CLEANUP_DAYS="${{ inputs.cleanup_days }}"
            REQUEST_DAYS="${{ inputs.request_days }}"
            BUNDLE_DAYS="${{ inputs.bundle_days }}"
            WORKFLOW_FILTER="${{ inputs.workflow_filter }}"
          fi
          mkdir -p .github/tmp
          ARGS=(cleanup --success-days "$SUCCESS_DAYS" --failure-days "$FAILURE_DAYS" --cleanup-days "$CLEANUP_DAYS" --request-days "$REQUEST_DAYS" --bundle-days "$BUNDLE_DAYS" --workflow-filter "$WORKFLOW_FILTER" --removed-paths-file .github/tmp/chatgpt_report_cleanup_removed.txt --report-id "retention-cleanup-${GITHUB_RUN_ID}")
          if [[ "$DRY_RUN" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          REPORT_PATH="$(python .github/scripts/write_workflow_report.py "${ARGS[@]}")"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"

      - name: Remove expired staged paths from cleanup plan
        shell: bash
        run: |
          set -euo pipefail
          if [[ -s .github/tmp/chatgpt_report_cleanup_removed.txt ]]; then
            while IFS= read -r path; do
              [[ -n "$path" ]] || continue
              case "$path" in
                chatgpt_staging/status_reports/*/workflow_report.md|chatgpt_staging/status_reports/*/*/workflow_report.md|chatgpt_staging/status_reports/*/*/*/workflow_report.md)
                  git rm -f "$path" || true
                  ;;
                chatgpt_staging/requests/*.json|chatgpt_staging/requests/*/*.json|chatgpt_staging/requests/*/*/*.json)
                  git rm -f "$path" || true
                  ;;
                chatgpt_staging/out/*)
                  if [[ -d "$path" ]]; then
                    git rm -r -f "$path" || true
                  else
                    echo "Refusing to remove unexpected non-directory staged output path: $path" >&2
                    exit 1
                  fi
                  ;;
                *)
                  echo "Refusing to remove unexpected path: $path" >&2
                  exit 1
                  ;;
              esac
            done < .github/tmp/chatgpt_report_cleanup_removed.txt
          fi

      - name: Commit retention cleanup report and deletions
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chatgpt_staging/status_reports/retention-cleanup || true
          git add -u chatgpt_staging/status_reports chatgpt_staging/requests chatgpt_staging/out || true
          git commit -m "Clean ChatGPT staging retention surfaces by policy [skip ci]" || exit 0
          git push

      - name: Output final retention cleanup report URL
        shell: bash
        run: |
          set -euo pipefail
          report_path="${REPORT_PATH:-}"
          if [[ -z "$report_path" || ! -f "$report_path" ]]; then
            echo "No retention cleanup report path available for final URL output."
            exit 0
          fi
          branch_name="${GITHUB_REF_NAME:-}"
          if [[ -z "$branch_name" ]]; then
            branch_name="$(git branch --show-current || true)"
          fi
          if [[ -z "$branch_name" ]]; then
            branch_name="main"
          fi
          report_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${branch_name}/${report_path}"
          echo "ChatGPT retention cleanup report: $report_url"
          echo "## ChatGPT retention cleanup report" >> "$GITHUB_STEP_SUMMARY"
          echo "$report_url" >> "$GITHUB_STEP_SUMMARY"
