# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-maintenance-workflow-maintenance-audit-0024
# Purpose:
# - Audit GitHub Action version posture, workflow consistency drift, workflow inventory freshness, and the repo-local workflow modularization contract.
# Use when:
# - Use after workflow, dependabot, guidance, or workflow-tooling changes and on the weekly schedule to catch workflow-maintenance regressions.
# Do not use when:
# - Do not use as behavioral workflow validation or release-readiness proof; it checks maintenance drift and hygiene.
# Trigger model:
# - workflow_dispatch; pull_request on workflow/tooling guidance paths; schedule: 17 6 * * 1; push branches: main paths: .github/workflows/**, .github/actions/**, .github/dependabot.yml, project_sources/github_actions/**, AGENTS.md, .github/README.md
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses project_sources/github_actions/tools/check_workflow_action_versions.py, project_sources/github_actions/tools/check_workflow_consistency_drift.py, project_sources/github_actions/tools/build_workflow_inventory.py, project_sources/github_actions/tools/check_workflow_modularization_contracts.py, and project_sources/github_actions/tools/audit_reusable_contracts.py.
# Expected outputs/readback:
# - Maintenance audit result, repo-workflows report, and chatgpt-workflow-report-section custom markdown artifact.
# Safety notes:
# - Failures indicate workflow maintenance drift or dependency hygiene issues to repair before relying on changed workflow governance.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: Workflow maintenance audit

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'
      - 'project_sources/github_actions/**'
      - 'AGENTS.md'
      - '.github/README.md'
  schedule:
    - cron: '17 6 * * 1'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'
      - 'project_sources/github_actions/**'
      - 'AGENTS.md'
      - '.github/README.md'

permissions:
  contents: read

concurrency:
  group: workflow-maintenance-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit_workflow_actions:
    uses: ./.github/workflows/reusable-workflow-maintenance-audit.yml
    permissions:
      contents: read
    with:
      caller_event_name: ${{ github.event_name }}
