# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-maintenance-workflow-maintenance-audit-0024
# Purpose:
# - Audit GitHub Actions references and workflow-maintenance surfaces for stale action versions.
# Use when:
# - Use after workflow/dependabot/tooling changes or on the weekly schedule to catch stale action-version references.
# Do not use when:
# - Do not use as workflow behavior validation; it checks maintenance hygiene.
# Trigger model:
# - workflow_dispatch; schedule: 17 6 * * 1; push branches: main paths: .github/workflows/**, .github/dependabot.yml, project_sources/github_actions/tools/check_workflow_action_versions.py
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses project_sources/github_actions/tools/check_workflow_action_versions.py.
# Expected outputs/readback:
# - Audit result and repo-workflows report.
# Safety notes:
# - Failures indicate workflow dependency hygiene issues to repair before relying on updated workflows.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: Workflow maintenance audit

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - 'project_sources/github_actions/tools/check_workflow_action_versions.py'

permissions:
  contents: read

concurrency:
  group: workflow-maintenance-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit_workflow_actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check workflow action versions
        shell: bash
        run: |
          set -euo pipefail
          python3 project_sources/github_actions/tools/check_workflow_action_versions.py
