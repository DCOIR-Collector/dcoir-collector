# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: chatgpt-apply-in.yml
# Purpose: reusable implementation module for chatgpt-apply-in; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Chatgpt Apply In
run-name: Module Chatgpt Apply In | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
      payload_b64_path:
        description: Forwarded `payload_b64_path` input from the entry workflow.
        required: false
        type: string
        default: 'chatgpt_staging/in/request/payload.zip.b64'
      commit_changes:
        description: Forwarded `commit_changes` input from the entry workflow.
        required: false
        type: boolean
        default: true
      delete_payload_after_success:
        description: Forwarded `delete_payload_after_success` input from the entry workflow.
        required: false
        type: boolean
        default: true
    outputs: {}
    secrets: {}

permissions:
  contents: write
jobs:
  apply-in:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'

      - name: Verify report push helper
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/scripts/Invoke-ChatGptReportPush.ps1

      - name: Resolve payload path and reject chunk staging
        id: payload
        shell: bash
        run: |
          set -euo pipefail
          reject_chunk_path() {
            local p="$1"
            case "$p" in
              chatgpt_staging/in/*/payload.zip.b64.parts/*|chatgpt_staging/in/*/chunk_manifest.json|chatgpt_staging/in/*/*.part*|chatgpt_staging/in/*/*chunk*)
                echo "Unsupported staging shape: $p" >&2
                echo "This workflow accepts exactly one file: chatgpt_staging/in/<request_id>/payload.zip.b64" >&2
                echo "Do not use parts/chunks. Rebuild one ZIP, base64 encode it once, and stage payload.zip.b64." >&2
                exit 1
                ;;
            esac
          }

          if [[ "${{ inputs.caller_event_name }}" == "workflow_dispatch" ]]; then
            PAYLOAD='${{ inputs.payload_b64_path }}'
            reject_chunk_path "$PAYLOAD"
          else
            PAYLOAD=""
            while IFS= read -r p; do
              reject_chunk_path "$p"
              if [[ "$p" == chatgpt_staging/in/*/payload.zip.b64 && -f "$p" ]]; then
                PAYLOAD="$p"
              fi
            done < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          if [[ -z "$PAYLOAD" ]]; then
            echo "No payload.zip.b64 found in triggering commit; exiting successfully."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$PAYLOAD" != chatgpt_staging/in/*/payload.zip.b64 ]]; then
            echo "Payload must match chatgpt_staging/in/<request_id>/payload.zip.b64" >&2
            exit 1
          fi
          if [[ ! -f "$PAYLOAD" ]]; then
            echo "Payload file not found: $PAYLOAD" >&2
            exit 1
          fi

          REQUEST_ID="$(basename "$(dirname "$PAYLOAD")")"
          case "$REQUEST_ID" in
            *[!A-Za-z0-9._-]*|'')
              echo "Unsafe request id: $REQUEST_ID" >&2
              exit 1
              ;;
          esac
          if [[ -d "$(dirname "$PAYLOAD")/payload.zip.b64.parts" || -f "$(dirname "$PAYLOAD")/chunk_manifest.json" ]]; then
            echo "Unsupported staging shape in $(dirname "$PAYLOAD"): parts/chunk artifacts are forbidden." >&2
            echo "Use only one payload.zip.b64 file." >&2
            exit 1
          fi
          echo "payload_path=$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Write heartbeat - payload resolved
        if: steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-apply-in \
            --request-id '${{ steps.payload.outputs.request_id }}' \
            --request-path '${{ steps.payload.outputs.payload_path }}' \
            --phase payload-resolved \
            --result running \
            --message 'Apply-in payload path resolved. Decode and apply validation are next.'
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Progress chatgpt-apply-in ${{ steps.payload.outputs.request_id }} payload-resolved [skip ci]" \
            -Paths "chatgpt_staging/status_reports/chatgpt-apply-in/${{ steps.payload.outputs.request_id }}"

      - name: Write heartbeat - running apply-in
        if: steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-apply-in \
            --request-id '${{ steps.payload.outputs.request_id }}' \
            --request-path '${{ steps.payload.outputs.payload_path }}' \
            --phase running-apply-in \
            --result running \
            --message 'Apply-in decode, manifest validation, file copy/delete, and hash checks are about to run.'
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Progress chatgpt-apply-in ${{ steps.payload.outputs.request_id }} running-apply-in [skip ci]" \
            -Paths "chatgpt_staging/status_reports/chatgpt-apply-in/${{ steps.payload.outputs.request_id }}"

      - name: Decode ZIP payload and apply bundle
        if: steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD='${{ steps.payload.outputs.payload_path }}'
          REQUEST_ID='${{ steps.payload.outputs.request_id }}'
          WORK_DIR="chatgpt_staging/work/$REQUEST_ID"
          REPORT_DIR="chatgpt_staging/status_reports/chatgpt-apply-in/$REQUEST_ID"
          REPORT_PATH="$REPORT_DIR/workflow_report.md"
          NATIVE_REPORT_PATH="$REPORT_DIR/native_apply_in_success_report.md"
          echo "REQUEST_ID=$REQUEST_ID" >> "$GITHUB_ENV"
          echo "PAYLOAD=$PAYLOAD" >> "$GITHUB_ENV"
          echo "WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"
          echo "REPORT_DIR=$REPORT_DIR" >> "$GITHUB_ENV"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"

          python tools/chatgpt_apply_in/apply_payload_bundle.py \
            --payload "$PAYLOAD" \
            --work-dir "$WORK_DIR" \
            --applied-paths chatgpt_staging/work/applied_paths.txt \
            --deleted-paths chatgpt_staging/work/deleted_paths.txt \
            --hash-warnings chatgpt_staging/work/hash_warnings.txt

      - name: Write apply-in success report
        if: steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$REPORT_DIR"
          NATIVE_REPORT_PATH="$REPORT_DIR/native_apply_in_success_report.md"
          {
            echo "# ChatGPT workflow report"
            echo
            echo "## Result"
            echo
            echo "- workflow: chatgpt-apply-in"
            echo "- result: success"
            echo "- phase: bundle-applied-before-commit"
            echo "- request_id: $REQUEST_ID"
            echo "- payload_path: $PAYLOAD"
            echo "- payload_shape: single payload.zip.b64"
            echo "- github_run_id: $GITHUB_RUN_ID"
            echo "- github_sha: $GITHUB_SHA"
            echo "- github_ref: $GITHUB_REF"
            echo "- report_created_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Applied paths"
            if [[ -s chatgpt_staging/work/applied_paths.txt ]]; then sed 's/^/- /' chatgpt_staging/work/applied_paths.txt; else echo "- none"; fi
            echo
            echo "## Deleted paths"
            if [[ -s chatgpt_staging/work/deleted_paths.txt ]]; then sed 's/^/- /' chatgpt_staging/work/deleted_paths.txt; else echo "- none"; fi
            if [[ -f chatgpt_staging/work/hash_warnings.txt ]]; then
              echo
              echo "## Warnings"
              sed 's/^/- /' chatgpt_staging/work/hash_warnings.txt
            fi
            echo
            echo "## Cleanup guidance"
            echo
            echo "After ChatGPT verifies the commit/readback and no longer needs this report, create a cleanup marker for request id '$REQUEST_ID' with cleanup_status_reports=true."
            echo
            echo "## Next ChatGPT action"
            echo
            echo "Verify the committed target changes, hash policy outcome, deletion outcome, and apply report. If readback is good, update Airtable and clean this status report when safe."
          } > "$NATIVE_REPORT_PATH"
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-apply-in \
            --request-id "$REQUEST_ID" \
            --request-path "$PAYLOAD" \
            --phase bundle-applied-before-commit \
            --result success \
            --message 'Apply-in bundle was applied successfully before commit. Native apply-in details are appended below.'
          {
            echo
            echo "## Native apply-in success report"
            echo
            cat "$NATIVE_REPORT_PATH"
          } >> "$REPORT_PATH"

      - name: Commit applied changes
        if: steps.payload.outputs.skip != 'true' && (inputs.caller_event_name == 'push' || inputs.commit_changes)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f chatgpt_staging/work/applied_paths.txt ]]; then
            while IFS= read -r p; do
              if [[ -z "$p" ]]; then
                continue
              fi
              if [[ "$p" == .github/workflows/* ]]; then
                echo "Skipping workflow file from normal apply-in commit: $p"
                git restore -- "$p" || true
                continue
              fi
              git add -- "$p"
            done < chatgpt_staging/work/applied_paths.txt
          fi
          if [[ -f chatgpt_staging/work/deleted_paths.txt ]]; then
            while IFS= read -r p; do
              [[ -n "$p" ]] && git add -u -- "$p" || true
            done < chatgpt_staging/work/deleted_paths.txt
          fi
          if [[ "${{ inputs.caller_event_name }}" == "push" || "${{ inputs.delete_payload_after_success }}" == "true" ]]; then
            rm -f "$PAYLOAD" || true
          fi
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Apply ChatGPT staging bundle and report [skip ci]" \
            -Paths "chatgpt_staging/apply_reports" "$REPORT_DIR" "$PAYLOAD" "chatgpt_staging/work/applied_paths.txt" "chatgpt_staging/work/deleted_paths.txt" "chatgpt_staging/work/hash_warnings.txt"

      - name: Capture apply-in failure report
        if: failure() && steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD="${PAYLOAD:-${{ steps.payload.outputs.payload_path }}}"
          REQUEST_ID="${REQUEST_ID:-${{ steps.payload.outputs.request_id }}}"
          case "$REQUEST_ID" in
            *[!A-Za-z0-9._-]*|'') REQUEST_ID="unsafe_or_unknown" ;;
          esac
          WORK_DIR="${WORK_DIR:-chatgpt_staging/work/$REQUEST_ID}"
          REPORT_DIR="chatgpt_staging/status_reports/chatgpt-apply-in/$REQUEST_ID"
          REPORT_PATH="$REPORT_DIR/workflow_report.md"
          NATIVE_REPORT_PATH="$REPORT_DIR/native_apply_in_failure_report.md"
          ART_DIR="$RUNNER_TEMP/chatgpt_apply_in_failure/$REQUEST_ID"
          ARTIFACT_NAME="chatgpt-apply-in-failure-${GITHUB_RUN_ID}"
          rm -rf "$ART_DIR"
          mkdir -p "$REPORT_DIR" "$ART_DIR"

          {
            echo "# ChatGPT workflow report"
            echo
            echo "## Result"
            echo
            echo "- workflow: chatgpt-apply-in"
            echo "- result: failure"
            echo "- phase: apply-in"
            echo "- request_id: $REQUEST_ID"
            echo "- payload_path: $PAYLOAD"
            echo "- expected_payload_shape: single chatgpt_staging/in/<request_id>/payload.zip.b64"
            echo "- github_run_id: $GITHUB_RUN_ID"
            echo "- github_ref: $GITHUB_REF"
            echo "- github_sha: $GITHUB_SHA"
            echo "- artifact_name: $ARTIFACT_NAME"
            echo "- artifact_retention_days: 7"
            echo "- report_created_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Troubleshooting context"
            echo
            echo "The apply-in workflow failed. This workflow only accepts one payload.zip.b64 file. Parts/chunks, chunk manifests, payload.zip.b64.parts, invalid base64, missing root apply_manifest.json, missing root files/, unsafe paths, stale hashes, create_only violations, delete policy violations, or workflow-change policy violations are hard failures."
            echo
            if [[ -f "$WORK_DIR/extract/apply_manifest.json" ]]; then
              echo "### Manifest excerpt"
              echo
              echo '```json'
              python -c "import pathlib; p=pathlib.Path('$WORK_DIR/extract/apply_manifest.json'); print(p.read_text(encoding='utf-8', errors='replace')[:4000])" || true
              echo '```'
            fi
            echo
            echo "## Next ChatGPT action"
            echo
            echo "Read this report, inspect the artifact or run log if needed, regenerate a single payload.zip.b64 with current hashes, then retry. Do not switch to parts/chunks."
          } > "$NATIVE_REPORT_PATH"
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-apply-in \
            --request-id "$REQUEST_ID" \
            --request-path "$PAYLOAD" \
            --phase apply-in-failure \
            --result failure \
            --artifact-name "$ARTIFACT_NAME" \
            --message 'The apply-in workflow failed. Native failure details are appended below.'
          {
            echo
            echo "## Native apply-in failure report"
            echo
            cat "$NATIVE_REPORT_PATH"
          } >> "$REPORT_PATH"

          cp "$REPORT_PATH" "$ART_DIR/workflow_report.md"
          if [[ -f "$PAYLOAD" ]]; then sha256sum "$PAYLOAD" > "$ART_DIR/payload_b64.sha256"; fi
          if [[ -f "$WORK_DIR/payload.zip" ]]; then sha256sum "$WORK_DIR/payload.zip" > "$ART_DIR/payload_zip.sha256"; fi
          if [[ -f "$WORK_DIR/extract/apply_manifest.json" ]]; then cp "$WORK_DIR/extract/apply_manifest.json" "$ART_DIR/apply_manifest.json"; fi

          git restore --staged . || true
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Record ChatGPT apply-in workflow report [skip ci]" \
            -Paths "$REPORT_DIR"
          echo "FAIL_ARTIFACT_DIR=$ART_DIR" >> "$GITHUB_ENV"

      - name: Upload apply-in failure evidence artifact
        if: failure() && steps.payload.outputs.skip != 'true'
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-apply-in-failure-${{ github.run_id }}
          path: ${{ env.FAIL_ARTIFACT_DIR }}/**
          retention-days: 7
