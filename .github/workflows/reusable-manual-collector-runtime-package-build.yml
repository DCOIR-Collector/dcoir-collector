# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: manual-collector-runtime-package-build.yml
# Purpose: reusable implementation module for manual-collector-runtime-package-build; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: reusable-manual-collector-runtime-package-build

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
      package_version_override:
        description: Forwarded `package_version_override` input from the entry workflow.
        required: false
        type: string
        default: ''
    outputs: {}
    secrets: {}

permissions:
  contents: read

jobs:
  build_collector_runtime_package:
    uses: ./.github/workflows/reusable-collector-runtime-package-build.yml
    permissions:
      contents: read
    with:
      package_version_override: ${{ inputs.package_version_override }}
