# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-staging_lane-chatgpt-exec-0002
# Purpose:
# - Run a reviewed operator-approved command request on a Windows GitHub Actions runner and commit ChatGPT-readable execution reports.
# Use when:
# - Use when a command needs runner-side execution, GitHub secrets bridging, artifact capture, committed heartbeat/status readback, and optionally tracked concise summaries.
# Do not use when:
# - Do not use for unapproved commands, local workstation actions, destructive commands without an explicit request contract, or simple readable repo edits better handled by a bundle.
# Trigger model:
# - workflow_dispatch inputs: request_path; push branches: main paths: chatgpt_staging/exec_requests/*.json
# Required inputs:
# - request_path: Repo-relative exec request JSON under chatgpt_staging/exec_requests/ default=chatgpt_staging/exec_requests/request.json
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Requires chatgpt_staging/exec_requests/<request_id>.json and operator_tools/github_desktop_lane/scripts/Invoke-DcoirActionsExecHarness.ps1.
# Expected outputs/readback:
# - Reports under chatgpt_staging/status_reports/chatgpt-exec/<request_id>/, tracked concise summary files beside the report when produced by the request/tool, and an uploaded GitHub Actions artifact for full output/provenance. artifact_readback/ is intentionally ignored for chatgpt-exec and is normally not committed.
# Safety notes:
# - Request path must match chatgpt_staging/exec_requests/<safe-id>.json; approved command preview and operator_approved=true must be in the request; secrets are bridged by name only.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: chatgpt-exec

on:
  workflow_dispatch:
    inputs:
      request_path:
        description: "Repo-relative exec request JSON under chatgpt_staging/exec_requests/"
        required: true
        default: "chatgpt_staging/exec_requests/request.json"
        type: string
  push:
    branches:
      - main
    paths:
      - "chatgpt_staging/exec_requests/*.json"

permissions:
  contents: write
  actions: read

concurrency:
  group: chatgpt-exec-${{ github.ref }}
  cancel-in-progress: false

jobs:
  exec:
    uses: ./.github/workflows/reusable-chatgpt-exec.yml
    permissions:
      contents: write
      actions: read
    with:
      caller_event_name: ${{ github.event_name }}
      request_path: ${{ inputs.request_path || 'chatgpt_staging/exec_requests/request.json' }}
    secrets:
      DCOIR_AIRTABLE_BASE_ID: ${{ secrets.DCOIR_AIRTABLE_BASE_ID }}
      DCOIR_AIRTABLE_TOKEN: ${{ secrets.DCOIR_AIRTABLE_TOKEN }}
      DCOIR_GEMINI_API: ${{ secrets.DCOIR_GEMINI_API }}
      DCOIR_GITHUB_CL_TOKEN: ${{ secrets.DCOIR_GITHUB_CL_TOKEN }}
      DCOIR_GITHUB_FG_TOKEN: ${{ secrets.DCOIR_GITHUB_FG_TOKEN }}
      DCOIR_OPENAI_API_KEY: ${{ secrets.DCOIR_OPENAI_API_KEY }}
      DCOIR_OPENAI_PROJECT_ID: ${{ secrets.DCOIR_OPENAI_PROJECT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
