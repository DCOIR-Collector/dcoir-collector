# .github/workflows/kimi-review.yml
name: Kimi Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  kimi-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '/'))
    steps:
      - name: Get PR ref (for comments)
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue?.number || context.payload.pull_request?.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      # NEW: Add 👀 reaction to your command comment
      - name: Add Eyes Reaction
        id: add-reaction
        uses: actions/github-script@v7
        with:
          script: |
            const reaction = await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            core.setOutput('reaction_id', reaction.data.id);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-pr.outputs.ref }}

      # Kimi analyzes the code natively
      - name: Run Kimi Review
        uses: xiaoju111a/kimi-actions@main
        with:
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          kimi_base_url: ${{ secrets.KIMI_BASE_URL }}  # Optional
          github_token: ${{ secrets.GITHUB_TOKEN }}
          auto_review: 'false'  # Managed by commands

      # NEW: Remove 👀 reaction after completion
      - name: Remove Eyes Reaction
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const reactionId = '${{ steps.add-reaction.outputs.reaction_id }}';
            if (reactionId) {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                reaction_id: parseInt(reactionId)
              });
            }
