name: manual-gemini-bundle-build

on:
  workflow_dispatch:
    inputs:
      bundle_version_override:
        description: Optional bundle version override (for example 3_0_3)
        required: false
        default: ''
        type: string
      skip_validation:
        description: Retained compatibility input. Stored-source packaging always validates manifest-required files.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-gemini-bundle-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_gemini_bundle:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      BUNDLE_VERSION_OVERRIDE: ${{ github.event.inputs.bundle_version_override }}
      SKIP_VALIDATION: ${{ github.event.inputs.skip_validation }}
      GEMINI_SOURCE_ROOT: project_sources/DCOIR_Gemini_Bundle_Source
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Verify stored Gemini bundle source
        shell: pwsh
        run: |
          $sourceRoot = $env:GEMINI_SOURCE_ROOT
          $manifestPath = Join-Path $sourceRoot 'Gemini_Bundle_Source_Manifest.json.txt'

          if (-not (Test-Path -LiteralPath $sourceRoot -PathType Container)) {
            throw "Missing Gemini stored-source root: $sourceRoot"
          }
          if (-not (Test-Path -LiteralPath $manifestPath -PathType Leaf)) {
            throw "Missing Gemini source manifest: $manifestPath"
          }

          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          if ($manifest.authoritative_runtime_source -ne $sourceRoot) {
            throw "Gemini source manifest authoritative_runtime_source is '$($manifest.authoritative_runtime_source)', expected '$sourceRoot'."
          }

          $required = @('Gemini_Bundle_Source_Manifest.json.txt') + @($manifest.required_files)
          $missing = @()
          foreach ($relativePath in $required) {
            $candidate = Join-Path $sourceRoot $relativePath
            if (-not (Test-Path -LiteralPath $candidate -PathType Leaf)) {
              $missing += $relativePath
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing required stored Gemini bundle files under ${sourceRoot}: $($missing -join ', ')"
          }

          $subAgentCount = @($manifest.topology.sub_agent_files).Count
          if ($subAgentCount -ne 10) {
            throw "Gemini topology mismatch: expected 10 sub-agents, found $subAgentCount."
          }

          Write-Host "Stored Gemini source verification passed. Required files: $($required.Count). Sub-agents: $subAgentCount."

      - name: Package stored Gemini bundle
        shell: pwsh
        run: |
          $sourceRoot = $env:GEMINI_SOURCE_ROOT
          $manifestPath = Join-Path $sourceRoot 'Gemini_Bundle_Source_Manifest.json.txt'
          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json

          $version = $manifest.bundle_version
          if (-not [string]::IsNullOrWhiteSpace($env:BUNDLE_VERSION_OVERRIDE)) {
            $version = $env:BUNDLE_VERSION_OVERRIDE.Trim()
          }

          $topLevelFolder = $manifest.top_level_folder
          if (-not [string]::IsNullOrWhiteSpace($env:BUNDLE_VERSION_OVERRIDE)) {
            $topLevelFolder = "DCOIR_Gemini_Email_Build_Bundle_$version"
          }

          $outDir = Join-Path $env:RUNNER_TEMP 'manual-gemini-bundle-build'
          $stageRoot = Join-Path $env:RUNNER_TEMP 'manual-gemini-bundle-stage'
          $stageBundleRoot = Join-Path $stageRoot $topLevelFolder
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          if (Test-Path -LiteralPath $stageRoot) {
            Remove-Item -LiteralPath $stageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $stageBundleRoot | Out-Null

          Copy-Item -LiteralPath (Join-Path $sourceRoot '*') -Destination $stageBundleRoot -Recurse -Force

          $zipPath = Join-Path $outDir "$topLevelFolder.zip"
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -LiteralPath $stageBundleRoot -DestinationPath $zipPath -Force

          $report = [ordered]@{
            bundle_name = $manifest.bundle_name
            bundle_version = $version
            top_level_folder = $topLevelFolder
            source_root = $sourceRoot
            source_strategy = 'stored_source_package'
            validation_mode = 'manifest_required_files'
            skip_validation_input = $env:SKIP_VALIDATION
            zip_path = $zipPath
            generated_at_utc = (Get-Date).ToUniversalTime().ToString('o')
            file_count = @(Get-ChildItem -LiteralPath $stageBundleRoot -Recurse -File).Count
          }
          $reportPath = Join-Path $outDir "$topLevelFolder.report.json"
          $report | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $reportPath -Encoding utf8

          Write-Host "Created Gemini bundle artifact: $zipPath"
          Write-Host "Created Gemini bundle report: $reportPath"

      - name: Upload Gemini bundle artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-gemini-bundle-build
          path: |
            ${{ runner.temp }}\manual-gemini-bundle-build\*.zip
            ${{ runner.temp }}\manual-gemini-bundle-build\*report.json
          if-no-files-found: error
          retention-days: 21
