name: manual-gemini-bundle-build

on:
  workflow_dispatch:
    inputs:
      bundle_version_override:
        description: Optional bundle version override (for example 3_0_1)
        required: false
        default: ''
        type: string
      skip_validation:
        description: Skip validate_dcoir_gemini_bundle.py before compile
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-gemini-bundle-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_gemini_bundle:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      BUNDLE_VERSION_OVERRIDE: ${{ github.event.inputs.bundle_version_override }}
      SKIP_VALIDATION: ${{ github.event.inputs.skip_validation }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Verify Gemini bundle required surfaces
        shell: pwsh
        run: |
          $required = @(
            'project_sources/governance/control_plane/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/governance/control_plane/CP-02_DCOIR_Change_Log.txt',
            'project_sources/gemini/docs/DOC-10_DCOIR_Gemini_Stored_Source_And_Compile_Strategy_v1_0_0.txt',
            'project_sources/gemini/docs/DOC-11_DCOIR_Gemini_Creation_Pipeline_v1_0_0.txt',
            'project_sources/gemini/prompt_pack/PP-09_Gemini_Enterprise_Agent_Designer_Generator_Workflow_v1_0_0.txt',
            'project_sources/gemini/bundle_source/Gemini_Bundle_Source_Manifest.json',
            'project_sources/gemini/bundle_source/README.md',
            'project_sources/gemini/bundle_source/00_START_HERE/README_FIRST.md.txt',
            'project_sources/gemini/bundle_source/00_START_HERE/Agent_Attachment_Map.md.txt',
            'project_sources/gemini/bundle_source/00_START_HERE/Gemini_Build_Quick_Start.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Generated_DCOIR_Gemini_Agent_Index.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Prime_Agent_DCOIR_Gemini_Orchestrator.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_01_Session_Readiness_and_Intake.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_02_Environment_and_Coverage_Mapper.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_03_Alert_Family_Classifier_and_Known_Benign_Technology_Differentiator.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_04_Evidence_and_Provenance_Analyst.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_05_Query_Planner_and_Syntax_Guard.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_06_DCOIR_Collector_Execution_and_Bundle_Workflow_Orchestrator.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_07_DCOIR_Collector_Artifact_Interpreter_and_Report_Extractor.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_08_IOC_Parsing_and_Evidence_Grounded_Public_Enrichment_Planner.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_09_Targeted_Collection_Designer_and_Evidence_Gap_Reducer.md.txt',
            'project_sources/gemini/bundle_source/01_GEMINI_AGENT_BUILD/Sub_Agent_10_Output_Contract_Consistency_Guard_and_Report_Composer.md.txt',
            'knowledge/README.md',
            'knowledge/Knowledge - 15 - Gemini Attachment Set, Validation, and Maintenance.md',
            'knowledge/Knowledge - 16 - Collector EXE Usage and Runtime Behavior.md',
            'knowledge/Knowledge - 17 - Collector Feature and Output Contract Reference.md',
            'project_sources/gemini/tools/sync_dcoir_gemini_knowledge_attachments.py',
            'project_sources/gemini/tools/validate_dcoir_gemini_bundle.py',
            'project_sources/gemini/tools/compile_dcoir_gemini_bundle.py',
            'project_sources/gemini/tools/build_dcoir_gemini_release.py'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required Gemini bundle surfaces: $($missing -join ', ')"
          }
          $knowledgeFiles = Get-ChildItem -LiteralPath knowledge -File -Filter 'Knowledge - *.md'
          if ($knowledgeFiles.Count -lt 17) {
            throw "Maintained knowledge set is smaller than expected. Found $($knowledgeFiles.Count) files; expected at least 17."
          }

      - name: Create output directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path project_sources/validation/out | Out-Null

      - name: Run Gemini validation and build
        shell: pwsh
        run: |
          $skipValidation = $env:SKIP_VALIDATION
          $versionOverride = $env:BUNDLE_VERSION_OVERRIDE
          $cmd = @(
            'python',
            'project_sources/gemini/tools/build_dcoir_gemini_release.py',
            '--source-root', 'project_sources/gemini/bundle_source',
            '--output-dir', 'project_sources/validation/out'
          )
          if ($skipValidation -eq 'true') {
            $cmd += '--skip-validation'
          }
          if (-not [string]::IsNullOrWhiteSpace($versionOverride)) {
            $cmd += @('--version', $versionOverride)
          }
          & $cmd[0] $cmd[1..($cmd.Count - 1)]
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle build failed.'
          }

      - name: Upload Gemini bundle artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-gemini-bundle-build
          path: |
            project_sources/validation/out/*.zip
            project_sources/validation/out/*report.json
          if-no-files-found: warn
          retention-days: 21
