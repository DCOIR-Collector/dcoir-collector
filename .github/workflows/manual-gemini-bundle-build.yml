# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-build_package-manual-gemini-bundle-build-0014 (Airtable formula preview; final key may use table autonumber suffix)
# Purpose:
# - Build and optionally validate the DCOIR Gemini runtime bundle.
# Use when:
# - Use before Gemini bundle delivery or after changes under the Gemini bundle source/tooling surfaces.
# Do not use when:
# - Do not use for collector runtime package generation.
# Trigger model:
# - workflow_dispatch inputs: bundle_version_override, skip_validation
# Required inputs:
# - bundle_version_override: Optional bundle version override (for example 3_0_1) default=; skip_validation: Skip validate_dcoir_gemini_bundle.py before compile default=false
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses Gemini bundle manifest/source tree and project_sources/gemini/tools/build_dcoir_gemini_release.py plus validators unless skip_validation is true.
# Expected outputs/readback:
# - Gemini bundle artifacts and repo-workflows report.
# Safety notes:
# - skip_validation=true limits readiness claims and should be documented in follow-up validation evidence.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep the Airtable GitHub Workflow Inventory row aligned when general routing guidance changes.
# Airtable routing:
# - General task-routing guidance belongs in Airtable table `GitHub Workflow Inventory`.
# - This header owns workflow-specific execution guidance; the workflow body remains the executable behavior.
name: manual-gemini-bundle-build

on:
  workflow_dispatch:
    inputs:
      bundle_version_override:
        description: Optional bundle version override (for example 3_0_1)
        required: false
        default: ''
        type: string
      skip_validation:
        description: Skip validate_dcoir_gemini_bundle.py before compile
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-gemini-bundle-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_gemini_bundle:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      BUNDLE_VERSION_OVERRIDE: ${{ github.event.inputs.bundle_version_override }}
      SKIP_VALIDATION: ${{ github.event.inputs.skip_validation }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Verify Gemini bundle required surfaces
        shell: pwsh
        run: |
          $required = @(
            'project_sources/governance/control_plane/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/governance/control_plane/CP-02_DCOIR_Change_Log.txt',
            'project_sources/gemini/docs/DOC-10_DCOIR_Gemini_Stored_Source_And_Compile_Strategy_v1_0_0.txt',
            'project_sources/gemini/docs/DOC-11_DCOIR_Gemini_Creation_Pipeline_v1_0_0.txt',
            'project_sources/gemini/bundle_source/Gemini_Bundle_Source_Manifest.json',
            'knowledge/README.md',
            'knowledge/Knowledge - 16 - Collector EXE Usage and Runtime Behavior.md',
            'knowledge/Knowledge - 17 - Collector Feature and Output Contract Reference.md',
            'project_sources/gemini/tools/validate_dcoir_gemini_bundle.py',
            'project_sources/gemini/tools/validate_dcoir_gemini_behavior_scenarios.py',
            'project_sources/gemini/tools/validate_dcoir_gemini_output_contract_regressions.py',
            'project_sources/gemini/tools/fixtures/gemini_output_contract_regression_cases.json',
            'project_sources/gemini/tools/compile_dcoir_gemini_bundle.py',
            'project_sources/gemini/tools/build_dcoir_gemini_release.py'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required Gemini bundle surfaces: $($missing -join ', ')"
          }

          $geminiBundleRoot = 'project_sources/gemini/bundle_source'
          $geminiManifestPath = Join-Path $geminiBundleRoot 'Gemini_Bundle_Source_Manifest.json'
          if (-not (Test-Path -LiteralPath $geminiManifestPath -PathType Leaf)) {
            throw "Gemini manifest missing: $geminiManifestPath"
          }
          $geminiManifest = Get-Content -LiteralPath $geminiManifestPath -Raw -Encoding UTF8 | ConvertFrom-Json
          if (-not $geminiManifest.topology -or $geminiManifest.topology.topology_source_of_truth -ne 'manifest') {
            throw 'Gemini topology source of truth must be manifest.'
          }
          $manifestRequired = @($geminiManifest.required_files | ForEach-Object { Join-Path $geminiBundleRoot ([string]$_) })
          if ($manifestRequired.Count -eq 0) {
            throw 'Gemini manifest required_files is empty.'
          }
          $manifestSourceRequired = @($geminiManifest.source_required_files | ForEach-Object { Join-Path $geminiBundleRoot ([string]$_) })
          $manifestMissing = @(($manifestRequired + $manifestSourceRequired) | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($manifestMissing.Count -gt 0) {
            throw "Missing Gemini manifest-required/source-required surfaces: $($manifestMissing -join ', ')"
          }
          $manifestSubAgents = @($geminiManifest.topology.sub_agent_files | ForEach-Object { ([string]$_).Replace([string][IO.Path]::DirectorySeparatorChar,'/') })
          if ($manifestSubAgents.Count -eq 0) {
            throw 'Gemini manifest topology.sub_agent_files is empty.'
          }
          $missingSubAgents = @($manifestSubAgents | Where-Object { -not (Test-Path -LiteralPath (Join-Path $geminiBundleRoot $_)) })
          if ($missingSubAgents.Count -gt 0) {
            throw "Missing Gemini manifest-listed sub-agent files: $($missingSubAgents -join ', ')"
          }
          $agentBuildRoot = Join-Path $geminiBundleRoot '01_GEMINI_AGENT_BUILD'
          $bundleRootResolved = (Resolve-Path -LiteralPath $geminiBundleRoot).Path
          $discoveredSubAgents = @(Get-ChildItem -LiteralPath $agentBuildRoot -File -Filter 'Sub_Agent_*.md.txt' | ForEach-Object {
            ($_.FullName.Substring($bundleRootResolved.Length + 1)).Replace([string][IO.Path]::DirectorySeparatorChar,'/')
          })
          $unlistedSubAgents = @($discoveredSubAgents | Where-Object { $_ -notin $manifestSubAgents })
          if ($unlistedSubAgents.Count -gt 0) {
            throw "Discovered Gemini sub-agent files not listed in manifest topology: $($unlistedSubAgents -join ', ')"
          }
          Write-Host "Gemini manifest surfaces validated: required=$($manifestRequired.Count); source-required=$($manifestSourceRequired.Count); sub-agents=$($manifestSubAgents.Count)."

      - name: Create output directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path project_sources/validation/out | Out-Null

      - name: Run Gemini validation and build
        shell: pwsh
        run: |
          $skipValidation = $env:SKIP_VALIDATION
          $versionOverride = $env:BUNDLE_VERSION_OVERRIDE
          $cmd = @(
            'python',
            'project_sources/gemini/tools/build_dcoir_gemini_release.py',
            '--source-root', 'project_sources/gemini/bundle_source',
            '--output-dir', 'project_sources/validation/out'
          )
          if ($skipValidation -eq 'true') {
            $cmd += '--skip-validation'
          }
          if (-not [string]::IsNullOrWhiteSpace($versionOverride)) {
            $cmd += @('--version', $versionOverride)
          }
          & $cmd[0] $cmd[1..($cmd.Count - 1)]
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle build failed.'
          }

      - name: Upload Gemini bundle artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-gemini-bundle-build
          path: |
            project_sources/validation/out/*.zip
            project_sources/validation/out/*report.json
          if-no-files-found: warn
          retention-days: 21
