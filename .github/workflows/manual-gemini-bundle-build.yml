name: manual-gemini-bundle-build

on:
  workflow_dispatch:
    inputs:
      bundle_version_override:
        description: Optional bundle version override (for example 3_0_3)
        required: false
        default: ''
        type: string
      skip_validation:
        description: Skip validate_dcoir_gemini_bundle.py and behavior-scenario checks before compile
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-gemini-bundle-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_gemini_bundle:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      BUNDLE_VERSION_OVERRIDE: ${{ github.event.inputs.bundle_version_override }}
      SKIP_VALIDATION: ${{ github.event.inputs.skip_validation }}
      GEMINI_SOURCE_ROOT: project_sources/DCOIR_Gemini_Bundle_Source
      GEMINI_OUTPUT_DIR: project_sources/generation_validation/out
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Verify Gemini bundle build toolchain
        shell: pwsh
        run: |
          $required = @(
            'project_sources/DCOIR_Gemini_Bundle_Source/Gemini_Bundle_Source_Manifest.json.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/README.md',
            'project_sources/generation_validation/sync_dcoir_gemini_knowledge_attachments.py',
            'project_sources/generation_validation/validate_dcoir_gemini_bundle.py',
            'project_sources/generation_validation/validate_dcoir_gemini_behavior_scenarios.py',
            'project_sources/generation_validation/compile_dcoir_gemini_bundle.py',
            'project_sources/generation_validation/build_dcoir_gemini_release.py'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required Gemini build toolchain surfaces: $($missing -join ', ')"
          }

          $manifest = Get-Content -LiteralPath 'project_sources/DCOIR_Gemini_Bundle_Source/Gemini_Bundle_Source_Manifest.json.txt' -Raw | ConvertFrom-Json
          if ($manifest.authoritative_runtime_source -ne $env:GEMINI_SOURCE_ROOT) {
            throw "Gemini source manifest authoritative_runtime_source is '$($manifest.authoritative_runtime_source)', expected '$env:GEMINI_SOURCE_ROOT'."
          }
          $subAgentCount = @($manifest.topology.sub_agent_files).Count
          if ($subAgentCount -ne 10) {
            throw "Gemini topology mismatch: expected 10 sub-agents, found $subAgentCount."
          }
          Write-Host "Gemini build toolchain verification passed. Sub-agents: $subAgentCount."

      - name: Create output directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:GEMINI_OUTPUT_DIR | Out-Null

      - name: Run Gemini validation and build
        shell: pwsh
        run: |
          $skipValidation = $env:SKIP_VALIDATION
          $versionOverride = $env:BUNDLE_VERSION_OVERRIDE
          $cmd = @(
            'python',
            'project_sources/generation_validation/build_dcoir_gemini_release.py',
            '--source-root', $env:GEMINI_SOURCE_ROOT,
            '--output-dir', $env:GEMINI_OUTPUT_DIR
          )
          if ($skipValidation -eq 'true') {
            $cmd += '--skip-validation'
          }
          if (-not [string]::IsNullOrWhiteSpace($versionOverride)) {
            $cmd += @('--version', $versionOverride)
          }
          & $cmd[0] $cmd[1..($cmd.Count - 1)]
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle build failed.'
          }

      - name: Upload Gemini bundle artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-gemini-bundle-build
          path: |
            project_sources/generation_validation/out/*.zip
            project_sources/generation_validation/out/*report.json
          if-no-files-found: warn
          retention-days: 21
