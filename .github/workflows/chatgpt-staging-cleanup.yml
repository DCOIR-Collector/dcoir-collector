# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-staging_lane-chatgpt-staging-cleanup-0006
# Purpose:
# - Clean selected ChatGPT staging request, inbound, outbound, apply, failure, and status-report surfaces.
# Use when:
# - Use after reports/artifacts have been consumed and cleanup scope is explicit.
# Do not use when:
# - Do not use as a broad repository cleanup mechanism or to delete evidence before validation is recorded.
# Trigger model:
# - workflow_dispatch inputs: cleanup_requests, cleanup_in_payloads, cleanup_out_bundles, cleanup_apply_reports, cleanup_failure_reports, cleanup_status_reports, request_id_filter; push branches: main paths: chatgpt_staging/cleanup_requests/*.json
# Required inputs:
# - cleanup_requests: Delete consumed request JSON files under chatgpt_staging/requests/ including nested request families default=true; cleanup_in_payloads: Delete inbound payload folders under chatgpt_staging/in/ default=true; cleanup_out_bundles: Delete staged output bundles under chatgpt_staging/out/ default=false; cleanup_apply_reports: Delete apply reports under chatgpt_staging/apply_reports/ default=false; cleanup_failure_reports: Delete committed failure reports under chatgpt_staging/failure_reports/ default=false; cleanup_status_reports: Delete ChatGPT-readable workflow status reports under chatgpt_staging/status_reports/ default=false; request_id_filter: Optional request id or prefix to clean. Leave blank to clean all selected surfaces. default=
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses selected chatgpt_staging cleanup inputs or cleanup request JSON under chatgpt_staging/cleanup_requests/.
# Expected outputs/readback:
# - Cleanup commit, cleanup report, and direct final cleanup-report URL in the run summary when a report path is available.
# Safety notes:
# - Manual inputs are deletion controls. Use request_id_filter for bounded cleanup and keep status report deletion off unless readback evidence is no longer needed.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 32 Maintenance - ChatGPT Staging Cleanup
run-name: Staging Cleanup | filter=${{ github.event.inputs.request_id_filter || 'all' }} | #${{ github.run_number }}

on:
  workflow_dispatch:
    inputs:
      cleanup_requests:
        description: "Delete consumed request JSON files"
        required: true
        default: true
        type: boolean
      cleanup_in_payloads:
        description: "Delete inbound payload folders under chatgpt_staging/in/"
        required: true
        default: true
        type: boolean
      cleanup_out_bundles:
        description: "Delete staged output bundles under chatgpt_staging/out/"
        required: true
        default: false
        type: boolean
      cleanup_apply_reports:
        description: "Delete apply reports under chatgpt_staging/apply_reports/"
        required: true
        default: false
        type: boolean
      cleanup_failure_reports:
        description: "Delete committed failure reports under chatgpt_staging/failure_reports/"
        required: true
        default: false
        type: boolean
      cleanup_status_reports:
        description: "Delete ChatGPT-readable workflow status reports under chatgpt_staging/status_reports/"
        required: true
        default: false
        type: boolean
      request_id_filter:
        description: "Optional request id or prefix to clean. Leave blank to clean all selected surfaces."
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
    paths:
      - "chatgpt_staging/cleanup_requests/*.json"

permissions:
  contents: write

concurrency:
  group: chatgpt-staging-cleanup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup:
    uses: ./.github/workflows/reusable-chatgpt-staging-cleanup.yml
    permissions:
      contents: write
    with:
      caller_event_name: ${{ github.event_name }}
      cleanup_requests: ${{ github.event_name != 'workflow_dispatch' || inputs.cleanup_requests }}
      cleanup_in_payloads: ${{ github.event_name != 'workflow_dispatch' || inputs.cleanup_in_payloads }}
      cleanup_out_bundles: ${{ github.event_name == 'workflow_dispatch' && inputs.cleanup_out_bundles || false }}
      cleanup_apply_reports: ${{ github.event_name == 'workflow_dispatch' && inputs.cleanup_apply_reports || false }}
      cleanup_failure_reports: ${{ github.event_name == 'workflow_dispatch' && inputs.cleanup_failure_reports || false }}
      cleanup_status_reports: ${{ github.event_name == 'workflow_dispatch' && inputs.cleanup_status_reports || false }}
      request_id_filter: ${{ inputs.request_id_filter || '' }}
