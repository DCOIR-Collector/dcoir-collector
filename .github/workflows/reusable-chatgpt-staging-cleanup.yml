# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: chatgpt-staging-cleanup.yml
# Purpose: reusable implementation module for chatgpt-staging-cleanup; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Chatgpt Staging Cleanup
run-name: Module Chatgpt Staging Cleanup | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
      cleanup_requests:
        description: Forwarded `cleanup_requests` input from the entry workflow.
        required: false
        type: boolean
        default: true
      cleanup_in_payloads:
        description: Forwarded `cleanup_in_payloads` input from the entry workflow.
        required: false
        type: boolean
        default: true
      cleanup_out_bundles:
        description: Forwarded `cleanup_out_bundles` input from the entry workflow.
        required: false
        type: boolean
        default: false
      cleanup_apply_reports:
        description: Forwarded `cleanup_apply_reports` input from the entry workflow.
        required: false
        type: boolean
        default: false
      cleanup_failure_reports:
        description: Forwarded `cleanup_failure_reports` input from the entry workflow.
        required: false
        type: boolean
        default: false
      cleanup_status_reports:
        description: Forwarded `cleanup_status_reports` input from the entry workflow.
        required: false
        type: boolean
        default: false
      request_id_filter:
        description: Forwarded `request_id_filter` input from the entry workflow.
        required: false
        type: string
        default: ''
    outputs: {}
    secrets: {}

permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'

      - name: Resolve cleanup plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/resolve_chatgpt_staging_cleanup_plan.py \
            --caller-event-name '${{ inputs.caller_event_name }}' \
            --cleanup-requests '${{ inputs.cleanup_requests }}' \
            --cleanup-in-payloads '${{ inputs.cleanup_in_payloads }}' \
            --cleanup-out-bundles '${{ inputs.cleanup_out_bundles }}' \
            --cleanup-apply-reports '${{ inputs.cleanup_apply_reports }}' \
            --cleanup-failure-reports '${{ inputs.cleanup_failure_reports }}' \
            --cleanup-status-reports '${{ inputs.cleanup_status_reports }}' \
            --request-id-filter '${{ inputs.request_id_filter }}' \
            --github-sha "$GITHUB_SHA" \
            --output "$GITHUB_OUTPUT"

      - name: Clean selected ChatGPT staging artifacts
        if: steps.plan.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Helper writes chatgpt_staging/status_reports/chatgpt-staging-cleanup/<id>/workflow_report.md and exports REPORT_PATH.
          python .github/scripts/clean_chatgpt_staging_artifacts.py \
            --request-id-filter '${{ steps.plan.outputs.request_id_filter }}' \
            --cleanup-requests '${{ steps.plan.outputs.cleanup_requests }}' \
            --cleanup-in-payloads '${{ steps.plan.outputs.cleanup_in_payloads }}' \
            --cleanup-out-bundles '${{ steps.plan.outputs.cleanup_out_bundles }}' \
            --cleanup-apply-reports '${{ steps.plan.outputs.cleanup_apply_reports }}' \
            --cleanup-failure-reports '${{ steps.plan.outputs.cleanup_failure_reports }}' \
            --cleanup-status-reports '${{ steps.plan.outputs.cleanup_status_reports }}' \
            --cleanup-marker-path '${{ steps.plan.outputs.cleanup_marker_path }}' \
            --delete-marker-after-success '${{ steps.plan.outputs.delete_marker_after_success }}' \
            --github-env "$GITHUB_ENV"

      - name: Commit cleanup
        if: steps.plan.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REPORT_DIR" || true
          git commit -m "Clean ChatGPT staging artifacts and report [skip ci]" || {
            echo "No cleanup changes to commit"
            exit 0
          }
          git push
          echo "REPORT_PUSHED=true" >> "$GITHUB_ENV"

      - name: Capture cleanup failure report
        if: failure() && steps.plan.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          FILTER='${{ steps.plan.outputs.request_id_filter }}'
          python .github/scripts/write_chatgpt_staging_cleanup_failure_report.py \
            --request-id-filter "$FILTER" \
            --github-env "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REPORT_DIR"
          if git commit -m "Record ChatGPT cleanup failure report [skip ci]" && git push; then
            echo "REPORT_PUSHED=true" >> "$GITHUB_ENV"
          else
            echo "REPORT_PUSHED=false" >> "$GITHUB_ENV"
          fi
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"

      - name: Output final cleanup report URL
        if: always() && steps.plan.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          report_path="${REPORT_PATH:-}"
          if [[ "${REPORT_PUSHED:-false}" != "true" ]]; then
            echo "No pushed cleanup report is available for final URL output."
            exit 0
          fi
          if [[ -z "$report_path" || ! -f "$report_path" ]]; then
            echo "No cleanup report path available for final URL output."
            exit 0
          fi
          branch_name="${GITHUB_REF_NAME:-}"
          if [[ -z "$branch_name" ]]; then
            branch_name="$(git branch --show-current || true)"
          fi
          if [[ -z "$branch_name" ]]; then
            branch_name="main"
          fi
          report_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${branch_name}/${report_path}"
          echo "ChatGPT cleanup report: $report_url"
          echo "## ChatGPT cleanup report" >> "$GITHUB_STEP_SUMMARY"
          echo "$report_url" >> "$GITHUB_STEP_SUMMARY"
