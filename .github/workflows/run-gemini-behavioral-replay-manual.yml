# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-manual-run-gemini-behavioral-replay-manual-0002
# Purpose:
# - Run the governed Gemini behavioral replay harness against selected live Gemini API model and fixture combinations, or produce a diagnostic/fallback report when live evidence cannot be collected.
# Use when:
# - Use when Gemini-governance work needs live model behavior evidence, model comparison, or live replay reporting evidence rather than deterministic response-pack evidence only.
# Do not use when:
# - Do not use as the deterministic replay gate; validate-gemini-behavioral-replay owns deterministic fixture and known-bad validation.
# Result semantics:
# - A successful workflow means the workflow produced trustworthy evidence/report artifacts. Model scorer failures are reported inside the matrix and should not by themselves make the workflow red.
# Trigger model:
# - workflow_dispatch with explicit model, fixture, baseline, and replay controls.
# Required inputs:
# - model selection, custom_models_csv, baseline_model, fixture selection, and replay controls defined in the workflow_dispatch block.
# Required secrets/config:
# - Uses DCOIR_GEMINI_API when live model replay is requested; do not place secret values in reports, logs, or artifacts.
# Runtime dependencies:
# - Uses Gemini behavioral replay Python tools, fixture catalogs, live API configuration, and replay report renderers.
# Expected outputs/readback:
# - Replay response packs/reports, JSON summary, chatgpt-workflow-report-section artifact, and repo-workflows report.
# Safety notes:
# - Report model and fixture evidence without exposing live API secret values.
# Maintenance notes:
# - Keep dispatch inputs, model catalog assumptions, artifact names, and report-section behavior aligned with the workflow inventory and Gemini replay contract.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: run-gemini-behavioral-replay-manual

on:
  workflow_dispatch:
    inputs:
      run_all_viable_catalog_models:
        description: Run every currently viable Gemini catalog model and ignore model checkboxes/CSV
        required: true
        default: false
        type: boolean
      run_gemini_2_5_flash:
        description: Include gemini-2.5-flash
        required: true
        default: false
        type: boolean
      run_gemini_2_5_flash_lite:
        description: Include gemini-2.5-flash-lite
        required: true
        default: false
        type: boolean
      run_gemini_2_5_pro:
        description: Include gemini-2.5-pro
        required: true
        default: false
        type: boolean
      run_gemini_3_flash_preview:
        description: Include gemini-3-flash-preview
        required: true
        default: false
        type: boolean
      run_gemini_3_1_flash_lite:
        description: Include gemini-3.1-flash-lite
        required: true
        default: false
        type: boolean
      run_gemini_3_1_flash_lite_preview:
        description: Include gemini-3.1-flash-lite-preview
        required: true
        default: false
        type: boolean
      run_gemini_3_1_pro_preview:
        description: Include gemini-3.1-pro-preview; default enterprise baseline
        required: true
        default: true
        type: boolean
      run_gemini_3_1_pro_preview_customtools:
        description: Include gemini-3.1-pro-preview-customtools; compatibility/capability discovery candidate
        required: true
        default: false
        type: boolean
      run_gemini_3_5_flash:
        description: Include gemini-3.5-flash; governed production comparison lane
        required: true
        default: true
        type: boolean
      custom_models_csv:
        description: Optional comma-separated currently viable catalog model IDs; ignored when run_all_viable_catalog_models is true
        required: false
        default: ""
        type: string
      baseline_model:
        description: Baseline model for relative scoring dimensions
        required: true
        default: "gemini-3.1-pro-preview"
        type: string
      run_all_active_fixtures:
        description: Run all active fixtures and ignore fixture checkboxes/CSV
        required: true
        default: true
        type: boolean
      run_fixture_issue_124_operator_state:
        description: Include dcoir_operator_state_first_issue_124 when run_all_active_fixtures is false
        required: true
        default: false
        type: boolean
      run_fixture_issue_122_byovd_evidence:
        description: Include dcoir_byovd_evidence_discipline_issue_122 when run_all_active_fixtures is false
        required: true
        default: false
        type: boolean
      run_fixture_issue_123_long_transcript:
        description: Include dcoir_long_transcript_continuity_issue_123 when run_all_active_fixtures is false
        required: true
        default: false
        type: boolean
      custom_fixtures_csv:
        description: Optional comma-separated active fixture IDs; ignored when run_all_active_fixtures is true
        required: false
        default: ""
        type: string
      allow_fallback:
        description: Emit explicit fallback report instead of live evidence when DCOIR_GEMINI_API is unavailable
        required: true
        default: false
        type: boolean
      temperature:
        description: Live replay temperature
        required: true
        default: "1.0"
        type: string

permissions:
  contents: read

concurrency:
  group: run-gemini-behavioral-replay-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live_replay:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DCOIR_GEMINI_API: ${{ secrets.DCOIR_GEMINI_API }}
      RUN_ALL_VIABLE_CATALOG_MODELS: ${{ github.event.inputs.run_all_viable_catalog_models }}
      CUSTOM_MODELS_CSV: ${{ github.event.inputs.custom_models_csv }}
      BASELINE_MODEL: ${{ github.event.inputs.baseline_model }}
      RUN_ALL_ACTIVE_FIXTURES: ${{ github.event.inputs.run_all_active_fixtures }}
      CUSTOM_FIXTURES_CSV: ${{ github.event.inputs.custom_fixtures_csv }}
      ALLOW_FALLBACK: ${{ github.event.inputs.allow_fallback }}
      TEMPERATURE: ${{ github.event.inputs.temperature }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            project_sources/gemini/tools/run_gemini_behavioral_replay.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_schema.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_runner.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_scoring.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_reporting.py

      - name: Resolve replay selections
        shell: bash
        run: |
          set -euo pipefail
          selected_models=()
          if [[ "${{ github.event.inputs.run_gemini_2_5_flash }}" == "true" ]]; then selected_models+=("gemini-2.5-flash"); fi
          if [[ "${{ github.event.inputs.run_gemini_2_5_flash_lite }}" == "true" ]]; then selected_models+=("gemini-2.5-flash-lite"); fi
          if [[ "${{ github.event.inputs.run_gemini_2_5_pro }}" == "true" ]]; then selected_models+=("gemini-2.5-pro"); fi
          if [[ "${{ github.event.inputs.run_gemini_3_flash_preview }}" == "true" ]]; then selected_models+=("gemini-3-flash-preview"); fi
          if [[ "${{ github.event.inputs.run_gemini_3_1_flash_lite }}" == "true" ]]; then selected_models+=("gemini-3.1-flash-lite"); fi
          if [[ "${{ github.event.inputs.run_gemini_3_1_flash_lite_preview }}" == "true" ]]; then selected_models+=("gemini-3.1-flash-lite-preview"); fi
          if [[ "${{ github.event.inputs.run_gemini_3_1_pro_preview }}" == "true" ]]; then selected_models+=("gemini-3.1-pro-preview"); fi
          if [[ "${{ github.event.inputs.run_gemini_3_1_pro_preview_customtools }}" == "true" ]]; then selected_models+=("gemini-3.1-pro-preview-customtools"); fi
          if [[ "${{ github.event.inputs.run_gemini_3_5_flash }}" == "true" ]]; then selected_models+=("gemini-3.5-flash"); fi
          selected_fixtures=()
          if [[ "${{ github.event.inputs.run_fixture_issue_124_operator_state }}" == "true" ]]; then selected_fixtures+=("dcoir_operator_state_first_issue_124"); fi
          if [[ "${{ github.event.inputs.run_fixture_issue_122_byovd_evidence }}" == "true" ]]; then selected_fixtures+=("dcoir_byovd_evidence_discipline_issue_122"); fi
          if [[ "${{ github.event.inputs.run_fixture_issue_123_long_transcript }}" == "true" ]]; then selected_fixtures+=("dcoir_long_transcript_continuity_issue_123"); fi
          IFS=,; echo "SELECTED_MODELS_CSV=${selected_models[*]}" >> "$GITHUB_ENV"
          IFS=,; echo "SELECTED_FIXTURES_CSV=${selected_fixtures[*]}" >> "$GITHUB_ENV"

      - name: Create output directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p project_sources/validation/out_run_gemini_behavioral_replay_manual

      - name: Viable model check
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay
            --output-dir project_sources/validation/out_run_gemini_behavioral_replay_manual/model_check
            --mode live
            --models-csv "$SELECTED_MODELS_CSV"
            --custom-models-csv "$CUSTOM_MODELS_CSV"
            --fixture-ids-csv "$SELECTED_FIXTURES_CSV"
            --custom-fixtures-csv "$CUSTOM_FIXTURES_CSV"
            --baseline-model "$BASELINE_MODEL"
            --selection-report-only
          )
          if [[ "$RUN_ALL_VIABLE_CATALOG_MODELS" == "true" ]]; then
            args+=(--run-all-viable-catalog-models)
          fi
          if [[ "$RUN_ALL_ACTIVE_FIXTURES" == "true" ]]; then
            args+=(--run-all-active-fixtures)
          fi
          model_check_report="project_sources/validation/out_run_gemini_behavioral_replay_manual/model_check/chatgpt_workflow_report_section.md"
          top_level_report="project_sources/validation/out_run_gemini_behavioral_replay_manual/chatgpt_workflow_report_section.md"
          if ! python project_sources/gemini/tools/run_gemini_behavioral_replay.py "${args[@]}"; then
            if [[ -f "$model_check_report" ]]; then
              cp "$model_check_report" "$top_level_report"
            fi
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = Path("project_sources/validation/out_run_gemini_behavioral_replay_manual/model_check/gemini_behavioral_replay_run_report.json")
          section = Path("project_sources/validation/out_run_gemini_behavioral_replay_manual/model_check/chatgpt_workflow_report_section.md")
          top_level = Path("project_sources/validation/out_run_gemini_behavioral_replay_manual/chatgpt_workflow_report_section.md")
          if section.is_file():
              top_level.write_text(section.read_text(encoding="utf-8"), encoding="utf-8")
          payload = json.loads(report.read_text(encoding="utf-8"))
          model_resolution = payload.get("metadata", {}).get("model_resolution", {})
          rejected = model_resolution.get("rejected_selected_models") or []
          selected = set(model_resolution.get("selected_models_to_run") or [])
          baseline = os.environ.get("BASELINE_MODEL", "gemini-3.1-pro-preview")
          if rejected:
              raise SystemExit(f"Selected model(s) rejected by catalog or checkbox gate: {rejected}")
          if baseline not in selected:
              raise SystemExit(f"Baseline model {baseline!r} is not selected for replay.")
          PY

      - name: Run live or fallback Gemini behavioral replay
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay
            --output-dir project_sources/validation/out_run_gemini_behavioral_replay_manual
            --mode live
            --models-csv "$SELECTED_MODELS_CSV"
            --custom-models-csv "$CUSTOM_MODELS_CSV"
            --fixture-ids-csv "$SELECTED_FIXTURES_CSV"
            --custom-fixtures-csv "$CUSTOM_FIXTURES_CSV"
            --baseline-model "$BASELINE_MODEL"
            --temperature "$TEMPERATURE"
          )
          if [[ "$RUN_ALL_VIABLE_CATALOG_MODELS" == "true" ]]; then
            args+=(--run-all-viable-catalog-models)
          fi
          if [[ "$RUN_ALL_ACTIVE_FIXTURES" == "true" ]]; then
            args+=(--run-all-active-fixtures)
          fi
          if [[ "$ALLOW_FALLBACK" == "true" ]]; then
            args+=(--allow-fallback)
          fi
          python project_sources/gemini/tools/run_gemini_behavioral_replay.py "${args[@]}"

      - name: Publish replay summary to job summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report="project_sources/validation/out_run_gemini_behavioral_replay_manual/chatgpt_workflow_report_section.md"
          if [[ -f "$report" ]]; then
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Gemini Behavioral Replay" >> "$GITHUB_STEP_SUMMARY"
            echo "No replay report section was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload live replay artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: run-gemini-behavioral-replay-manual-results
          path: |
            project_sources/validation/out_run_gemini_behavioral_replay_manual/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-workflow-report-section
          path: |
            project_sources/validation/out_run_gemini_behavioral_replay_manual/chatgpt_workflow_report_section.md
          if-no-files-found: warn
          retention-days: 14
