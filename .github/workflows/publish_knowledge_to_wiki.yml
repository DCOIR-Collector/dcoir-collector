# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-publishing-publish_knowledge_to_wiki-0020 (Airtable formula preview; final key may use table autonumber suffix)
# Purpose:
# - Publish maintained knowledge markdown to the repository wiki through a dedicated git worktree.
# Use when:
# - Use after knowledge files change and the wiki should mirror maintained knowledge content.
# Do not use when:
# - Do not use for project-source docs, workflow headers, or non-knowledge publication.
# Trigger model:
# - push branches: main paths: knowledge/**, .github/workflows/publish_knowledge_to_wiki.yml; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Requires wiki git access and knowledge/** source files.
# Expected outputs/readback:
# - Wiki update commit/push and repo-workflows report.
# Safety notes:
# - Only publishes knowledge surfaces; verify wiki availability and avoid overwriting unrelated wiki content.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep the Airtable GitHub Workflow Inventory row aligned when general routing guidance changes.
# Airtable routing:
# - General task-routing guidance belongs in Airtable table `GitHub Workflow Inventory`.
# - This header owns workflow-specific execution guidance; the workflow body remains the executable behavior.
name: Publish Knowledge to Wiki

# DCOIR adaptation of the Nimble docs-to-wiki pattern.
# Source folder: knowledge/
# Destination repo: malwaredevil/dcoir-collector.wiki.git

on:
  push:
    branches:
      - main
    paths:
      - 'knowledge/**'
      - '.github/workflows/publish_knowledge_to_wiki.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-knowledge-to-wiki
  cancel-in-progress: false

env:
  USER_TOKEN: ${{ secrets.DCOIR_WIKI_PUSH_TOKEN }}
  USER_NAME: github-actions[bot]
  USER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  OWNER: ${{ github.repository_owner }}
  REPOSITORY_NAME: ${{ github.event.repository.name }}

jobs:
  publish_knowledge_to_wiki:
    name: Publish Knowledge to Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Knowledge source folder
        shell: bash
        run: |
          set -euo pipefail
          test -d knowledge
          test -f knowledge/README.md

      - name: Validate maintained knowledge inventory with Gemini validator
        shell: bash
        run: |
          set -euo pipefail
          validator_output_dir="$RUNNER_TEMP/publish_knowledge_to_wiki_validator"
          mkdir -p "$validator_output_dir"
          python3 project_sources/gemini/tools/validate_dcoir_gemini_bundle.py \
            --source-root project_sources/gemini/bundle_source \
            --output-dir "$validator_output_dir"

      - name: Pull content from wiki
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${USER_TOKEN}" ]; then
            echo "Missing repository secret DCOIR_WIKI_PUSH_TOKEN."
            exit 1
          fi

          wiki_url="https://x-access-token:${USER_TOKEN}@github.com/${OWNER}/${REPOSITORY_NAME}.wiki.git"
          git clone "$wiki_url" tmp_wiki
          cd tmp_wiki
          git config user.name "$USER_NAME"
          git config user.email "$USER_EMAIL"

      - name: Push Knowledge content to wiki
        shell: bash
        run: |
          set -euo pipefail
          wiki_url="https://x-access-token:${USER_TOKEN}@github.com/${OWNER}/${REPOSITORY_NAME}.wiki.git"

          # Mirror the maintained knowledge folder into the wiki.
          # README.md becomes Home.md so the wiki landing page is useful.
          rsync -av --delete --exclude '.git' --exclude 'README.md' knowledge/ tmp_wiki/
          cp knowledge/README.md tmp_wiki/Home.md
          rm -f tmp_wiki/README.md

          cd tmp_wiki
          git add .
          if git diff --cached --quiet; then
            echo "No wiki content changes to publish."
            exit 0
          fi

          git commit -m "Update Knowledge wiki content"
          git push "$wiki_url" HEAD
