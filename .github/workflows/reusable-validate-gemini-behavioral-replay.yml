# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: validate-gemini-behavioral-replay.yml
# Purpose: reusable implementation module for validate-gemini-behavioral-replay; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Validate Gemini Behavioral Replay
run-name: Module Validate Gemini Behavioral Replay | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
    outputs: {}
    secrets: {}

permissions:
  contents: read

jobs:
  validate_replay:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            project_sources/gemini/tools/run_gemini_behavioral_replay.py \
            project_sources/gemini/tools/run_gemini_behavioral_replay_validation_suite.py \
            project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            project_sources/gemini/tools/render_gemini_behavioral_replay_report.py \
            project_sources/gemini/tools/validate_gemini_behavioral_replay_fixtures.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_schema.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_runner.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_scoring.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_reporting.py

      - name: Create output directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p project_sources/validation/out_validate_gemini_behavioral_replay

      - name: Run deterministic replay validation suite
        shell: bash
        run: |
          set -euo pipefail
          python project_sources/gemini/tools/run_gemini_behavioral_replay_validation_suite.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --output-dir project_sources/validation/out_validate_gemini_behavioral_replay

      - name: Upload deterministic replay artifacts
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: validate-gemini-behavioral-replay-results
          path: |
            project_sources/validation/out_validate_gemini_behavioral_replay/**
          if-no-files-found: warn
          retention-days: 14

      - name: Write ChatGPT workflow report section
        if: always()
        shell: bash
        env:
          REPORT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPORT_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          REPORT_EVENT_NAME: ${{ inputs.caller_event_name }}
        run: |
          set -euo pipefail
          mkdir -p chatgpt_workflow_report_section
          cat > chatgpt_workflow_report_section/chatgpt_workflow_report_section.md <<REPORT
          ## Validation summary

          - workflow: validate-gemini-behavioral-replay
          - validation_scope: deterministic Gemini behavioral replay validation
          - workflow_run_id: ${GITHUB_RUN_ID}
          - workflow_run_attempt: ${GITHUB_RUN_ATTEMPT}
          - source_event: ${REPORT_EVENT_NAME}
          - head_sha: ${REPORT_HEAD_SHA}
          - ref: ${REPORT_REF}
          - primary_artifact: validate-gemini-behavioral-replay-results
          - artifact_note: includes deterministic replay outputs, rendered replay report, and known-bad response-pack checks when produced.

          The workflow conclusion indicates the configured job passed or failed. For readiness claims, also read back the uploaded artifact and confirm the expected fixture and response-pack outputs are present.
          REPORT

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
