# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: windows-powershell-51.yml
# Purpose: reusable implementation module for Windows PowerShell 5.1 parser validation; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Windows PowerShell 5.1
run-name: Module Windows PowerShell 5.1 | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/pull_request/workflow_dispatch branching.
        required: false
        type: string
        default: 'workflow_call'
    outputs: {}
    secrets: {}

permissions:
  contents: read

jobs:
  validate_windows_powershell_51:
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Confirm Windows PowerShell 5.1
        run: |
          $version = $PSVersionTable.PSVersion
          $edition = $PSVersionTable.PSEdition
          Write-Host "PowerShell version: $version"
          Write-Host "PowerShell edition: $edition"
          if ($version.Major -ne 5 -or $version.Minor -ne 1) {
            throw "Expected Windows PowerShell 5.1 but found $version."
          }
          if ($edition -and $edition -ne 'Desktop') {
            throw "Expected Windows PowerShell Desktop edition but found $edition."
          }

      - name: Validate Windows PowerShell 5.1 parser compatibility
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\validate-windows-powershell-51.ps1
          if ($LASTEXITCODE -ne 0) {
            throw 'Windows PowerShell 5.1 validation failed.'
          }

      - name: Validate repository composite PowerShell action through Windows PowerShell
        uses: ./.github/actions/validate-powershell-syntax
        with:
          use-windows-powershell: 'true'
          require-files: 'false'
          include-collector-parts: 'true'

      - name: Write ChatGPT workflow report section
        if: always()
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Windows PowerShell 5.1 validation summary

          - workflow: windows-powershell-51
          - validation_scope: Windows PowerShell 5.1 parser compatibility
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - caller_event_name: ${{ inputs.caller_event_name }}
          - powershell_version: $($PSVersionTable.PSVersion)
          - powershell_edition: $($PSVersionTable.PSEdition)

          The workflow conclusion is the authoritative pass/fail signal for Windows PowerShell 5.1 parser compatibility. It is not a substitute for collector runtime harness validation.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
