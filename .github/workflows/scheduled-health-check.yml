# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-scheduled-health-check-0022
# Purpose:
# - Run scheduled or manual health checks for required repo surfaces and quick smoke validation.
# Use when:
# - Use for routine health monitoring or when a new session needs a lightweight repo health signal.
# Do not use when:
# - Do not use as deep regression or release readiness proof.
# Trigger model:
# - schedule: 15 6 * * 1; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses repository required-surface and validation smoke checks defined in the workflow.
# Expected outputs/readback:
# - Health-check artifact/report and repo-workflows report.
# Safety notes:
# - A pass is a health signal only; use targeted validation for release or workflow-specific readiness.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: scheduled-health-check

on:
  schedule:
    - cron: '15 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-health-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  health_check:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check required governed surfaces
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/check_required_surfaces.py --profile scheduled_health_check
          if ($LASTEXITCODE -ne 0) {
            throw 'Required surface validation failed.'
          }
          python project_sources/github_actions/tools/check_gemini_manifest_surfaces.py --source-root project_sources/gemini/bundle_source
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini manifest surface validation failed.'
          }

      - name: Check for packaging residue
        shell: pwsh
        run: |
          $residue = Get-ChildItem -Path . -Recurse -Force -File |
            Where-Object {
              $_.FullName.Contains('\\__pycache__\\') -or
              $_.Extension -eq '.pyc' -or
              $_.Name -eq '.DS_Store'
            }
          if ($residue) {
            $residue | ForEach-Object { Write-Error $_.FullName }
            throw 'Packaging residue found in working tree.'
          }

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Run validate_DCOIR_Run fixture tests
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\tools\run_validate_dcoir_run_fixture_tests.ps1 -ValidatorPath .\collector\harness\validate_DCOIR_Run.ps1 -OutputRoot .\validation\out_health_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_health_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_health_documentation_quality | Out-Null
          python project_sources/collector/tools/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/validation/out_health_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector documentation quality gate failed before collector build.'
          }

      - name: Build fresh collector runtime zip for harness
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_health_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_health_collector | Out-Null
          python project_sources/collector/tools/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/validation/out_health_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery package smoke test failed.'
          }
