# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-scheduled-health-check-0022
# Purpose:
# - Run scheduled or manual health checks for required repo surfaces and quick smoke validation.
# Use when:
# - Use for routine health monitoring or when a new session needs a lightweight repo health signal.
# Do not use when:
# - Do not use as deep regression or release readiness proof.
# Trigger model:
# - schedule: 15 6 * * 1; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses repository required-surface checks, syntax checks, Gemini smoke build, collector package smoke build, validate_DCOIR_Run fixture tests, and collector documentation quality validation.
# Expected outputs/readback:
# - Health-check artifact, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - A pass is a health signal only; use targeted validation for release or workflow-specific readiness.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 30 Maintenance - Scheduled Health Check
run-name: Scheduled Health Check | ${{ github.event_name }} | #${{ github.run_number }}

on:
  schedule:
    - cron: '15 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-health-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  health_check:
    uses: ./.github/workflows/reusable-collector-validation.yml
    permissions:
      contents: read
    with:
      workflow_name: scheduled-health-check
      surface_profile: scheduled_health_check
      validation_prefix: health
      artifact_name: scheduled-health-check-results
      artifact_paths: |
        project_sources/validation/out_health_gemini/**
        project_sources/validation/out_health_validate_dcoir_run_fixtures/**
        project_sources/validation/out_health_documentation_quality/**
        project_sources/validation/out_health_collector/**
        project_sources/collector/powershell_review_assist_health_workflow_report.json
        project_sources/collector/powershell_review_assist_health_workflow_report.md
      artifact_retention_days: 14
      report_title: Scheduled health-check summary
      report_scope: routine health-check validation
      report_note: includes Gemini smoke-build output, validate_DCOIR_Run fixture output, documentation-quality output, collector package smoke-build output, and PowerShell review-assist JSON/Markdown when produced.
      report_claim: The workflow conclusion is the authoritative pass/fail signal for this health lane. Treat this as a routine health signal, not FullRegression or release-readiness proof.
      run_packaging_residue_check: true
      run_harness_assembly_parity: false
      run_collector_package_smoke: true
