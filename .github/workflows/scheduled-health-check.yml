name: scheduled-health-check

on:
  schedule:
    - cron: '15 6 * * 1'
  workflow_dispatch:

jobs:
  health_check:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Check required governed surfaces
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'project_sources/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/CP-02_DCOIR_Change_Log.txt',
            'project_sources/DCOIR_Collector.ps1',
            'project_sources/run_DCOIR_Tests.ps1',
            'project_sources/LOG-43_DCOIR_GitHub_Automation_And_AI_Enablement_Strategy_2026-04-05.txt',
            'supporting_assets/DCOIR_Collector.zip',
            '.github/workflows/validate-on-push.yml',
            '.github/workflows/manual-full-validation.yml',
            '.github/workflows/scheduled-health-check.yml',
            '.github/dependabot.yml'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required governed surfaces: $($missing -join ', ')"
          }

      - name: Check for packaging residue
        shell: pwsh
        run: |
          $residue = Get-ChildItem -Path . -Recurse -Force -File |
            Where-Object {
              $_.FullName -match '\\__pycache__\\' -or
              $_.Name -match '\\.pyc$' -or
              $_.Name -eq '.DS_Store'
            }
          if ($residue) {
            $residue | ForEach-Object { Write-Error $_.FullName }
            throw 'Packaging residue found in working tree.'
          }

      - name: Run representative retrieval suite
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\run_DCOIR_Tests.ps1 -Suite Retrieval -MasterZipPath ..\supporting_assets\DCOIR_Collector.zip

      - name: Render browser-readable summary
        if: always()
        shell: pwsh
        run: |
          $summaryTxt = Get-ChildItem -Path project_sources/TestResults -Recurse -File -Filter summary.txt -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $summaryJson = Get-ChildItem -Path project_sources/TestResults -Recurse -File -Filter summary.json -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## scheduled-health-check'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Routine purpose: weekly drift, hygiene, and representative regression.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Representative suite: `Retrieval`'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Harness zip path override: `..\\supporting_assets\\DCOIR_Collector.zip`'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if ($summaryTxt) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Latest harness summary'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Get-Content -LiteralPath $summaryTxt.FullName | ForEach-Object {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
            }
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }
          else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '_No harness summary.txt was found._'
          }

          if ($summaryJson) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Summary JSON: \\`$($summaryJson.FullName)\\`"
          }

      - name: Upload health-check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-health-check-results
          path: |
            project_sources/TestResults/**
          if-no-files-found: warn
          retention-days: 14
