name: scheduled-health-check

on:
  schedule:
    - cron: '15 6 * * 1'
  workflow_dispatch:

jobs:
  health_check:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check required governed surfaces
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'project_sources/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/CP-02_DCOIR_Change_Log.txt',
            'project_sources/LOG-60_DCOIR_Major_Version_Collector_And_Gemini_Feature_Wave_Implementation_2026-04-08.txt',
            'project_sources/live_test_notes/2026-04-08_DCOIR_Major_Version_Functionality_Test_Plan.md.txt',
            'project_sources/DCOIR_Collector.ps1',
            'project_sources/run_DCOIR_Tests.ps1',
            'project_sources/collector_parts/DCOIR_Collector.04B_Feature_Wave_Targeted_Collection.ps1',
            'project_sources/Collector_Runtime_Package_Manifest.json.txt',
            'project_sources/DOC-11_DCOIR_Gemini_Creation_Pipeline_v1_0_0.txt',
            'project_sources/DOC-12_DCOIR_Collector_Runtime_Packaging_Pipeline_v1_0_0.txt',
            'project_sources/LOG-43_DCOIR_GitHub_Automation_And_AI_Enablement_Strategy_2026-04-05.txt',
            'supporting_assets/DCOIR_Collector.zip',
            '.github/workflows/validate-on-push.yml',
            '.github/workflows/manual-full-validation.yml',
            '.github/workflows/scheduled-health-check.yml',
            '.github/workflows/manual-gemini-bundle-build.yml',
            '.github/workflows/manual-collector-runtime-package-build.yml',
            '.github/dependabot.yml'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required governed surfaces: $($missing -join ', ')"
          }

      - name: Check for packaging residue
        shell: pwsh
        run: |
          $residue = Get-ChildItem -Path . -Recurse -Force -File |
            Where-Object {
              $_.FullName.Contains('\__pycache__\') -or
              $_.Extension -eq '.pyc' -or
              $_.Name -eq '.DS_Store'
            }
          if ($residue) {
            $residue | ForEach-Object { Write-Error $_.FullName }
            throw 'Packaging residue found in working tree.'
          }

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Run representative major-version suite
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\run_DCOIR_Tests.ps1 -Suite MajorVersion -MasterZipPath ..\supporting_assets\DCOIR_Collector.zip

      - name: Smoke-test Gemini bundle build algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_health_gemini -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_health_gemini | Out-Null
          python project_sources/generation_validation/build_dcoir_gemini_release.py --source-root project_sources/DCOIR_Gemini_Bundle_Source --output-dir project_sources/generation_validation/out_health_gemini
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle smoke test failed.'
          }

      - name: Smoke-test collector delivery package algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_health_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_health_collector | Out-Null
          python project_sources/generation_validation/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/generation_validation/out_health_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery package smoke test failed.'
          }

      - name: Upload health-check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scheduled-health-check-results
          path: |
            project_sources/TestResults/**
            project_sources/generation_validation/out_health_gemini/**
            project_sources/generation_validation/out_health_collector/**
          if-no-files-found: warn
          retention-days: 14
