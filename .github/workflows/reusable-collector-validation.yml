# DCOIR reusable workflow module.
# Entry workflows keep triggers, permissions, concurrency, and operator-facing inputs.
name: 99 Module - Collector Validation
run-name: Module Collector Validation | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      workflow_name:
        description: Entry workflow name for reports.
        required: true
        type: string
      surface_profile:
        description: check_required_surfaces.py profile.
        required: true
        type: string
      validation_prefix:
        description: Output suffix used for project_sources/validation/out_<prefix> paths.
        required: true
        type: string
      artifact_name:
        description: Primary artifact name.
        required: true
        type: string
      artifact_paths:
        description: Newline-separated artifact path set.
        required: true
        type: string
      artifact_retention_days:
        description: Primary artifact retention.
        required: false
        default: 14
        type: number
      report_title:
        description: ChatGPT report title.
        required: true
        type: string
      report_scope:
        description: Short validation scope for the ChatGPT report.
        required: true
        type: string
      report_note:
        description: Artifact note for the ChatGPT report.
        required: true
        type: string
      report_claim:
        description: Bounded claim guidance for the ChatGPT report.
        required: true
        type: string
      run_required_surfaces:
        required: false
        default: true
        type: boolean
      run_packaging_residue_check:
        required: false
        default: false
        type: boolean
      run_documentation_self_tests:
        required: false
        default: true
        type: boolean
      run_windows_powershell_5_1_syntax:
        required: false
        default: false
        type: boolean
      run_harness_assembly_parity:
        required: false
        default: true
        type: boolean
      run_validate_dcoir_fixtures:
        required: false
        default: true
        type: boolean
      run_documentation_quality:
        required: false
        default: true
        type: boolean
      run_powershell_review_assist:
        required: false
        default: true
        type: boolean
      run_gemini_smoke_build:
        required: false
        default: true
        type: boolean
      run_collector_package_smoke:
        required: false
        default: false
        type: boolean
      build_runtime_for_harness:
        required: false
        default: false
        type: boolean
      run_harness_suite:
        required: false
        default: false
        type: boolean
      harness_suite:
        required: false
        default: Core
        type: string

    outputs: {}
    secrets: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'

      - name: Set up Python runtime
        uses: ./.github/actions/setup-python-runtime
        with:
          python-version: "3.11"

      - name: Check required governed surfaces
        if: ${{ inputs.run_required_surfaces }}
        uses: ./.github/actions/verify-required-surfaces
        with:
          profile: ${{ inputs.surface_profile }}

      - name: Check for packaging residue
        if: ${{ inputs.run_packaging_residue_check }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $residue = Get-ChildItem -Path . -Recurse -Force -File |
            Where-Object {
              $_.FullName.Contains('\__pycache__\') -or
              $_.Extension -eq '.pyc' -or
              $_.Name -eq '.DS_Store'
            }
          if ($residue) {
            $residue | ForEach-Object { Write-Error $_.FullName }
            throw 'Packaging residue found in working tree.'
          }

      - name: Validate Python syntax
        uses: ./.github/actions/validate-python-syntax

      - name: Run documentation validator self-tests
        if: ${{ inputs.run_documentation_self_tests }}
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        uses: ./.github/actions/validate-powershell-syntax

      - name: Validate Windows PowerShell 5.1 syntax
        if: ${{ inputs.run_windows_powershell_5_1_syntax }}
        uses: ./.github/actions/validate-powershell-syntax
        with:
          use-windows-powershell: "true"

      - name: Assemble generated collector harness
        if: ${{ inputs.run_harness_assembly_parity || inputs.run_harness_suite }}
        uses: ./.github/actions/assemble-collector-harness

      - name: Validate generated harness Windows PowerShell 5.1 syntax
        if: ${{ (inputs.run_harness_assembly_parity || inputs.run_harness_suite) && inputs.run_windows_powershell_5_1_syntax }}
        uses: ./.github/actions/validate-powershell-syntax
        with:
          paths: |
            project_sources/collector/harness/run_DCOIR_Tests.generated.ps1
          require-files: "true"
          use-windows-powershell: "true"

      - name: Run validate_DCOIR_Run fixture tests
        if: ${{ inputs.run_validate_dcoir_fixtures }}
        uses: ./.github/actions/run-validate-dcoir-fixtures
        with:
          output-root: .\validation\out_${{ inputs.validation_prefix }}_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        if: ${{ inputs.run_documentation_quality }}
        uses: ./.github/actions/run-collector-documentation-quality
        with:
          output-json: project_sources/validation/out_${{ inputs.validation_prefix }}_documentation_quality/collector_documentation_quality.json

      - name: Run PowerShell review-assist report
        if: ${{ inputs.run_powershell_review_assist }}
        uses: ./.github/actions/run-powershell-review-assist
        with:
          json-output: project_sources/collector/powershell_review_assist_${{ inputs.validation_prefix }}_workflow_report.json
          markdown-output: project_sources/collector/powershell_review_assist_${{ inputs.validation_prefix }}_workflow_report.md

      - name: Smoke-test collector runtime package build
        if: ${{ inputs.run_collector_package_smoke }}
        uses: ./.github/actions/smoke-build-collector-package
        with:
          output-dir: project_sources/validation/out_${{ inputs.validation_prefix }}_collector

      - name: Build fresh collector runtime zip for harness
        if: ${{ inputs.build_runtime_for_harness }}
        uses: ./.github/actions/build-collector-runtime-for-harness
        with:
          output-dir: project_sources/validation/out_${{ inputs.validation_prefix }}_collector

      - name: Run selected collector harness suite
        if: ${{ inputs.run_harness_suite }}
        shell: pwsh
        timeout-minutes: 120
        working-directory: project_sources
        env:
          SELECTED_HARNESS_SUITE: ${{ inputs.harness_suite }}
        run: |
          $suite = $env:SELECTED_HARNESS_SUITE
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\harness\run_DCOIR_Tests.generated.ps1 -CollectorPath $env:HARNESS_COLLECTOR_PATH -Suite $suite -MasterZipPath $env:HARNESS_RUNTIME_ZIP -CollectorStepTimeoutSeconds 600
          if ($LASTEXITCODE -ne 0) {
            throw "Collector harness suite failed: $suite"
          }

      - name: Smoke-test Gemini bundle build
        if: ${{ inputs.run_gemini_smoke_build }}
        uses: ./.github/actions/smoke-build-gemini-bundle
        with:
          output-dir: project_sources/validation/out_${{ inputs.validation_prefix }}_gemini

      - name: Upload validation artifacts
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_paths }}
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        env:
          REPORT_TITLE: ${{ inputs.report_title }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          REPORT_SCOPE: ${{ inputs.report_scope }}
          PRIMARY_ARTIFACT: ${{ inputs.artifact_name }}
          REPORT_NOTE: ${{ inputs.report_note }}
          REPORT_CLAIM: ${{ inputs.report_claim }}
          SELECTED_HARNESS_SUITE: ${{ inputs.harness_suite }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## $env:REPORT_TITLE

          - workflow: $env:WORKFLOW_NAME
          - validation_scope: $env:REPORT_SCOPE
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - event_name: $env:GITHUB_EVENT_NAME
          - selected_harness_suite: $env:SELECTED_HARNESS_SUITE
          - primary_artifact: $env:PRIMARY_ARTIFACT
          - artifact_note: $env:REPORT_NOTE

          $env:REPORT_CLAIM
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
