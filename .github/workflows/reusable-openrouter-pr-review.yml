# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: openrouter-pr-review.yml
# Purpose: reusable implementation module for operator-triggered DCOIR Review; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - DCOIR Review
run-name: Module DCOIR Review | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs: {}
    outputs: {}
    secrets:
      OPENROUTER_API_KEY:
        description: Explicit forwarded OpenRouter API key from the entry workflow.
        required: true

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    name: DCOIR review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download static validation context from last validate-on-pr run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          DEFAULT_BRANCH=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.default_branch // "main"' 2>/dev/null || echo "main")
          PR_HEAD_SHA=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.sha' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD_SHA" ]; then
            PR_HEAD_SHA="unavailable"
            echo "Could not determine PR head SHA; continuing with trusted baseline static validation context lookup."
          else
            echo "PR head SHA: $PR_HEAD_SHA"
          fi

          RUN_LINE=$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/validate-on-pr.yml/runs" \
            -f event=workflow_dispatch \
            -f branch="$DEFAULT_BRANCH" \
            -f per_page=10 \
            --jq '([.workflow_runs[] | select(.status == "completed" and (.conclusion == "success" or .conclusion == "failure"))] | sort_by(.updated_at) | reverse | .[0] // empty) | "\(.id)\t\(.conclusion)\t\(.head_sha // "")"' 2>/dev/null || echo "")
          RUN_ID=$(printf '%s' "$RUN_LINE" | cut -f1)
          RUN_CONCLUSION=$(printf '%s' "$RUN_LINE" | cut -f2)
          VALIDATION_HEAD_SHA=$(printf '%s' "$RUN_LINE" | cut -f3)
          if [ -z "$RUN_ID" ]; then
            echo "No completed trusted default-branch workflow_dispatch validate-on-pr run found; skipping context download."
            exit 0
          fi
          echo "Found trusted baseline validate-on-pr run: $RUN_ID (conclusion: $RUN_CONCLUSION)"

          RUN_METADATA=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID" \
            --jq '"\(.event // "")\t\(.head_branch // "")\t\(.head_sha // "")"' 2>/dev/null || echo "")
          RUN_EVENT=$(printf '%s' "$RUN_METADATA" | cut -f1)
          RUN_HEAD_BRANCH=$(printf '%s' "$RUN_METADATA" | cut -f2)
          RUN_HEAD_SHA=$(printf '%s' "$RUN_METADATA" | cut -f3)
          if [ -n "$RUN_HEAD_SHA" ]; then
            VALIDATION_HEAD_SHA="$RUN_HEAD_SHA"
          fi
          if [ "$RUN_EVENT" != "workflow_dispatch" ] || [ "$RUN_HEAD_BRANCH" != "$DEFAULT_BRANCH" ]; then
            printf 'validate-on-pr run %s had event %s on branch %s; skipping static context because only default-branch workflow_dispatch artifacts are trusted review input.\n' "$RUN_ID" "$RUN_EVENT" "$RUN_HEAD_BRANCH"
            exit 0
          fi
          echo "Static validation context trust source: $RUN_EVENT on $RUN_HEAD_BRANCH (head SHA: $VALIDATION_HEAD_SHA)."

          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "validate-on-pr-results" and .expired == false) | .id' 2>/dev/null | head -1 || echo "")
          if [ -z "$ARTIFACT_ID" ]; then
            echo "validate-on-pr-results artifact not found in run $RUN_ID; skipping."
            exit 0
          fi
          echo "Downloading artifact $ARTIFACT_ID..."

          mkdir -p /tmp/review-assist-context
          gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
            --jq '.[].filename' > /tmp/review-assist-context/changed_files.txt 2>/dev/null || true
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/review-assist-context/artifact.zip 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "Artifact download failed; skipping context injection."
            exit 0
          fi

          export RUN_ID RUN_CONCLUSION PR_HEAD_SHA VALIDATION_HEAD_SHA
          if ! python .github/scripts/build_openrouter_static_validation_context.py \
            --artifact-zip /tmp/review-assist-context/artifact.zip \
            --context-root /tmp/review-assist-context \
            --changed-files /tmp/review-assist-context/changed_files.txt \
            --github-env "$GITHUB_ENV"; then
            echo "Static validation context generation failed; skipping context injection."
            exit 0
          fi

      - name: Run DCOIR review
        env:
          PYTHONUNBUFFERED: '1'
          GITHUB_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          TRIGGER_COMMENT_ID: ${{ github.event.comment.id }}
          TRIGGER_COMMENT_BODY: ${{ github.event.comment.body }}
          TRIGGER_AUTHOR: ${{ github.event.comment.user.login }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          OPENROUTER_REVIEW_CONFIG: .github/openrouter-pr-review-pareto.yml
          REVIEW_ASSIST_CONTEXT_PATH: ${{ env.REVIEW_ASSIST_CONTEXT_PATH }}
          DCOIR_REVIEW_DEBUG_ARTIFACT_DIR: dcoir-review-debug
        run: python -u scripts/openrouter_pr_review_entrypoint.py

      - name: Write DCOIR review debug report section
        if: always()
        shell: bash
        env:
          DCOIR_REVIEW_DEBUG_ARTIFACT_DIR: dcoir-review-debug
          DCOIR_REVIEW_REPORT_SECTION_DIR: chatgpt-workflow-report-section
          SOURCE_WORKFLOW_NAME: ${{ github.workflow }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.run_attempt }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          debug_dir="${DCOIR_REVIEW_DEBUG_ARTIFACT_DIR:-dcoir-review-debug}"
          report_dir="${DCOIR_REVIEW_REPORT_SECTION_DIR:-chatgpt-workflow-report-section}"
          if [[ ! -d "$debug_dir" ]]; then
            echo "No DCOIR review debug directory found; skipping markdown report section."
            exit 0
          fi
          mkdir -p "$report_dir"
          python scripts/write_dcoir_review_debug_report_section.py \
            --debug-dir "$debug_dir" \
            --output "$report_dir/chatgpt_workflow_report_section.md"
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "$report_dir/chatgpt_workflow_report_section.md" ]]; then
            cat "$report_dir/chatgpt_workflow_report_section.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload DCOIR review workflow report section
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt-workflow-report-section/chatgpt_workflow_report_section.md
          if-no-files-found: ignore
          retention-days: '7'

      - name: Upload DCOIR review debug artifact
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: dcoir-review-debug-${{ github.event.issue.number }}-${{ github.run_id }}
          path: dcoir-review-debug
          if-no-files-found: ignore
          retention-days: '7'
