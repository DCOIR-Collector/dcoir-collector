# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-collector-documentation-quality-0008
# Purpose:
# - Run the collector documentation quality validator and upload documentation-quality evidence.
# Use when:
# - Use when collector function/file-help documentation coverage or documentation-quality gating needs manual verification.
# Do not use when:
# - Do not use as the full collector regression suite; use validate-on-push or manual-full-validation for broader regression.
# Trigger model:
# - pull_request/push paths for collector documentation/source/help/tooling; schedule: 30 7 * * 1; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses project_sources/collector/tools/verify_collector_documentation_quality.py and its self-tests.
# Expected outputs/readback:
# - Uploaded documentation quality artifact and repo-workflows report.
# Safety notes:
# - Treat failures as documentation coverage/readiness gaps, not as runtime collector failures by default.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: collector-documentation-quality

on:
  pull_request:
    paths:
      - '.github/workflows/collector-documentation-quality.yml'
      - 'project_sources/collector/**'
      - 'project_sources/validation/required_surfaces/**'
  push:
    paths:
      - '.github/workflows/collector-documentation-quality.yml'
      - 'project_sources/collector/**'
      - 'project_sources/validation/required_surfaces/**'
  schedule:
    - cron: '30 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collector-documentation-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  documentation_quality:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          python -m py_compile project_sources/collector/tools/verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation audit script syntax validation failed.'
          }
          python -m py_compile project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation audit self-test script syntax validation failed.'
          }

      - name: Run validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation audit validator self-tests failed.'
          }

      - name: Validate PowerShell syntax for collector sources
        shell: pwsh
        run: |
          $psFiles = @(
            'project_sources/collector/source/DCOIR_Collector.ps1',
            'project_sources/collector/harness/run_DCOIR_Tests.ps1'
          ) + @(Get-ChildItem -LiteralPath project_sources/collector/source/parts -File -Filter '*.ps1' | ForEach-Object { $_.FullName })
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'Collector PowerShell syntax validation failed.'
          }

      - name: Run auto-discovery documentation audit
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_collector_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_collector_documentation_quality | Out-Null
          python project_sources/collector/tools/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/validation/out_collector_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions

      - name: Upload documentation audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: collector-documentation-quality
          path: |
            project_sources/validation/out_collector_documentation_quality/**
          if-no-files-found: warn
          retention-days: 21
