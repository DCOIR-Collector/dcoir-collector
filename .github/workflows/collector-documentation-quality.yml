# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-collector-documentation-quality-0008
# Purpose:
# - Run the collector documentation quality validator and upload documentation-quality evidence.
# Use when:
# - Use when collector function/file-help documentation coverage or documentation-quality gating needs manual verification.
# Do not use when:
# - Do not use as the full collector regression suite; use validate-on-push or manual-full-validation for broader regression.
# Trigger model:
# - pull_request/push paths for collector documentation/source/help/tooling; schedule: 30 7 * * 1; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses project_sources/collector/tools/verify_collector_documentation_quality.py and its self-tests.
# Expected outputs/readback:
# - Uploaded documentation quality artifact, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Treat failures as documentation coverage/readiness gaps, not as runtime collector failures by default.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 23 Validation - Collector Documentation Quality
run-name: Collector Documentation Quality | #${{ github.run_number }}

on:
  pull_request:
    paths:
      - '.github/workflows/collector-documentation-quality.yml'
      - 'project_sources/collector/**'
      - 'project_sources/validation/required_surfaces/**'
  push:
    paths:
      - '.github/workflows/collector-documentation-quality.yml'
      - 'project_sources/collector/**'
      - 'project_sources/validation/required_surfaces/**'
  schedule:
    - cron: '30 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collector-documentation-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  documentation_quality:
    uses: ./.github/workflows/reusable-collector-documentation-quality.yml
    permissions:
      contents: read
    with:
      caller_event_name: ${{ github.event_name }}
