name: collector-documentation-quality

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collector-documentation-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  documentation_quality:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          python -m py_compile project_sources/generation_validation/verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation audit script syntax validation failed.'
          }
          python -m py_compile project_sources/generation_validation/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation audit self-test script syntax validation failed.'
          }

      - name: Run validator self-tests
        shell: pwsh
        run: |
          python project_sources/generation_validation/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation audit validator self-tests failed.'
          }

      - name: Validate PowerShell syntax for collector sources
        shell: pwsh
        run: |
          $psFiles = @(
            'project_sources/DCOIR_Collector.ps1',
            'project_sources/run_DCOIR_Tests.ps1'
          ) + @(Get-ChildItem -LiteralPath project_sources/collector_parts -File -Filter '*.ps1' | ForEach-Object { $_.FullName })
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'Collector PowerShell syntax validation failed.'
          }

      - name: Run auto-discovery documentation audit
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_collector_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_collector_documentation_quality | Out-Null
          python project_sources/generation_validation/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/generation_validation/out_collector_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions

      - name: Upload documentation audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: collector-documentation-quality
          path: |
            project_sources/generation_validation/out_collector_documentation_quality/**
          if-no-files-found: warn
          retention-days: 21
