# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-build_package-manual-collector-runtime-package-build-0012
# Purpose:
# - Build the standard DCOIR Collector runtime package from repo source.
# Use when:
# - Use before collector runtime release/delivery or when packaging behavior needs manual verification.
# Do not use when:
# - Do not use for Gemini bundle builds, optional EXE builds, or collector harness regression validation.
# Trigger model:
# - workflow_dispatch inputs: package_version_override
# Required inputs:
# - package_version_override: Optional package version override (for example 2_0_1) default=
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses project_sources/collector/tools/build_dcoir_collector_runtime_package.py and package validation tooling.
# Expected outputs/readback:
# - Collector delivery package artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Package validity requires artifact inspection and downstream validation, not workflow completion alone.
# - Harness regression validation belongs in manual-full-validation, not this package-build workflow.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: manual-collector-runtime-package-build

on:
  workflow_dispatch:
    inputs:
      package_version_override:
        description: Optional package version override (for example 2_0_1)
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: manual-collector-runtime-package-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_collector_runtime_package:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      PACKAGE_VERSION_OVERRIDE: ${{ github.event.inputs.package_version_override }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = @(
            'project_sources/collector/source/DCOIR_Collector.ps1'
          )
          if (Test-Path -LiteralPath 'project_sources/collector/source/parts') {
            $psFiles += Get-ChildItem -Path 'project_sources/collector/source/parts' -File -Filter '*.ps1' | ForEach-Object { $_.FullName }
          }
          $psFiles = @($psFiles | Where-Object { Test-Path -LiteralPath $_ })
          if (-not $psFiles) {
            throw 'Required collector PowerShell files were not found.'
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Verify collector runtime package surfaces
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/check_required_surfaces.py --profile manual_collector_runtime_package_build
          if ($LASTEXITCODE -ne 0) {
            throw 'Required surface validation failed.'
          }

      - name: Create output directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path project_sources/validation/out | Out-Null

      - name: Run collector runtime package validation
        shell: pwsh
        run: |
          python project_sources/collector/tools/validate_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/validation/out
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime package validation failed.'
          }

      - name: Run collector documentation quality gate
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_preflight_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_preflight_documentation_quality | Out-Null
          python project_sources/collector/tools/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/validation/out_preflight_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector documentation quality gate failed before packaging.'
          }

      - name: Build collector runtime package
        shell: pwsh
        run: |
          $versionOverride = $env:PACKAGE_VERSION_OVERRIDE
          $cmd = @(
            'python',
            'project_sources/collector/tools/build_dcoir_collector_runtime_package.py',
            '--source-dir', '.',
            '--output-dir', 'project_sources/validation/out'
          )
          if (-not [string]::IsNullOrWhiteSpace($versionOverride)) {
            $cmd += @('--version', $versionOverride)
          }
          & $cmd[0] $cmd[1..($cmd.Count - 1)]
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime package build failed.'
          }

      - name: Upload collector runtime package artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-collector-runtime-package-build
          path: |
            project_sources/validation/out/*.zip
            project_sources/validation/out/*report.json
            project_sources/validation/out/compiled_runtime/**
            project_sources/validation/out_preflight_documentation_quality/**
          if-no-files-found: warn
          retention-days: 21

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Collector runtime package summary

          - workflow: manual-collector-runtime-package-build
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - package_version_override: $env:PACKAGE_VERSION_OVERRIDE
          - primary_artifact: manual-collector-runtime-package-build
          - artifact_note: includes delivery package zips, package reports, compiled runtime output, and documentation-quality output when produced.

          The workflow conclusion is the authoritative pass/fail signal for packaging only. Harness regression validation belongs in manual-full-validation.
          Package validity still requires artifact readback before release or operator-distribution claims.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14