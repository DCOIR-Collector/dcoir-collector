# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses project_sources/collector/tools/build_dcoir_collector_runtime_package.py and package validation tooling.
# - Collector part assembly order is owned by project_sources/collector/manifests/Collector_Runtime_Package_Manifest.json and consumed by the reusable package workflow.
# - When DCOIR_Collector.* part files are split, renamed, added, or removed, keep the manifest, required-surface profile, and wrapper part list aligned before running this workflow.
# - Current JSON/state/array utility source is split into DCOIR_Collector.01B1 and DCOIR_Collector.01B2 before DCOIR_Collector.01C.
# - Current baseline collection/reporting source is split into DCOIR_Collector.02A, DCOIR_Collector.02B, DCOIR_Collector.02C, DCOIR_Collector.02D1, and DCOIR_Collector.02D2 before the enrich-session parts.
# - Current quick-interface/output source is split into DCOIR_Collector.04A1, DCOIR_Collector.04A2, and DCOIR_Collector.04A3 before the feature-wave parts.
# - Current feature-wave targeted collection source is split into DCOIR_Collector.04B1 and DCOIR_Collector.04B2 before DCOIR_Collector.04C.
# - Current bounded-parallel-runtime source is split into DCOIR_Collector.04D1, DCOIR_Collector.04D2, and DCOIR_Collector.04D3 before the existing 04E-H feature-wave parts.
# - Current main-entry source is split into DCOIR_Collector.05A, DCOIR_Collector.05B, and DCOIR_Collector.05C helpers before the final DCOIR_Collector.05 dispatcher.
# Expected outputs/readback:
# - Collector delivery package artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Package validity requires artifact inspection and downstream validation, not workflow completion alone.
# - Harness regression validation belongs in manual-full-validation, not this package-build workflow.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 01 Operator - Build Collector Runtime Bundle
run-name: Collector Runtime Bundle | ${{ github.event.inputs.package_version_override || 'default-version' }} | #${{ github.run_number }}

on:
  workflow_dispatch:
    inputs:
      package_version_override:
        description: Optional package version override (for example 2_0_1)
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: manual-collector-runtime-package-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_collector_runtime_package:
    uses: ./.github/workflows/reusable-collector-runtime-package-build.yml
    permissions:
      contents: read
    with:
      package_version_override: ${{ inputs.package_version_override || '' }}
