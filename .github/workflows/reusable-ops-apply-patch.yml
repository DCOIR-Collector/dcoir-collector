# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: ops-apply-patch.yml
# Purpose: reusable implementation module for Ops apply-patch request; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Ops Apply Patch
run-name: Module Ops Apply Patch | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch branching.
        required: false
        type: string
        default: 'workflow_call'
      request_path:
        description: Forwarded request JSON path from the entry workflow.
        required: false
        type: string
        default: 'ops/requests/apply_patch/request/request.json'
    outputs: {}
    secrets: {}

permissions:
  contents: write

jobs:
  apply_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          python-version: '3.11'

      - name: Run governed apply-patch request
        id: request
        uses: ./.github/actions/run-ops-apply-patch-request
        with:
          operation: apply
          caller-event-name: ${{ inputs.caller_event_name }}
          request-path: ${{ inputs.request_path }}
          default-branch: ${{ github.event.repository.default_branch || 'main' }}
          report-root: ${{ runner.temp }}/ops-apply-patch

      - name: Upload apply-patch report
        if: always() && steps.request.outputs.skip != 'true' && steps.request.outputs.report_dir != ''
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: ops-apply-patch-${{ github.run_id }}
          path: ${{ steps.request.outputs.report_dir }}/**
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup staged apply-patch request
        if: success() && steps.request.outputs.skip != 'true'
        uses: ./.github/actions/run-ops-apply-patch-request
        with:
          operation: cleanup
          request-id: ${{ steps.request.outputs.request_id }}
          request-dir: ${{ steps.request.outputs.request_dir }}
          request-source-ref: ${{ github.ref_name }}
          report-dir: ${{ steps.request.outputs.report_dir }}
