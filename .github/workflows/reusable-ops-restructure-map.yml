# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: ops-restructure-map.yml
# Purpose: reusable implementation module for Ops restructure map request; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Ops Restructure Map
run-name: Module Ops Restructure Map | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
    outputs: {}
    secrets: {}

permissions:
  contents: read

jobs:
  dry_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'
      - run: python ops/tools/ops_request_guard.py ops/requests/restructure_map.json
