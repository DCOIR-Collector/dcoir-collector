# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-validate-on-pr-0001
# Purpose:
# - Automatic PR-focused validation for collector, Gemini, packaging, validation, maintained knowledge, supporting asset, and workflow definition changes.
# Use when:
# - Use at meaningful PR checkpoints to run the heavier runtime build and core harness proof before merge.
# Do not use when:
# - Do not use as the quick push gate when validate-on-push is sufficient, and do not treat it as a replacement for deeper manual-full-validation coverage.
# Trigger model:
# - pull_request types: opened, reopened, synchronize, ready_for_review; same scoped paths as validate-on-push, including DCOIR_KNOWLEDGE_INDEX.md and docs/validation/dcoir_collector_capability_coverage_matrix.md
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses syntax checks, required surface list, Gemini packaging smoke build, validation fixtures, documentation validation, collector runtime packaging, and the Core harness suite.
# Expected outputs/readback:
# - PR validation artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Skip heavy execution while the pull request is still draft; run when the PR becomes ready or later meaningful sync events occur.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: validate-on-pr

# Coverage rule:
# - If a maintained source, artifact, or behavior is intended to be verified by this
#   workflow, the relevant path watch and/or explicit validation logic must be represented
#   directly in this workflow file.
# - Do not rely on adjacent folder changes or implicit coverage.
#
# PR checkpoint posture (2026-05-25):
# - Pull-request triggering is enabled only for collector, Gemini, packaging, validation,
#   maintained knowledge, and workflow definition paths covered by this lane split.
# - Draft pull requests do not run the heavy lane until a meaningful checkpoint such as
#   ready_for_review, opened non-draft, reopened, or later synchronize events.
# - The heavier collector runtime build and Core harness validation now live here.
#
# Gemini topology rule:
# - Gemini bundle required-file and sub-agent inventory checks are manifest-driven.
# - Do not duplicate the Gemini sub-agent list in this workflow. Update
#   project_sources/gemini/bundle_source/Gemini_Bundle_Source_Manifest.json instead.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'project_sources/collector/source/**'
      - 'project_sources/collector/harness/**'
      - 'project_sources/collector/tools/**'
      - 'project_sources/collector/manifests/**'
      - 'project_sources/gemini/bundle_source/**'
      - 'project_sources/gemini/tools/**'
      - 'project_sources/validation/**'
      - 'knowledge/Knowledge - *.md'
      - 'knowledge/README.md'
      - 'DCOIR_KNOWLEDGE_INDEX.md'
      - 'docs/validation/dcoir_collector_capability_coverage_matrix.md'
      - 'supporting_assets/DCOIR_Collector.zip'
      - '.github/workflows/validate-on-push.yml'
      - '.github/workflows/validate-on-pr.yml'

concurrency:
  group: validate-on-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Verify required governed surfaces
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/check_required_surfaces.py --profile validate_on_pr
          if ($LASTEXITCODE -ne 0) {
            throw 'Required surface validation failed.'
          }
          python project_sources/github_actions/tools/check_gemini_manifest_surfaces.py --source-root project_sources/gemini/bundle_source
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini manifest surface validation failed.'
          }

      - name: Smoke-test Gemini bundle build algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_validate_on_pr_gemini -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_validate_on_pr_gemini | Out-Null
          python project_sources/gemini/tools/build_dcoir_gemini_release.py --source-root project_sources/gemini/bundle_source --output-dir project_sources/validation/out_validate_on_pr_gemini
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle smoke test failed.'
          }

      - name: Run validate_DCOIR_Run fixture tests
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\tools\run_validate_dcoir_run_fixture_tests.ps1 -ValidatorPath .\collector\harness\validate_DCOIR_Run.ps1 -OutputRoot .\validation\out_validate_on_pr_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_validate_on_pr_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_validate_on_pr_documentation_quality | Out-Null
          python project_sources/collector/tools/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/validation/out_validate_on_pr_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector documentation quality gate failed before collector build.'
          }

      - name: Build fresh collector runtime zip for harness
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_validate_on_pr_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_validate_on_pr_collector | Out-Null
          python project_sources/collector/tools/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/validation/out_validate_on_pr_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery package smoke test failed.'
          }
          $deliveryZip = Get-ChildItem -Path project_sources/validation/out_validate_on_pr_collector -File -Filter 'DCOIR_Collector_Delivery_Package_*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $deliveryZip) {
            throw 'Collector delivery package zip was not produced.'
          }
          python project_sources/collector/tools/restore_dcoir_collector_runtime_zip.py --delivery-package-zip $deliveryZip.FullName --base-runtime-zip supporting_assets/DCOIR_Collector.zip --output-dir project_sources/validation/out_validate_on_pr_collector --output-name DCOIR_Collector_runtime_for_harness.zip
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime zip restore bridge failed.'
          }
          $extractDir = 'project_sources/validation/out_validate_on_pr_collector/runtime_harness'
          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -LiteralPath project_sources/validation/out_validate_on_pr_collector/DCOIR_Collector_runtime_for_harness.zip -DestinationPath $extractDir -Force
          "HARNESS_RUNTIME_ZIP=$((Resolve-Path project_sources/validation/out_validate_on_pr_collector/DCOIR_Collector_runtime_for_harness.zip).Path)" | Add-Content -Path $env:GITHUB_ENV
          "HARNESS_COLLECTOR_PATH=$((Resolve-Path project_sources/validation/out_validate_on_pr_collector/runtime_harness/DCOIR_Collector.ps1).Path)" | Add-Content -Path $env:GITHUB_ENV

      - name: Run collector core pre-live suite
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\harness\run_DCOIR_Tests.ps1 -CollectorPath $env:HARNESS_COLLECTOR_PATH -Suite Core -MasterZipPath $env:HARNESS_RUNTIME_ZIP
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector harness suite failed: Core'
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validate-on-pr-results
          path: |
            project_sources/TestResults/**
            project_sources/validation/out_validate_on_pr_gemini/**
            project_sources/validation/out_validate_on_pr_collector/**
            project_sources/validation/out_validate_on_pr_validate_dcoir_run_fixtures/**
            project_sources/validation/out_preflight_documentation_quality/**
            project_sources/validation/out_validate_on_pr_documentation_quality/**
          if-no-files-found: warn
          retention-days: 14

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Pull request validation summary

          - workflow: validate-on-pr
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - event_name: $env:GITHUB_EVENT_NAME
          - primary_artifact: validate-on-pr-results
          - artifact_note: includes Gemini smoke-build output, collector runtime output, validate_DCOIR_Run fixture output, documentation-quality output, and TestResults when produced.

          The workflow conclusion is the authoritative pass/fail signal for the PR validation lane. Use artifact readback for package, harness, or report-specific claims.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14