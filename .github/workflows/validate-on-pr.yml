# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-validate-on-pr-0001
# Purpose:
# - Automatic PR-focused validation for collector, Gemini, packaging, validation, maintained knowledge, supporting asset, GitHub intake, and workflow definition changes.
# Use when:
# - Use at meaningful PR checkpoints to run the heavier runtime build and core harness proof before merge.
# Do not use when:
# - Do not use as the quick push gate when validate-on-push is sufficient, and do not treat it as a replacement for deeper manual-full-validation coverage.
# Trigger model:
# - pull_request types: opened, reopened, synchronize, ready_for_review; scoped paths include maintained source, GitHub intake templates, DCOIR_KNOWLEDGE_INDEX.md, docs/validation/dcoir_collector_capability_coverage_matrix.md, and governed workflow definitions.
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses syntax checks, harness assembly parity, required surface list, Gemini packaging smoke build, validation fixtures, documentation validation, collector runtime packaging, and the Core harness suite.
# Expected outputs/readback:
# - PR validation artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Skip heavy execution while the pull request is still draft; run when the PR becomes ready or later meaningful sync events occur.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 20 Validation - Pull Request
run-name: Pull Request Validation | PR #${{ github.event.pull_request.number || github.run_number }}

# Coverage rule:
# - If a maintained source, artifact, or behavior is intended to be verified by this
#   workflow, the relevant path watch and/or explicit validation logic must be represented
#   directly in this workflow file.
# - Do not rely on adjacent folder changes or implicit coverage.
#
# PR checkpoint posture (2026-05-25):
# - Pull-request triggering is enabled only for collector, Gemini, packaging, validation,
#   maintained knowledge, GitHub intake, and workflow definition paths covered by this lane split.
# - Draft pull requests do not run the heavy lane until a meaningful checkpoint such as
#   ready_for_review, opened non-draft, reopened, or later synchronize events.
# - The heavier collector runtime build and Core harness validation now live here.
#
# Gemini topology rule:
# - Gemini bundle required-file and sub-agent inventory checks are manifest-driven.
# - Do not duplicate the Gemini sub-agent list in this workflow. Update
#   project_sources/gemini/bundle_source/Gemini_Bundle_Source_Manifest.json instead.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'project_sources/collector/source/**'
      - 'project_sources/collector/harness/**'
      - 'project_sources/collector/tools/**'
      - 'project_sources/collector/manifests/**'
      - 'project_sources/gemini/bundle_source/**'
      - 'project_sources/gemini/tools/**'
      - 'project_sources/validation/**'
      - 'knowledge/Knowledge - *.md'
      - 'knowledge/README.md'
      - 'DCOIR_KNOWLEDGE_INDEX.md'
      - 'docs/validation/dcoir_collector_capability_coverage_matrix.md'
      - 'supporting_assets/DCOIR_Collector.zip'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/dependabot.yml'
      - '.github/SECURITY.md'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'project_sources/github_actions/**'
      - '.github/README.md'

concurrency:
  group: validate-on-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/reusable-validate-on-pr.yml
    permissions:
      contents: read
    with:
      caller_event_name: ${{ github.event_name }}
