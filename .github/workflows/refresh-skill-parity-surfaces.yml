# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-maintenance-refresh-skill-parity-surfaces-0021 (Airtable formula preview; final key may use table autonumber suffix)
# Purpose:
# - Regenerate skill parity manifest and summary after dcoir_skills or skill_parity tooling changes.
# Use when:
# - Use after skill source changes to refresh repo parity surfaces.
# Do not use when:
# - Do not use as proof that installed skills were manually updated; installed-skill readback remains separate.
# Trigger model:
# - workflow_dispatch; push paths: dcoir_skills/**, tools/skill_parity/**, !dcoir_skills/skill_parity_manifest.json, !dcoir_skills/skill_parity_summary.md
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses tools/skill_parity/build_skill_parity_manifest.py and render_skill_parity_summary.py.
# Expected outputs/readback:
# - Updated dcoir_skills/skill_parity_manifest.json and dcoir_skills/skill_parity_summary.md.
# Safety notes:
# - Parity surfaces describe repo source. Manual install/readback must still verify installed SKILL.md markers and resources.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep the Airtable GitHub Workflow Inventory row aligned when general routing guidance changes.
# Airtable routing:
# - General task-routing guidance belongs in Airtable table `GitHub Workflow Inventory`.
# - This header owns workflow-specific execution guidance; the workflow body remains the executable behavior.
name: refresh-skill-parity-surfaces

on:
  workflow_dispatch:
  push:
    paths:
      - 'dcoir_skills/**'
      - 'tools/skill_parity/**'
      - '!dcoir_skills/skill_parity_manifest.json'
      - '!dcoir_skills/skill_parity_summary.md'

permissions:
  contents: write

concurrency:
  group: refresh-skill-parity-surfaces-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh_skill_parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Regenerate skill parity surfaces
        shell: bash
        run: |
          python tools/skill_parity/build_skill_parity_manifest.py \
            --skills-root dcoir_skills \
            --output dcoir_skills/skill_parity_manifest.json \
            --skill-prefix dcoir- \
            --baseline-origin repo_source \
            --contract dcoir_skills/project_discovery_contract.json \
            --project 'AFRICOM_SOC_IR / DCOIR'
          python tools/skill_parity/render_skill_parity_summary.py \
            --manifest dcoir_skills/skill_parity_manifest.json \
            --output dcoir_skills/skill_parity_summary.md

      - name: Commit parity refresh if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- dcoir_skills/skill_parity_manifest.json dcoir_skills/skill_parity_summary.md; then
            echo 'No skill parity surface changes to commit.'
            exit 0
          fi
          git add dcoir_skills/skill_parity_manifest.json dcoir_skills/skill_parity_summary.md
          git commit -m 'Refresh dcoir skill parity surfaces'
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "git push failed on attempt ${attempt}; rebasing onto origin/${GITHUB_REF_NAME} before retry"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            sleep $((attempt * 5))
          done
          git push
