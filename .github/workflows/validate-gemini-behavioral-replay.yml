# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-validate-gemini-behavioral-replay-0002
# Purpose:
# - Automatic deterministic validation for Gemini behavioral replay fixtures, response-pack regression checks, and replay reporting surfaces.
# Use when:
# - Use as the normal deterministic replay gate when replay tools, replay fixtures, or replay reporting surfaces change.
# Do not use when:
# - Do not treat this as the live Gemini replay lane; use run-gemini-behavioral-replay-manual for live API evidence.
name: validate-gemini-behavioral-replay

on:
  push:
    paths:
      - 'project_sources/gemini/tools/run_gemini_behavioral_replay.py'
      - 'project_sources/gemini/tools/score_gemini_behavioral_replay.py'
      - 'project_sources/gemini/tools/render_gemini_behavioral_replay_report.py'
      - 'project_sources/gemini/tools/validate_gemini_behavioral_replay_fixtures.py'
      - 'project_sources/gemini/tools/lib/gemini_behavioral_replay_*.py'
      - 'project_sources/gemini/fixtures/behavioral_replay/**'
      - '.github/workflows/validate-gemini-behavioral-replay.yml'
      - '.github/workflows/run-gemini-behavioral-replay-manual.yml'
  pull_request:
    paths:
      - 'project_sources/gemini/tools/run_gemini_behavioral_replay.py'
      - 'project_sources/gemini/tools/score_gemini_behavioral_replay.py'
      - 'project_sources/gemini/tools/render_gemini_behavioral_replay_report.py'
      - 'project_sources/gemini/tools/validate_gemini_behavioral_replay_fixtures.py'
      - 'project_sources/gemini/tools/lib/gemini_behavioral_replay_*.py'
      - 'project_sources/gemini/fixtures/behavioral_replay/**'
      - '.github/workflows/validate-gemini-behavioral-replay.yml'
      - '.github/workflows/run-gemini-behavioral-replay-manual.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-gemini-behavioral-replay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_replay:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            project_sources/gemini/tools/run_gemini_behavioral_replay.py \
            project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            project_sources/gemini/tools/render_gemini_behavioral_replay_report.py \
            project_sources/gemini/tools/validate_gemini_behavioral_replay_fixtures.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_schema.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_runner.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_scoring.py \
            project_sources/gemini/tools/lib/gemini_behavioral_replay_reporting.py

      - name: Create output directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p project_sources/validation/out_validate_gemini_behavioral_replay

      - name: Validate replay fixtures
        shell: bash
        run: |
          set -euo pipefail
          python project_sources/gemini/tools/validate_gemini_behavioral_replay_fixtures.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --output-dir project_sources/validation/out_validate_gemini_behavioral_replay/fixtures

      - name: Validate known-good deterministic response packs
        shell: bash
        run: |
          set -euo pipefail
          python project_sources/gemini/tools/run_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --fixture-id dcoir_operator_state_first_issue_124 \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_operator_state_first_issue_124_known_good_response_pack.json \
            --output-dir project_sources/validation/out_validate_gemini_behavioral_replay/run_good_issue_124
          python project_sources/gemini/tools/run_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --fixture-id dcoir_byovd_evidence_discipline_issue_122 \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_byovd_evidence_discipline_issue_122_known_good_response_pack.json \
            --output-dir project_sources/validation/out_validate_gemini_behavioral_replay/run_good_issue_122
          python project_sources/gemini/tools/run_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --fixture-id dcoir_long_transcript_continuity_issue_123 \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_long_transcript_continuity_issue_123_known_good_response_pack.json \
            --output-dir project_sources/validation/out_validate_gemini_behavioral_replay/run_good_issue_123

      - name: Render standalone replay report
        shell: bash
        run: |
          set -euo pipefail
          python project_sources/gemini/tools/render_gemini_behavioral_replay_report.py \
            --results-json project_sources/validation/out_validate_gemini_behavioral_replay/run_good_issue_124/gemini_behavioral_replay_run_report.json \
            --output-path project_sources/validation/out_validate_gemini_behavioral_replay/run_good_issue_124/gemini_behavioral_replay_rendered_report.md

      - name: Ensure known-bad deterministic response packs fail
        shell: bash
        run: |
          set -euo pipefail
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_operator_state_first_issue_124_known_bad_response_pack.json \
            --fixture-id dcoir_operator_state_first_issue_124; then
            echo "Issue 124 known-bad response pack unexpectedly passed."
            exit 1
          fi
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_operator_state_first_issue_124_known_bad_anomaly_only_response_pack.json \
            --fixture-id dcoir_operator_state_first_issue_124; then
            echo "Issue 124 anomaly-only known-bad response pack unexpectedly passed."
            exit 1
          fi
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_byovd_evidence_discipline_issue_122_known_bad_response_pack.json \
            --fixture-id dcoir_byovd_evidence_discipline_issue_122; then
            echo "Issue 122 known-bad response pack unexpectedly passed."
            exit 1
          fi
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_byovd_evidence_discipline_issue_122_known_bad_negated_required_response_pack.json \
            --fixture-id dcoir_byovd_evidence_discipline_issue_122; then
            echo "Issue 122 negated-required known-bad response pack unexpectedly passed."
            exit 1
          fi
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_byovd_evidence_discipline_issue_122_known_bad_post_rejection_response_pack.json \
            --fixture-id dcoir_byovd_evidence_discipline_issue_122; then
            echo "Issue 122 post-marker rejection known-bad response pack unexpectedly passed."
            exit 1
          fi
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_byovd_evidence_discipline_issue_122_known_bad_connector_rejection_response_pack.json \
            --fixture-id dcoir_byovd_evidence_discipline_issue_122; then
            echo "Issue 122 connector rejection known-bad response pack unexpectedly passed."
            exit 1
          fi
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_long_transcript_continuity_issue_123_known_bad_response_pack.json \
            --fixture-id dcoir_long_transcript_continuity_issue_123; then
            echo "Issue 123 known-bad response pack unexpectedly passed."
            exit 1
          fi
          if python project_sources/gemini/tools/score_gemini_behavioral_replay.py \
            --fixtures-root project_sources/gemini/fixtures/behavioral_replay \
            --response-pack project_sources/gemini/fixtures/behavioral_replay/supporting_artifacts/dcoir_long_transcript_continuity_issue_123_known_bad_negated_required_response_pack.json \
            --fixture-id dcoir_long_transcript_continuity_issue_123; then
            echo "Issue 123 negated-required known-bad response pack unexpectedly passed."
            exit 1
          fi

      - name: Upload deterministic replay artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validate-gemini-behavioral-replay-results
          path: |
            project_sources/validation/out_validate_gemini_behavioral_replay/**
          if-no-files-found: warn
          retention-days: 14
