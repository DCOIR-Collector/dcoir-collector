# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-validate-on-push-0023
# Purpose:
# - Automatic fast validation for collector, Gemini, validation, maintained knowledge, supporting asset, and workflow definition changes.
# Use when:
# - Use as the normal fast validation gate for relevant push paths and manual smoke validation.
# Do not use when:
# - Do not treat as full regression or pre-merge proof; validate-on-pr owns the heavier PR-focused runtime and harness validation.
# Trigger model:
# - push paths: project_sources/collector/source/**, project_sources/collector/harness/**, project_sources/collector/tools/**, project_sources/collector/manifests/**, project_sources/gemini/bundle_source/**, project_sources/gemini/tools/**, project_sources/validation/**, knowledge/Knowledge - *.md, knowledge/README.md, DCOIR_KNOWLEDGE_INDEX.md, docs/validation/dcoir_collector_capability_coverage_matrix.md, governed workflow definitions ...; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses syntax checks, required surface checks, harness assembly parity, Gemini smoke build, collector package smoke build, validate_DCOIR_Run fixture tests, and documentation validation.
# Expected outputs/readback:
# - Fast validation artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Path coverage must be explicit in this file. If a maintained behavior should be validated here, add its watched path or validation logic directly.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: validate-on-push

# Coverage rule:
# - If a maintained source, artifact, or behavior is intended to be verified by this
#   workflow, the relevant path watch and/or explicit validation logic must be represented
#   directly in this workflow file.
# - Do not rely on adjacent folder changes or implicit coverage.
#
# Restored automatic posture (2026-04-30):
# - Push triggering is enabled only for collector, Gemini, packaging, validation,
#   maintained knowledge, and governed workflow definition paths.
# - Routine automatic coverage keeps lightweight syntax, governed-surface, harness
#   assembly parity, Gemini, collector package smoke, validate_DCOIR_Run, and
#   documentation checks on push.
# - Heavier collector runtime harness validation remains in validate-on-pr and
#   manual-full-validation at meaningful review checkpoints.
#
# Gemini topology rule:
# - Gemini bundle required-file and sub-agent inventory checks are manifest-driven.
# - Do not duplicate the Gemini sub-agent list in this workflow. Update
#   project_sources/gemini/bundle_source/Gemini_Bundle_Source_Manifest.json instead.

on:
  push:
    paths:
      - 'project_sources/collector/source/**'
      - 'project_sources/collector/harness/**'
      - 'project_sources/collector/tools/**'
      - 'project_sources/collector/manifests/**'
      - 'project_sources/gemini/bundle_source/**'
      - 'project_sources/gemini/tools/**'
      - 'project_sources/validation/**'
      - 'knowledge/Knowledge - *.md'
      - 'knowledge/README.md'
      - 'DCOIR_KNOWLEDGE_INDEX.md'
      - 'docs/validation/dcoir_collector_capability_coverage_matrix.md'
      - 'supporting_assets/DCOIR_Collector.zip'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'project_sources/github_actions/**'
      - '.github/README.md'
  workflow_dispatch:

concurrency:
  group: validate-on-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Verify collector harness assembly parity
        shell: pwsh
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\project_sources\collector\harness\assemble_run_DCOIR_Tests.ps1 -OutputPath .\project_sources\collector\harness\run_DCOIR_Tests.generated.ps1 -ExpectedHarnessPath .\project_sources\collector\harness\run_DCOIR_Tests.ps1
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector harness assembly parity validation failed.'
          }

      - name: Verify required governed surfaces
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/check_required_surfaces.py --profile validate_on_push
          if ($LASTEXITCODE -ne 0) {
            throw 'Required surface validation failed.'
          }
          python project_sources/github_actions/tools/check_gemini_manifest_surfaces.py --source-root project_sources/gemini/bundle_source
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini manifest surface validation failed.'
          }

      - name: Smoke-test Gemini bundle build algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_validate_on_push_gemini -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_validate_on_push_gemini | Out-Null
          python project_sources/gemini/tools/build_dcoir_gemini_release.py --source-root project_sources/gemini/bundle_source --output-dir project_sources/validation/out_validate_on_push_gemini
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle smoke test failed.'
          }

      - name: Smoke-test collector runtime package build
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_validate_on_push_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_validate_on_push_collector | Out-Null
          python project_sources/collector/tools/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/validation/out_validate_on_push_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime package smoke test failed.'
          }

      - name: Run validate_DCOIR_Run fixture tests
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\\collector\\tools\\run_validate_dcoir_run_fixture_tests.ps1 -ValidatorPath .\\collector\\harness\\validate_DCOIR_Run.ps1 -OutputRoot .\\validation\\out_validate_on_push_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_validate_on_push_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_validate_on_push_documentation_quality | Out-Null
          python project_sources/collector/tools/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/validation/out_validate_on_push_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector documentation quality gate failed before collector build.'
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validate-on-push-results
          path: |
            project_sources/TestResults/**
            project_sources/validation/out_validate_on_push_gemini/**
            project_sources/validation/out_validate_on_push_collector/**
            project_sources/validation/out_validate_on_push_validate_dcoir_run_fixtures/**
            project_sources/validation/out_preflight_documentation_quality/**
            project_sources/validation/out_validate_on_push_documentation_quality/**
          if-no-files-found: warn
          retention-days: 14

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Push validation summary

          - workflow: validate-on-push
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - event_name: $env:GITHUB_EVENT_NAME
          - primary_artifact: validate-on-push-results
          - artifact_note: includes Gemini smoke-build output, collector package smoke-build output, validate_DCOIR_Run fixture output, documentation-quality output, and TestResults when produced.

          The workflow conclusion is the authoritative pass/fail signal for the push validation lane. Use artifact readback for harness, package, documentation, or report-specific claims.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
