name: validate-on-push

# Coverage rule:
# - If a maintained source, artifact, or behavior is intended to be verified by this
#   workflow, the relevant path watch and/or explicit validation logic must be represented
#   directly in this workflow file.
# - Do not rely on adjacent folder changes or implicit coverage.
#
# Manual-only posture:
# - Auto push triggering is disabled to conserve GitHub Actions minutes.
# - Pre-change trigger config was saved at:
#   project_sources/workflow_backups/validate-on-push.pre-manual-only.2026-04-21.yml.txt
# - Current use is a bounded manual pre-live validation pass before larger live collector testing.

on:
  workflow_dispatch:

concurrency:
  group: validate-on-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/generation_validation/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Verify required governed surfaces
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'project_sources/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/CP-02_DCOIR_Change_Log.txt',
            'project_sources/DCOIR_Collector.ps1',
            'project_sources/run_DCOIR_Tests.ps1',
            'project_sources/collector_parts/DCOIR_Collector.01_Core_State_And_Utilities.ps1',
            'project_sources/collector_parts/DCOIR_Collector.02_Baseline_Collection_And_Reports.ps1',
            'project_sources/collector_parts/DCOIR_Collector.03A_Enrich_Session_State.ps1',
            'project_sources/collector_parts/DCOIR_Collector.03B_Enrich_Actions_Review.ps1',
            'project_sources/collector_parts/DCOIR_Collector.03C_Enrich_Actions_Retrieval.ps1',
            'project_sources/collector_parts/DCOIR_Collector.04_Quick_Interface_And_Output.ps1',
            'project_sources/collector_parts/DCOIR_Collector.04B_Feature_Wave_Targeted_Collection.ps1',
            'project_sources/collector_parts/DCOIR_Collector.04C_Explicit_Event_Window_Overrides.ps1',
            'project_sources/collector_parts/DCOIR_Collector.04D_Bounded_Parallel_Runtime.ps1',
            'project_sources/collector_parts/DCOIR_Collector.04E_Diagnostic_Context_Overrides.ps1',
            'project_sources/collector_parts/DCOIR_Collector.05_Main_Entry.ps1',
            'project_sources/Collector_Runtime_Package_Manifest.json.txt',
            'project_sources/DOC-11_DCOIR_Gemini_Creation_Pipeline_v1_0_0.txt',
            'project_sources/DOC-12_DCOIR_Collector_Runtime_Packaging_Pipeline_v1_0_0.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/Gemini_Bundle_Source_Manifest.json.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/README.md',
            'project_sources/DCOIR_Gemini_Bundle_Source/00_START_HERE/README_FIRST.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/00_START_HERE/Agent_Attachment_Map.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/00_START_HERE/Gemini_Build_Quick_Start.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Generated_DCOIR_Gemini_Agent_Index.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Prime_Agent_DCOIR_Gemini_Orchestrator.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_01_Session_Readiness_and_Intake.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_02_Environment_and_Coverage_Mapper.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_03_Alert_Family_Classifier_and_Known_Benign_Technology_Differentiator.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_04_Evidence_and_Provenance_Analyst.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_05_Query_Planner_and_Syntax_Guard.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_06_DCOIR_Collector_Execution_and_Bundle_Workflow_Orchestrator.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_07_DCOIR_Collector_Artifact_Interpreter_and_Report_Extractor.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_08_IOC_Parsing_and_Evidence_Grounded_Public_Enrichment_Planner.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_09_Targeted_Collection_Designer_and_Evidence_Gap_Reducer.md.txt',
            'project_sources/DCOIR_Gemini_Bundle_Source/01_GEMINI_AGENT_BUILD/Sub_Agent_10_Output_Contract_Consistency_Guard_and_Report_Composer.md.txt',
            'project_sources/generation_validation/sync_dcoir_gemini_knowledge_attachments.py',
            'project_sources/generation_validation/build_dcoir_gemini_release.py',
            'project_sources/generation_validation/validate_dcoir_gemini_bundle.py',
            'project_sources/generation_validation/validate_dcoir_gemini_behavior_scenarios.py',
            'project_sources/generation_validation/compile_dcoir_collector_runtime.py',
            'project_sources/generation_validation/validate_dcoir_collector_runtime_package.py',
            'project_sources/generation_validation/build_dcoir_collector_runtime_package.py',
            'project_sources/generation_validation/restore_dcoir_collector_runtime_zip.py',
            'project_sources/generation_validation/run_validate_dcoir_run_fixture_tests.ps1',
            'project_sources/generation_validation/verify_collector_documentation_quality.py',
            'project_sources/generation_validation/test_verify_collector_documentation_quality.py',
            '.github/workflows/manual-gemini-bundle-build.yml',
            '.github/workflows/manual-collector-runtime-package-build.yml',
            'dcoir_skills/project_discovery_contract.json',
            'supporting_assets/DCOIR_Collector.zip'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required governed surfaces: $($missing -join ', ')"
          }
          $knowledgeFiles = Get-ChildItem -LiteralPath knowledge -File -Filter 'Knowledge - *.md'
          if ($knowledgeFiles.Count -lt 15) {
            throw "Maintained knowledge set is smaller than expected. Found $($knowledgeFiles.Count) files; expected at least 15."
          }

      - name: Run validate_DCOIR_Run fixture tests
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\generation_validation\run_validate_dcoir_run_fixture_tests.ps1 -ValidatorPath .\validate_DCOIR_Run.ps1 -OutputRoot .\generation_validation\out_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_documentation_quality | Out-Null
          python project_sources/generation_validation/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/generation_validation/out_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector documentation quality gate failed before collector build.'
          }

      - name: Build fresh collector runtime zip for harness
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_validate_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_validate_collector | Out-Null
          python project_sources/generation_validation/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/generation_validation/out_validate_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery package smoke test failed.'
          }
          $deliveryZip = Get-ChildItem -Path project_sources/generation_validation/out_validate_collector -File -Filter 'DCOIR_Collector_Delivery_Package_*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $deliveryZip) {
            throw 'Collector delivery package zip was not produced.'
          }
          python project_sources/generation_validation/restore_dcoir_collector_runtime_zip.py --delivery-package-zip $deliveryZip.FullName --base-runtime-zip supporting_assets/DCOIR_Collector.zip --output-dir project_sources/generation_validation/out_validate_collector --output-name DCOIR_Collector_runtime_for_harness.zip
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime zip restore bridge failed.'
          }
          $extractDir = 'project_sources/generation_validation/out_validate_collector/runtime_harness'
          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -LiteralPath project_sources/generation_validation/out_validate_collector/DCOIR_Collector_runtime_for_harness.zip -DestinationPath $extractDir -Force
          "HARNESS_RUNTIME_ZIP=$((Resolve-Path project_sources/generation_validation/out_validate_collector/DCOIR_Collector_runtime_for_harness.zip).Path)" | Add-Content -Path $env:GITHUB_ENV
          "HARNESS_COLLECTOR_PATH=$((Resolve-Path project_sources/generation_validation/out_validate_collector/runtime_harness/DCOIR_Collector.ps1).Path)" | Add-Content -Path $env:GITHUB_ENV

      - name: Run collector major-version pre-live suite
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\run_DCOIR_Tests.ps1 -CollectorPath $env:HARNESS_COLLECTOR_PATH -Suite MajorVersion -MasterZipPath $env:HARNESS_RUNTIME_ZIP
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector harness suite failed: MajorVersion'
          }

      - name: Smoke-test Gemini bundle build algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_validate_gemini -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_validate_gemini | Out-Null
          python project_sources/generation_validation/build_dcoir_gemini_release.py --source-root project_sources/DCOIR_Gemini_Bundle_Source --output-dir project_sources/generation_validation/out_validate_gemini
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle smoke test failed.'
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validate-on-push-results
          path: |
            project_sources/TestResults/**
            project_sources/generation_validation/out_validate_gemini/**
            project_sources/generation_validation/out_validate_collector/**
            project_sources/generation_validation/out_validate_dcoir_run_fixtures/**
            project_sources/generation_validation/out_preflight_documentation_quality/**
            project_sources/generation_validation/out_documentation_quality/**
          if-no-files-found: warn
          retention-days: 14
