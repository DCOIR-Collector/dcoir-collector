name: validate-on-push

# TEMPORARY MANUAL-ONLY POSTURE (2026-04-30)
# Push trigger disabled during bulk updates

on:
  workflow_dispatch:

concurrency:
  group: validate-on-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          foreach ($file in $pyFiles) { python -m py_compile $file }

      - name: Verify knowledge surface count
        shell: pwsh
        run: |
          $knowledgeFiles = Get-ChildItem -LiteralPath knowledge -File -Filter 'Knowledge - *.md'
          if ($knowledgeFiles.Count -lt 17) {
            throw "Expected at least 17 knowledge docs"
          }
