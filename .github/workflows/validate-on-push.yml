# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-validate-on-push-0023
# Purpose:
# - Automatic fast validation for collector, Gemini, validation, maintained knowledge, supporting asset, and workflow definition changes.
# Use when:
# - Use as the normal fast validation gate for relevant push paths and manual smoke validation.
# Do not use when:
# - Do not treat as full regression or pre-merge proof; validate-on-pr owns the heavier PR-focused runtime and harness validation.
# Trigger model:
# - push paths: project_sources/collector/source/**, project_sources/collector/harness/**, project_sources/collector/tools/**, project_sources/collector/manifests/**, project_sources/gemini/bundle_source/**, project_sources/gemini/tools/**, project_sources/validation/**, knowledge/Knowledge - *.md, knowledge/README.md, DCOIR_KNOWLEDGE_INDEX.md, docs/validation/dcoir_collector_capability_coverage_matrix.md, governed workflow definitions ...; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses syntax checks, required surface checks, harness assembly parity, Gemini smoke build, collector package smoke build, validate_DCOIR_Run fixture tests, and documentation validation.
# Expected outputs/readback:
# - Fast validation artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - Path coverage must be explicit in this file. If a maintained behavior should be validated here, add its watched path or validation logic directly.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: validate-on-push

# Coverage rule:
# - If a maintained source, artifact, or behavior is intended to be verified by this
#   workflow, the relevant path watch and/or explicit validation logic must be represented
#   directly in this workflow file.
# - Do not rely on adjacent folder changes or implicit coverage.
#
# Restored automatic posture (2026-04-30):
# - Push triggering is enabled only for collector, Gemini, packaging, validation,
#   maintained knowledge, and governed workflow definition paths.
# - Routine automatic coverage keeps lightweight syntax, governed-surface, harness
#   assembly parity, Gemini, collector package smoke, validate_DCOIR_Run, and
#   documentation checks on push.
# - Heavier collector runtime harness validation remains in validate-on-pr and
#   manual-full-validation at meaningful review checkpoints.
#
# Gemini topology rule:
# - Gemini bundle required-file and sub-agent inventory checks are manifest-driven.
# - Do not duplicate the Gemini sub-agent list in this workflow. Update
#   project_sources/gemini/bundle_source/Gemini_Bundle_Source_Manifest.json instead.

on:
  push:
    paths:
      - 'project_sources/collector/source/**'
      - 'project_sources/collector/harness/**'
      - 'project_sources/collector/tools/**'
      - 'project_sources/collector/manifests/**'
      - 'project_sources/gemini/bundle_source/**'
      - 'project_sources/gemini/tools/**'
      - 'project_sources/validation/**'
      - 'knowledge/Knowledge - *.md'
      - 'knowledge/README.md'
      - 'DCOIR_KNOWLEDGE_INDEX.md'
      - 'docs/validation/dcoir_collector_capability_coverage_matrix.md'
      - 'supporting_assets/DCOIR_Collector.zip'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'project_sources/github_actions/**'
      - '.github/README.md'
  workflow_dispatch:

concurrency:
  group: validate-on-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/reusable-validate-on-push.yml
    permissions:
      contents: read
    with:
      caller_event_name: ${{ github.event_name }}
