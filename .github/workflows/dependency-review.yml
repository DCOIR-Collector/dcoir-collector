# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-dependency_security-dependency-review-0010 (Airtable formula preview; final key may use table autonumber suffix)
# Purpose:
# - Run GitHub Dependency Review on pull requests targeting main when repository support is explicitly enabled.
# Use when:
# - Use automatically for PR dependency-change visibility and security review after repo support is confirmed.
# Do not use when:
# - Do not rely on this workflow for private repos that do not support Dependency Review.
# - Do not use as the only review for source, workflow, or broad dependency-policy changes.
# Trigger model:
# - pull_request
# Required inputs:
# - none
# Required secrets/config:
# - Repository variable ENABLE_DEPENDENCY_REVIEW=true only when the repository supports GitHub Dependency Review.
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses actions/dependency-review-action when enabled.
# Expected outputs/readback:
# - Dependency Review check result when enabled, or an informational pass when disabled.
# Safety notes:
# - Keep unsupported private repos green by leaving ENABLE_DEPENDENCY_REVIEW unset.
# - Failures in the real Dependency Review job require PR review before merge.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep the Airtable GitHub Workflow Inventory row aligned when general routing guidance changes.
# Airtable routing:
# - General task-routing guidance belongs in Airtable table `GitHub Workflow Inventory`.
# - This header owns workflow-specific execution guidance; the workflow body remains the executable behavior.
name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency_review:
    if: ${{ vars.ENABLE_DEPENDENCY_REVIEW == 'true' }}
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  dependency_review_not_enabled:
    if: ${{ vars.ENABLE_DEPENDENCY_REVIEW != 'true' }}
    name: Dependency Review Not Enabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain why dependency review is skipped
        run: |
          echo "Dependency Review is not enabled for this repository."
          echo "Set the repository variable ENABLE_DEPENDENCY_REVIEW=true only after confirming the repository supports GitHub Dependency Review for private repositories."
