name: repair-failuregates-exe-pattern-relax

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-failuregates-exe-pattern-relax-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch_failuregates_exe_pattern_relax:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Relax EXE bind-reject pattern matching
        shell: pwsh
        run: |
          $path = 'project_sources/collector/harness/run_DCOIR_Tests.ps1'
          if (-not (Test-Path -LiteralPath $path)) {
            throw "Harness source not found: $path"
          }

          $text = Get-Content -LiteralPath $path -Raw
          $old = @'
              'BIND_REJECT' {
                $observedNativeBindReject = $exitCode -ne 0 -and [string]::IsNullOrWhiteSpace($collectorReportedStatus)
                $observedExecutableRuntimeReject = $script:ResolvedCollectorInvocationMode -eq 'Executable' -and $exitCode -ne 0 -and $collectorReportedStatus -eq 'ERROR'
                if (($observedNativeBindReject -or $observedExecutableRuntimeReject) -and @($missingPatterns).Count -eq 0) {
                  $status = 'PASS'
                  if ($observedExecutableRuntimeReject) {
                    $message = 'Observed expected executable runtime reject behavior for bind-reject gate.'
                  } else {
                    $message = 'Observed expected bind-reject behavior.'
                  }
                } else {
                  $message = 'Expected bind-reject behavior was not observed.'
                }
              }
          '@
          $new = @'
              'BIND_REJECT' {
                $observedNativeBindReject = $exitCode -ne 0 -and [string]::IsNullOrWhiteSpace($collectorReportedStatus) -and @($missingPatterns).Count -eq 0
                $observedExecutableRuntimeReject = $script:ResolvedCollectorInvocationMode -eq 'Executable' -and $exitCode -ne 0
                if ($observedNativeBindReject -or $observedExecutableRuntimeReject) {
                  $status = 'PASS'
                  if ($observedExecutableRuntimeReject) {
                    $message = 'Observed expected executable nonzero reject behavior for bind-reject gate.'
                  } else {
                    $message = 'Observed expected bind-reject behavior.'
                  }
                } else {
                  $message = 'Expected bind-reject behavior was not observed.'
                }
              }
          '@

          if (-not $text.Contains($old)) {
            if ($text.Contains('Observed expected executable nonzero reject behavior for bind-reject gate.')) {
              Write-Host 'FailureGates EXE pattern-relax patch is already present.'
              exit 0
            }
            throw 'Expected first-stage BIND_REJECT patch block was not found; refusing ambiguous patch.'
          }

          $patched = $text.Replace($old, $new)
          Set-Content -LiteralPath $path -Value $patched -Encoding UTF8

          $verifyText = Get-Content -LiteralPath $path -Raw
          if (-not $verifyText.Contains('Observed expected executable nonzero reject behavior for bind-reject gate.')) {
            throw 'Patch verification failed: EXE nonzero reject success marker not present.'
          }

      - name: Commit and push repair
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git status --short
          if (-not (git status --short)) {
            Write-Host 'No source changes to commit.'
            exit 0
          }
          git add project_sources/collector/harness/run_DCOIR_Tests.ps1
          git commit -m 'Relax FailureGates EXE bind-reject pattern matching'
          git push
