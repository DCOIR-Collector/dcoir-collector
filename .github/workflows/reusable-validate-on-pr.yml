# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: validate-on-pr.yml
# Purpose: reusable implementation module for validate-on-pr; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Validate On Pr
run-name: Module Validate On Pr | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/pull_request/workflow_dispatch branching.
        required: false
        type: string
        default: 'workflow_call'
    outputs: {}
    secrets: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        uses: ./.github/actions/validate-python-syntax

      - name: Validate GitHub intake taxonomy
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/check_github_intake_taxonomy.py
          if ($LASTEXITCODE -ne 0) {
            throw 'GitHub intake taxonomy validation failed.'
          }

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        uses: ./.github/actions/validate-powershell-syntax

      - name: Assemble generated collector harness
        uses: ./.github/actions/assemble-collector-harness

      - name: Verify required governed surfaces
        uses: ./.github/actions/verify-required-surfaces
        with:
          profile: validate_on_pr

      - name: Smoke-test Gemini bundle build algorithm
        uses: ./.github/actions/smoke-build-gemini-bundle
        with:
          output-dir: project_sources/validation/out_validate_on_pr_gemini

      - name: Run validate_DCOIR_Run fixture tests
        uses: ./.github/actions/run-validate-dcoir-fixtures
        with:
          output-root: .\validation\out_validate_on_pr_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        uses: ./.github/actions/run-collector-documentation-quality
        with:
          output-json: project_sources/validation/out_validate_on_pr_documentation_quality/collector_documentation_quality.json

      - name: Run PSScriptAnalyzer on collector source
        uses: ./.github/actions/run-psscriptanalyzer

      - name: Check for duplicate function definitions
        uses: ./.github/actions/run-duplicate-function-check

      - name: Run PowerShell review-assist report
        uses: ./.github/actions/run-powershell-review-assist

      - name: Write review-assist report to job summary
        if: always()
        shell: pwsh
        run: |
          $reportPath = 'project_sources/collector/powershell_review_assist_workflow_report.md'
          if (Test-Path -LiteralPath $reportPath) {
            $content = Get-Content -LiteralPath $reportPath -Raw
            $header = "## PowerShell Review-Assist Report — Run #$env:GITHUB_RUN_NUMBER`n`n"
            ($header + $content) | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
            Write-Host 'Review-assist report written to job summary.'
          } else {
            Write-Host 'Review-assist report not found; skipping job summary.'
          }

      - name: Post review-assist report as PR comment
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          $reportPath = 'project_sources/collector/powershell_review_assist_workflow_report.md'
          if (-not (Test-Path -LiteralPath $reportPath)) {
            Write-Host 'Review-assist report not found; skipping PR comment.'
            exit 0
          }
          $prNumber = $env:PR_NUMBER
          if ([string]::IsNullOrWhiteSpace($prNumber) -or $prNumber -eq '0') {
            Write-Host 'No PR number available; skipping PR comment.'
            exit 0
          }
          $body    = Get-Content -LiteralPath $reportPath -Raw
          $header  = "## :mag: PR Validation Report — Run [#$env:GITHUB_RUN_NUMBER]($env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID)`n`n"
          $full    = $header + $body
          # GitHub comment limit is ~65,536 chars.
          if ($full.Length -gt 64000) {
            $full = $full.Substring(0, 63800) + "`n`n---`n_Report truncated. Download the `validate-on-pr-results` artifact for the full output._"
          }
          $tempFile = [System.IO.Path]::GetTempFileName()
          try {
            Set-Content -Path $tempFile -Value $full -Encoding utf8 -NoNewline
            gh pr comment $prNumber --body-file $tempFile
            Write-Host "Posted review-assist report as comment on PR #$prNumber."
          } finally {
            Remove-Item $tempFile -Force -ErrorAction SilentlyContinue
          }

      - name: Build fresh collector runtime zip for harness
        uses: ./.github/actions/build-collector-runtime-for-harness
        with:
          output-dir: project_sources/validation/out_validate_on_pr_collector

      - name: Run collector core pre-live suite
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\harness\run_DCOIR_Tests.generated.ps1 -CollectorPath $env:HARNESS_COLLECTOR_PATH -Suite Core -MasterZipPath $env:HARNESS_RUNTIME_ZIP
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector harness suite failed: Core'
          }

      - name: Upload validation artifacts
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: validate-on-pr-results
          path: |
            project_sources/TestResults/**
            project_sources/validation/out_validate_on_pr_gemini/**
            project_sources/validation/out_validate_on_pr_collector/**
            project_sources/validation/out_validate_on_pr_validate_dcoir_run_fixtures/**
            project_sources/validation/out_preflight_documentation_quality/**
            project_sources/validation/out_validate_on_pr_documentation_quality/**
            project_sources/collector/powershell_analyzer_report.json
            project_sources/collector/powershell_review_assist_workflow_report.json
            project_sources/collector/powershell_review_assist_workflow_report.md
          if-no-files-found: warn
          retention-days: 14

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Pull request validation summary

          - workflow: validate-on-pr
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - event_name: $env:GITHUB_EVENT_NAME
          - primary_artifact: validate-on-pr-results
          - artifact_note: includes Gemini smoke-build output, collector runtime output, validate_DCOIR_Run fixture output, documentation-quality output, PSScriptAnalyzer JSON, PowerShell review-assist JSON/Markdown, and TestResults when produced.
          - pr_comment: review-assist report posted as PR comment when pull-requests write permission is granted.
          - job_summary: review-assist report written to GITHUB_STEP_SUMMARY.
          - duplicate_function_check: blocks merge on any cross-file function name collision in collector source.
          - psscriptanalyzer_gate: blocks merge on any Error-severity finding; Warnings reported but non-blocking.

          The workflow conclusion is the authoritative pass/fail signal for the PR validation lane. Use artifact readback for package, harness, or report-specific claims.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
