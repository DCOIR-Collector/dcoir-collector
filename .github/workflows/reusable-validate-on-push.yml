# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: validate-on-push.yml
# Purpose: reusable implementation module for validate-on-push; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Validate On Push
run-name: Module Validate On Push | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
    outputs: {}
    secrets: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        uses: ./.github/actions/validate-python-syntax

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Run duplicate-function action contract tests
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/test_duplicate_function_action_contract.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Duplicate-function action contract tests failed.'
          }

      - name: Validate PowerShell syntax
        uses: ./.github/actions/validate-powershell-syntax

      - name: Assemble generated collector harness
        uses: ./.github/actions/assemble-collector-harness

      - name: Verify required governed surfaces
        uses: ./.github/actions/verify-required-surfaces
        with:
          profile: validate_on_push

      - name: Smoke-test Gemini bundle build algorithm
        uses: ./.github/actions/smoke-build-gemini-bundle
        with:
          output-dir: project_sources/validation/out_validate_on_push_gemini

      - name: Smoke-test collector runtime package build
        uses: ./.github/actions/smoke-build-collector-package
        with:
          output-dir: project_sources/validation/out_validate_on_push_collector

      - name: Run validate_DCOIR_Run fixture tests
        uses: ./.github/actions/run-validate-dcoir-fixtures
        with:
          output-root: .\validation\out_validate_on_push_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        uses: ./.github/actions/run-collector-documentation-quality
        with:
          output-json: project_sources/validation/out_validate_on_push_documentation_quality/collector_documentation_quality.json

      - name: Run PSScriptAnalyzer on collector source
        uses: ./.github/actions/run-psscriptanalyzer
        with:
          fail-on-error-severity: 'false'

      - name: Check for duplicate function definitions
        uses: ./.github/actions/run-duplicate-function-check
        with:
          fail-on-duplicates: 'false'

      - name: Run PowerShell review-assist report
        uses: ./.github/actions/run-powershell-review-assist

      - name: Write review-assist report to job summary
        if: always()
        shell: pwsh
        run: |
          $reportPath = 'project_sources/collector/powershell_review_assist_workflow_report.md'
          if (Test-Path -LiteralPath $reportPath) {
            $content = Get-Content -LiteralPath $reportPath -Raw
            $header = "## PowerShell Review-Assist Report — Run #$env:GITHUB_RUN_NUMBER`n`n"
            ($header + $content) | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
            Write-Host 'Review-assist report written to job summary.'
          } else {
            Write-Host 'Review-assist report not found; skipping job summary.'
          }

      - name: Enforce static analysis validation gates
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $failures = [System.Collections.Generic.List[string]]::new()

          $analyzerPath = 'project_sources/collector/powershell_analyzer_report.json'
          if (-not (Test-Path -LiteralPath $analyzerPath)) {
            $failures.Add("PSScriptAnalyzer report missing: $analyzerPath")
          } else {
            $analyzer = Get-Content -LiteralPath $analyzerPath -Raw | ConvertFrom-Json
            if ($analyzer.validation.success -ne $true) {
              $failures.Add('PSScriptAnalyzer validation did not report success.')
            }
            $errorCount = 0
            if ($null -ne $analyzer.summary.error_count) {
              $errorCount = [int]$analyzer.summary.error_count
            }
            if ($errorCount -gt 0) {
              $failures.Add("PSScriptAnalyzer reported $errorCount Error-severity finding(s).")
            }
          }

          $duplicatePath = 'project_sources/collector/powershell_duplicate_function_report.json'
          if (-not (Test-Path -LiteralPath $duplicatePath)) {
            $failures.Add("Duplicate-function report missing: $duplicatePath")
          } else {
            $duplicate = Get-Content -LiteralPath $duplicatePath -Raw | ConvertFrom-Json
            if ($duplicate.validation.success -ne $true) {
              $failures.Add('Duplicate-function validation did not report success.')
            }
            $duplicateCount = 0
            if ($null -ne $duplicate.summary.duplicate_function_count) {
              $duplicateCount = [int]$duplicate.summary.duplicate_function_count
            }
            $parseFailureCount = 0
            if ($null -ne $duplicate.summary.parse_failure_count) {
              $parseFailureCount = [int]$duplicate.summary.parse_failure_count
            }
            if ($parseFailureCount -gt 0) {
              $failures.Add("Duplicate-function report has $parseFailureCount parse failure(s).")
            }
            if ($duplicateCount -gt 0) {
              $failures.Add("Duplicate-function report found $duplicateCount duplicate function name(s).")
            }
          }

          if ($failures.Count -gt 0) {
            Write-Host ''
            Write-Host 'STATIC ANALYSIS VALIDATION GATE FAILED'
            Write-Host '======================================'
            foreach ($failure in $failures) {
              Write-Host "  - $failure"
            }
            throw "Static analysis validation gate failed with $($failures.Count) blocking condition(s)."
          }

          Write-Host 'PASS: Static analysis validation gates are clear after report generation.'

      - name: Upload validation artifacts
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: validate-on-push-results
          path: |
            project_sources/TestResults/**
            project_sources/validation/out_validate_on_push_gemini/**
            project_sources/validation/out_validate_on_push_collector/**
            project_sources/validation/out_validate_on_push_validate_dcoir_run_fixtures/**
            project_sources/validation/out_preflight_documentation_quality/**
            project_sources/validation/out_validate_on_push_documentation_quality/**
            project_sources/collector/powershell_analyzer_report.json
            project_sources/collector/powershell_duplicate_function_report.json
            project_sources/collector/powershell_duplicate_function_report.md
            project_sources/collector/powershell_review_assist_workflow_report.json
            project_sources/collector/powershell_review_assist_workflow_report.md
          if-no-files-found: warn
          retention-days: 14

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Push validation summary

          - workflow: validate-on-push
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - event_name: $env:GITHUB_EVENT_NAME
          - primary_artifact: validate-on-push-results
          - artifact_note: includes Gemini smoke-build output, collector package smoke-build output, validate_DCOIR_Run fixture output, documentation-quality output, PSScriptAnalyzer JSON, duplicate-function JSON/Markdown, PowerShell review-assist JSON/Markdown, and TestResults when produced.
          - job_summary: review-assist report written to GITHUB_STEP_SUMMARY.
          - duplicate_function_check: emits JSON/Markdown artifacts before the static analysis validation gate blocks merge on any cross-file function name collision in collector source.
          - psscriptanalyzer_gate: emits JSON before the static analysis validation gate blocks merge on any Error-severity finding; Warnings reported but non-blocking.
          - static_analysis_gate: runs after static reports are generated so review tooling can consume the evidence artifact even when the gate fails.

          The workflow conclusion is the authoritative pass/fail signal for the push validation lane. Use artifact readback for harness, package, documentation, or report-specific claims.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
