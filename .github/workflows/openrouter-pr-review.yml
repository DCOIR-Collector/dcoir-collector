# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-ai_review-openrouter-pr-review-0032
# Purpose:
# - Run an operator-triggered OpenRouter-assisted PR review for approved PR comment commands.
# Use when:
# - Use on a pull request issue_comment from the repository operator with /or-review, /openrouter-review, or /dcoir-review.
# Do not use when:
# - Do not use for automatic PR gating, required checks, untrusted authors, or broad workflow mutation.
# - Do not use in place of governed Prog, Adva, Codi, external Codex, or GitHub Actions review gates.
# Trigger model:
# - issue_comment created; job guard requires a PR comment from non-bot malwaredevil. The Python script accepts only exact approved commands on the first nonblank line.
# Required inputs:
# - PR issue number and trigger comment metadata from github.event.
# Required secrets/config:
# - Uses the workflow token through github.token, OPENROUTER_API_KEY, and .github/openrouter-pr-review-pareto.yml config.
# - Use secret/config names only as defined here and in the local config; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses Python 3.12 and scripts/openrouter_pr_review_pareto_context.py from the trusted default branch checkout.
# Expected outputs/readback:
# - PR conversation progress/status comment, static validation context readback when available, PR review output from scripts/openrouter_pr_review_pareto_context.py, step-summary notices, and GitHub Actions run/job readback when the workflow changes.
# Safety notes:
# - Checkout is pinned to the trusted default branch and persists no credentials.
# - Keep the manual author/command guard, least needed permissions, and issue_comment boundary intact; do not use pull_request_target.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep action versions aligned with the workflow action maintenance audit.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: OpenRouter PR Review
run-name: "OpenRouter PR Review | PR #${{ github.event.issue.number }} | ${{ github.event.comment.user.login }}"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: openrouter-pr-review-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    name: OpenRouter PR review
    if: >-
      ${{
        github.event.issue.pull_request &&
        github.event.comment.user.type != 'Bot' &&
        github.event.comment.user.login == 'malwaredevil'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download static validation context from last validate-on-pr run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_HEAD_SHA=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.sha' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD_SHA" ]; then
            echo "Could not determine PR head SHA; skipping static validation context download."
            exit 0
          fi
          echo "PR head SHA: $PR_HEAD_SHA"

          RUN_LINE=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/validate-on-pr.yml/runs?head_sha=$PR_HEAD_SHA&per_page=10" \
            --jq '([.workflow_runs[] | select(.status == "completed" and (.conclusion == "success" or .conclusion == "failure"))] | sort_by(.updated_at) | reverse | .[0] // empty) | "\(.id)\t\(.conclusion)"' 2>/dev/null || echo "")
          RUN_ID=$(printf '%s' "$RUN_LINE" | cut -f1)
          RUN_CONCLUSION=$(printf '%s' "$RUN_LINE" | cut -f2)
          if [ -z "$RUN_ID" ]; then
            echo "No completed success/failure validate-on-pr run found for SHA $PR_HEAD_SHA; skipping context download."
            exit 0
          fi
          echo "Found validate-on-pr run: $RUN_ID (conclusion: $RUN_CONCLUSION)"

          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "validate-on-pr-results" and .expired == false) | .id' 2>/dev/null | head -1 || echo "")
          if [ -z "$ARTIFACT_ID" ]; then
            echo "validate-on-pr-results artifact not found in run $RUN_ID; skipping."
            exit 0
          fi
          echo "Downloading artifact $ARTIFACT_ID..."

          mkdir -p /tmp/review-assist-context
          gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
            --jq '.[].filename' > /tmp/review-assist-context/changed_files.txt 2>/dev/null || true
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/review-assist-context/artifact.zip 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "Artifact download failed; skipping context injection."
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path
          import zipfile

          archive = Path("/tmp/review-assist-context/artifact.zip")
          destination = Path("/tmp/review-assist-context").resolve()
          with zipfile.ZipFile(archive) as zf:
              for member in zf.infolist():
                  member_path = Path(member.filename)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise SystemExit(f"Unsafe artifact member path: {member.filename}")
                  target = (destination / member_path).resolve()
                  if target != destination and destination not in target.parents:
                      raise SystemExit(f"Artifact member escapes destination: {member.filename}")
              zf.extractall(destination)
          PY
          if [ $? -ne 0 ]; then
            echo "Artifact extraction failed safety checks; skipping context injection."
            exit 0
          fi

          export RUN_ID RUN_CONCLUSION PR_HEAD_SHA
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("/tmp/review-assist-context")
          report_rel = Path("project_sources/collector/powershell_review_assist_workflow_report.md")
          report_path = root / report_rel
          changed_file_path = root / "changed_files.txt"
          changed_files = {
              line.strip()
              for line in changed_file_path.read_text(encoding="utf-8").splitlines()
              if line.strip()
          } if changed_file_path.exists() else set()

          def read_text(rel_path: str | Path) -> str:
              path = root / rel_path
              if not path.exists():
                  return ""
              return path.read_text(encoding="utf-8", errors="replace").strip()

          def load_json(rel_path: str) -> dict:
              path = root / rel_path
              if not path.exists():
                  return {}
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  return {"_load_error": str(exc)}

          def trim(text: str, limit: int) -> str:
              if len(text) <= limit:
                  return text
              return text[:limit].rstrip() + "\n...(static validation context truncated)"

          def cell(value: object) -> str:
              return str(value).replace("|", "\\|").replace("\r", " ").replace("\n", " ").strip()

          def is_changed(path: str) -> bool:
              return not changed_files or path in changed_files

          reports_loaded: list[str] = []
          sections: list[str] = [
              "# Static Validation Context From validate-on-pr",
              "",
              f"- validate_on_pr_run_id: `{os.environ.get('RUN_ID', '')}`",
              f"- validate_on_pr_conclusion: `{os.environ.get('RUN_CONCLUSION', '')}`",
              f"- pr_head_sha: `{os.environ.get('PR_HEAD_SHA', '')}`",
              f"- changed_file_count: `{len(changed_files)}`",
              "",
              "This context is generated from validation artifacts for the exact PR head SHA. Prioritize changed-file findings when writing review comments.",
          ]

          review_assist_markdown = read_text(report_rel)
          if review_assist_markdown:
              reports_loaded.append("powershell_review_assist_workflow_report.md")
              sections.extend([
                  "",
                  "## PowerShell Review-Assist Markdown",
                  "",
                  trim(review_assist_markdown, 12000),
              ])

          analyzer = load_json("project_sources/collector/powershell_analyzer_report.json")
          if analyzer:
              reports_loaded.append("powershell_analyzer_report.json")
              findings = analyzer.get("findings", []) if isinstance(analyzer, dict) else []
              changed_findings = [f for f in findings if is_changed(str(f.get("path", "")))]
              sections.extend([
                  "",
                  "## PSScriptAnalyzer Changed-File Findings",
                  "",
              ])
              if analyzer.get("_load_error"):
                  sections.append(f"PSScriptAnalyzer JSON could not be parsed: `{cell(analyzer['_load_error'])}`")
              elif changed_findings:
                  sections.append("| Path | Line | Severity | Rule | Observed Problem | Recommended Fix |")
                  sections.append("| --- | ---: | --- | --- | --- | --- |")
                  for finding in changed_findings[:40]:
                      sections.append(
                          "| "
                          f"`{cell(finding.get('path', ''))}` | "
                          f"{cell(finding.get('line', ''))} | "
                          f"{cell(finding.get('severity', ''))} | "
                          f"`{cell(finding.get('rule_name', ''))}` | "
                          f"{cell(finding.get('observed_problem', ''))} | "
                          f"{cell(finding.get('recommended_fix', ''))} |"
                      )
                  if len(changed_findings) > 40:
                      sections.append(f"\n...{len(changed_findings) - 40} additional changed-file PSScriptAnalyzer finding(s) omitted.")
              else:
                  sections.append("No PSScriptAnalyzer findings were reported for changed files in this artifact.")

          duplicate_report = load_json("project_sources/collector/powershell_duplicate_function_report.json")
          if duplicate_report:
              reports_loaded.append("powershell_duplicate_function_report.json")
              duplicates = duplicate_report.get("duplicates", []) if isinstance(duplicate_report, dict) else []
              changed_duplicates = []
              for duplicate in duplicates:
                  occurrences = duplicate.get("occurrences", []) if isinstance(duplicate, dict) else []
                  if not changed_files or any(is_changed(str(item.get("path", ""))) for item in occurrences):
                      changed_duplicates.append(duplicate)
              sections.extend([
                  "",
                  "## Duplicate Function Definitions Touching Changed Files",
                  "",
              ])
              if duplicate_report.get("_load_error"):
                  sections.append(f"Duplicate-function JSON could not be parsed: `{cell(duplicate_report['_load_error'])}`")
              elif changed_duplicates:
                  sections.append("| Function | Occurrence Count | Changed Locations | All Locations |")
                  sections.append("| --- | ---: | --- | --- |")
                  for duplicate in changed_duplicates[:40]:
                      occurrences = duplicate.get("occurrences", []) if isinstance(duplicate, dict) else []
                      changed_locations = [
                          f"`{cell(item.get('path', ''))}:{cell(item.get('line', ''))}`"
                          for item in occurrences
                          if is_changed(str(item.get("path", "")))
                      ]
                      all_locations = [
                          f"`{cell(item.get('path', ''))}:{cell(item.get('line', ''))}`"
                          for item in occurrences
                      ]
                      sections.append(
                          "| "
                          f"`{cell(duplicate.get('function_name', ''))}` | "
                          f"{cell(duplicate.get('occurrence_count', len(occurrences)))} | "
                          f"{', '.join(changed_locations) or 'none'} | "
                          f"{', '.join(all_locations)} |"
                      )
                  if len(changed_duplicates) > 40:
                      sections.append(f"\n...{len(changed_duplicates) - 40} additional changed-file duplicate function finding(s) omitted.")
              else:
                  sections.append("No duplicate function definitions touched changed files in this artifact.")

              parse_failures = duplicate_report.get("parse_failures", []) if isinstance(duplicate_report, dict) else []
              if parse_failures:
                  sections.extend([
                      "",
                      "### Duplicate-Function Parse Failures",
                      "",
                      "| Path | Line | Column | Message |",
                      "| --- | ---: | ---: | --- |",
                  ])
                  for failure in parse_failures[:20]:
                      sections.append(
                          "| "
                          f"`{cell(failure.get('path', ''))}` | "
                          f"{cell(failure.get('line', ''))} | "
                          f"{cell(failure.get('column', ''))} | "
                          f"{cell(failure.get('message', ''))} |"
                      )

          if not reports_loaded:
              print("No static validation report files found in validate-on-pr artifact.")
              raise SystemExit(0)

          sections.insert(7, f"- reports_loaded: `{', '.join(reports_loaded)}`")
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(trim("\n".join(sections).strip(), 24000) + "\n", encoding="utf-8")
          print("static-validation-context-reports: " + ", ".join(reports_loaded))
          PY
          if [ $? -ne 0 ]; then
            echo "Static validation context generation failed; skipping context injection."
            exit 0
          fi

          REPORT="project_sources/collector/powershell_review_assist_workflow_report.md"
          REPORT_PATH="/tmp/review-assist-context/$REPORT"
          if [ -f "$REPORT_PATH" ]; then
            echo "Static validation context loaded from validate-on-pr run $RUN_ID ($RUN_CONCLUSION), $( wc -c < "$REPORT_PATH" ) bytes."
            echo "REVIEW_ASSIST_CONTEXT_PATH=$REPORT_PATH" >> $GITHUB_ENV
          else
            echo "No static validation context file generated; no context injection."
          fi

      - name: Run OpenRouter PR review
        env:
          PYTHONUNBUFFERED: '1'
          GITHUB_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          TRIGGER_COMMENT_ID: ${{ github.event.comment.id }}
          TRIGGER_COMMENT_BODY: ${{ github.event.comment.body }}
          TRIGGER_AUTHOR: ${{ github.event.comment.user.login }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          OPENROUTER_REVIEW_CONFIG: .github/openrouter-pr-review-pareto.yml
          REVIEW_ASSIST_CONTEXT_PATH: ${{ env.REVIEW_ASSIST_CONTEXT_PATH }}
        run: python -u scripts/openrouter_pr_review_pareto_context.py
