# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-ai_review-openrouter-pr-review-0032
# Purpose:
# - Run an operator-triggered OpenRouter-assisted PR review for approved PR comment commands.
# Use when:
# - Use on a pull request issue_comment from the repository operator with /or-review, /openrouter-review, or /dcoir-review.
# Do not use when:
# - Do not use for automatic PR gating, required checks, untrusted authors, or broad workflow mutation.
# - Do not use in place of governed Prog, Adva, Codi, external Codex, or GitHub Actions review gates.
# Trigger model:
# - issue_comment created; job guard requires a PR comment from non-bot malwaredevil. The Python script accepts only exact approved commands on the first nonblank line.
# Required inputs:
# - PR issue number and trigger comment metadata from github.event.
# Required secrets/config:
# - Uses the workflow token through github.token, OPENROUTER_API_KEY, and .github/openrouter-pr-review-pareto.yml config.
# - Use secret/config names only as defined here and in the local config; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses Python 3.12 and scripts/openrouter_pr_review_pareto_context.py from the trusted default branch checkout.
# Expected outputs/readback:
# - PR conversation progress/status comment, PR review output from scripts/openrouter_pr_review_pareto_context.py, step-summary notices, and GitHub Actions run/job readback when the workflow changes.
# Safety notes:
# - Checkout is pinned to the trusted default branch and persists no credentials.
# - Keep the manual author/command guard, least needed permissions, and issue_comment boundary intact; do not use pull_request_target.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep action versions aligned with the workflow action maintenance audit.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 28 Review - OpenRouter PR Review
run-name: "28 Review - OpenRouter PR Review | PR #${{ github.event.issue.number }} | ${{ github.event.comment.user.login }}"

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: openrouter-pr-review-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    name: OpenRouter PR review
    if: >-
      ${{
        github.event.issue.pull_request &&
        github.event.comment.user.type != 'Bot' &&
        github.event.comment.user.login == 'malwaredevil'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download review-assist context from last validate-on-pr run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_HEAD_SHA=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.sha' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD_SHA" ]; then
            echo "Could not determine PR head SHA; skipping review-assist context download."
            exit 0
          fi
          echo "PR head SHA: $PR_HEAD_SHA"

          RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/validate-on-pr.yml/runs?head_sha=$PR_HEAD_SHA&per_page=5" \
            --jq '[.workflow_runs[] | select(.status == "completed" and .conclusion == "success")] | sort_by(.updated_at) | reverse | .[0].id // empty' 2>/dev/null || echo "")
          if [ -z "$RUN_ID" ]; then
            echo "No successful completed validate-on-pr run found for SHA $PR_HEAD_SHA; skipping context download."
            exit 0
          fi
          echo "Found validate-on-pr run: $RUN_ID"

          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "validate-on-pr-results") | .id' 2>/dev/null | head -1 || echo "")
          if [ -z "$ARTIFACT_ID" ]; then
            echo "validate-on-pr-results artifact not found in run $RUN_ID; skipping."
            exit 0
          fi
          echo "Downloading artifact $ARTIFACT_ID..."

          mkdir -p /tmp/review-assist-context
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/review-assist-context/artifact.zip 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "Artifact download failed; skipping context injection."
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path
          import zipfile

          archive = Path("/tmp/review-assist-context/artifact.zip")
          destination = Path("/tmp/review-assist-context").resolve()
          with zipfile.ZipFile(archive) as zf:
              for member in zf.infolist():
                  member_path = Path(member.filename)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise SystemExit(f"Unsafe artifact member path: {member.filename}")
                  target = (destination / member_path).resolve()
                  if target != destination and destination not in target.parents:
                      raise SystemExit(f"Artifact member escapes destination: {member.filename}")
              zf.extractall(destination)
          PY
          if [ $? -ne 0 ]; then
            echo "Artifact extraction failed safety checks; skipping context injection."
            exit 0
          fi
          REPORT="project_sources/collector/powershell_review_assist_workflow_report.md"
          REPORT_PATH="/tmp/review-assist-context/$REPORT"
          if [ -f "$REPORT_PATH" ]; then
            echo "Review-assist markdown loaded ($( wc -c < "$REPORT_PATH" ) bytes)."
            echo "REVIEW_ASSIST_CONTEXT_PATH=$REPORT_PATH" >> $GITHUB_ENV
          else
            echo "Review-assist markdown not found in artifact; no context injection."
          fi

      - name: Run OpenRouter PR review
        env:
          PYTHONUNBUFFERED: '1'
          GITHUB_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          TRIGGER_COMMENT_ID: ${{ github.event.comment.id }}
          TRIGGER_COMMENT_BODY: ${{ github.event.comment.body }}
          TRIGGER_AUTHOR: ${{ github.event.comment.user.login }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          OPENROUTER_REVIEW_CONFIG: .github/openrouter-pr-review-pareto.yml
          REVIEW_ASSIST_CONTEXT_PATH: ${{ env.REVIEW_ASSIST_CONTEXT_PATH }}
        run: python -u scripts/openrouter_pr_review_pareto_context.py
