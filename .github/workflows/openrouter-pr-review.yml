# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-ai_review-openrouter-pr-review-0032
# Purpose:
# - Run an operator-triggered DCOIR Review for approved PR comment commands.
# Use when:
# - Use on a pull request issue_comment from the repository operator with /dcoir-review or legacy aliases.
# Do not use when:
# - Do not use for automatic PR gating, required checks, untrusted authors, or broad workflow mutation.
# - Do not use in place of governed Prog, Adva, Codi, external Codex, or GitHub Actions review gates.
# Trigger model:
# - issue_comment created; job guard requires a PR comment from non-bot malwaredevil. The Python script accepts only exact approved commands on the first nonblank line.
# Required inputs:
# - PR issue number and trigger comment metadata from github.event.
# Required secrets/config:
# - Uses the workflow token through github.token, OPENROUTER_API_KEY, and .github/openrouter-pr-review-pareto.yml config.
# - Use secret/config names only as defined here and in the local config; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses Python 3.12 and scripts/openrouter_pr_review_entrypoint.py from the trusted default branch checkout; the entrypoint applies connector-safe runtime patches before invoking scripts/openrouter_pr_review_pareto_context.py.
# Expected outputs/readback:
# - PR review output from scripts/openrouter_pr_review_entrypoint.py, static validation context readback when available, step-summary notices, optional debug progress/status comments, optional debug prompt/context artifacts, a reporter-readable debug markdown section, and GitHub Actions run/job readback when the workflow changes.
# Safety notes:
# - Checkout is pinned to the trusted default branch and persists no credentials.
# - Keep the manual author/command guard, least needed permissions, and issue_comment boundary intact; do not use pull_request_target.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep action versions aligned with the workflow action maintenance audit.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 28 Review - DCOIR Review
run-name: "28 Review - DCOIR Review | PR #${{ github.event.issue.number }} | ${{ github.event.comment.user.login }}"

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: dcoir-review-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    name: DCOIR review
    if: >-
      ${{
        github.event.issue.pull_request &&
        github.event.comment.user.type != 'Bot' &&
        github.event.comment.user.login == 'malwaredevil'
      }}
    uses: ./.github/workflows/reusable-openrouter-pr-review.yml
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
