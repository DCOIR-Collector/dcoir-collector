name: AI Agent Code Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: Run PR Agent
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/')
    steps:
      # 1. Add "Eyes" Emoji to your comment immediately
      - name: Add Eyes Reaction
        id: add-reaction
        uses: actions/github-script@v7
        with:
          script: |
            const reaction = await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            core.setOutput('reaction_id', reaction.data.id);

      # 2. Run the Powerful PR Agent
      - id: pr-agent
        uses: Codium-ai/pr-agent@main
        env:
          # --- Authentication ---
          OPENAI_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI.API_BASE: "https://openrouter.ai/api/v1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # --- Model Config ---
          # We use the 'openrouter/' prefix to route correctly
          CONFIG.MODEL: "openrouter/anthropic/claude-3.5-sonnet"
          CONFIG.FALLBACK_MODELS: '["openrouter/meta-llama/llama-3-70b-instruct"]'
          
          # --- Behavior Config ---
          # Stops it from running automatically on opened PRs (Double safety)
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: "false"
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "false"

      # 3. Remove "Eyes" Emoji when done
      - name: Remove Eyes Reaction
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const reactionId = '${{ steps.add-reaction.outputs.reaction_id }}';
            if (reactionId) {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                reaction_id: parseInt(reactionId)
              });
            }
