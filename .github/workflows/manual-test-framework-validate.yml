# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-manual-test-framework-validate-0015
# Purpose:
# - Validate the manual test framework when its source or workflow changes.
# Use when:
# - Use after edits under project_sources/validation/manual_test_framework or when manual test framework readiness is in question.
# Do not use when:
# - Do not use as a collector runtime or Gemini bundle regression substitute.
# Trigger model:
# - push paths: project_sources/validation/manual_test_framework/**, .github/workflows/manual-test-framework-validate.yml; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses manual test framework validation scripts under project_sources/validation/manual_test_framework.
# Expected outputs/readback:
# - Validation artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - A pass means the manual test framework validated, not that every downstream product behavior passed.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: manual-test-framework-validate

on:
  push:
    paths:
      - 'project_sources/validation/manual_test_framework/**'
      - '.github/workflows/manual-test-framework-validate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-test-framework-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_manual_test_framework:
    uses: ./.github/workflows/reusable-manual-test-framework-validate.yml
    permissions:
      contents: read
    with:
      caller_event_name: ${{ github.event_name }}
