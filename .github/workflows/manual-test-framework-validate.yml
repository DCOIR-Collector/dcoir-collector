# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-manual-test-framework-validate-0015 (Airtable formula preview; final key may use table autonumber suffix)
# Purpose:
# - Validate the manual test framework when its source or workflow changes.
# Use when:
# - Use after edits under project_sources/validation/manual_test_framework or when manual test framework readiness is in question.
# Do not use when:
# - Do not use as a collector runtime or Gemini bundle regression substitute.
# Trigger model:
# - push paths: project_sources/validation/manual_test_framework/**, .github/workflows/manual-test-framework-validate.yml; workflow_dispatch
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses manual test framework validation scripts under project_sources/validation/manual_test_framework.
# Expected outputs/readback:
# - Validation artifacts and repo-workflows report.
# Safety notes:
# - A pass means the manual test framework validated, not that every downstream product behavior passed.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep the Airtable GitHub Workflow Inventory row aligned when general routing guidance changes.
# Airtable routing:
# - General task-routing guidance belongs in Airtable table `GitHub Workflow Inventory`.
# - This header owns workflow-specific execution guidance; the workflow body remains the executable behavior.
name: manual-test-framework-validate

on:
  push:
    paths:
      - 'project_sources/validation/manual_test_framework/**'
      - '.github/workflows/manual-test-framework-validate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-test-framework-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_manual_test_framework:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate manual-test framework Python syntax
        shell: pwsh
        run: |
          $pyFiles = Get-ChildItem -LiteralPath project_sources/validation/manual_test_framework -File -Filter '*.py'
          if (-not $pyFiles) {
            throw 'No manual-test framework Python files found.'
          }
          foreach ($file in $pyFiles) {
            python -m py_compile $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Python syntax validation failed: $($file.FullName)"
            }
          }

      - name: Validate manual-test framework PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = Get-ChildItem -LiteralPath project_sources/validation/manual_test_framework -File -Filter '*.ps1'
          if (-not $psFiles) {
            throw 'No manual-test framework PowerShell files found.'
          }
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              throw "PowerShell syntax validation failed: $($file.FullName): $messages"
            }
          }

      - name: Build manual-test framework download bundle
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/manual_test_framework/out_manual_test_framework_bundle -ErrorAction SilentlyContinue
          python project_sources/validation/manual_test_framework/build_dcoir_manual_test_framework_bundle.py --source-dir project_sources/validation/manual_test_framework --output-dir project_sources/validation/manual_test_framework/out_manual_test_framework_bundle --version v9
          if ($LASTEXITCODE -ne 0) {
            throw 'Manual-test framework bundle build failed.'
          }
          $bundle = Get-ChildItem -LiteralPath project_sources/validation/manual_test_framework/out_manual_test_framework_bundle -File -Filter 'dcoir_manual_test_framework_bundle_v9_full.zip' | Select-Object -First 1
          if (-not $bundle) {
            throw 'Manual-test framework bundle zip was not produced.'
          }

      - name: Upload manual-test framework bundle artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-test-framework-bundle
          path: |
            project_sources/validation/manual_test_framework/out_manual_test_framework_bundle/**
          if-no-files-found: warn
          retention-days: 14
