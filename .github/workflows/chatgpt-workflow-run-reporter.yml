# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-staging_lane-chatgpt-workflow-run-reporter-0008
# Purpose:
# - Create ChatGPT-readable completed-run reports for allowlisted workflows, including optional source-workflow custom markdown sections when uploaded as artifacts.
# Use when:
# - Use automatically through workflow_run after allowlisted workflow completions, or manually for reporter smoke checks.
# Do not use when:
# - Do not use for live polling of active request-id workflows; native staging workflows use their own request-scoped reports.
# Trigger model:
# - workflow_run completed for allowlisted workflow names below; workflow_dispatch inputs: note
# Required inputs:
# - note: Optional operator note for manual reporter smoke checks default=manual reporter smoke check
# Required secrets/config:
# - Uses GITHUB_TOKEN through the workflow token only; do not add external secrets without explicit operator approval.
# Runtime dependencies:
# - Uses GitHub CLI, .github/scripts/write_workflow_report.py, and .github/scripts/Invoke-ChatGptReportPush.ps1.
# Expected outputs/readback:
# - Reports under chatgpt_staging/status_reports/repo-workflows/<workflow-name>/<run-id>/workflow_report.md and a final clickable URL in the Output full URL path step.
# Safety notes:
# - Do not use repo-workflows completed-run summaries for live polling of request-scoped staging workflows.
# Maintenance notes:
# - Keep the workflow_run allowlist aligned with the workflow inventory and issue #194 modularization contract.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: 80 Reporting - Workflow Run Reporter
run-name: Workflow Report for ${{ github.event.workflow_run.name || github.workflow }} #${{ github.event.workflow_run.run_number || github.run_number }}

on:
  workflow_run:
    workflows:
      - 20 Validation - Pull Request
      - 21 Validation - Main Push
      - 10 Operator - ChatGPT Apply-In
      - 11 Operator - ChatGPT Exec
      - 12 Operator - ChatGPT Stage-Out
      - 32 Maintenance - ChatGPT Staging Cleanup
      - 31 Maintenance - ChatGPT Report Retention Cleanup
      - 22 Validation - Gemini Behavioral Replay
      - 21 Validation - Gemini Production-Like Harness
      - 06 Operator - Gemini Behavioral Replay
      - 41 Automation - Dependency Review
      - 40 Automation - Dependabot Auto-Merge
      - 30 Maintenance - Scheduled Health Check
      - 23 Validation - Collector Documentation Quality
      - 30 Maintenance - Workflow Audit
      - 02 Operator - Build Gemini Agent Bundle
      - 04 Operator - Gemini Model Comparison
      - 10 Operator - GitHub Artifact Readback
      - 01 Operator - Build Collector Runtime Bundle
      - 03 Operator - Build Optional Collector EXE
      - 05 Operator - Test Framework Validation
      - 00 Operator - Full Validation
      - 64 Ops - Apply Patch Request
      - 20 Operator - Publish Knowledge to Wiki
      - 24 Validation - Workflow Reporting
      - 26 Validation - Windows PowerShell 5.1
      - 27 Security - CodeQL
    types:
      - completed
  workflow_dispatch:
    inputs:
      note:
        description: "Optional operator note for manual reporter smoke checks"
        required: false
        default: "manual reporter smoke check"
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: chatgpt-workflow-run-reporter-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  report-workflow-run:
    uses: ./.github/workflows/reusable-chatgpt-workflow-run-reporter.yml
    permissions:
      contents: write
      actions: read
    with:
      caller_event_name: ${{ github.event_name }}
      note: ${{ inputs.note || 'manual reporter smoke check' }}
