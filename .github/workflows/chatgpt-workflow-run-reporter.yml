# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-staging_lane-chatgpt-workflow-run-reporter-0007
# Purpose:
# - Create ChatGPT-readable completed-run reports for allowlisted workflows.
# Use when:
# - Use automatically through workflow_run after allowlisted workflow completions, or manually for reporter smoke checks.
# Do not use when:
# - Do not use for live polling of active request-id workflows; native staging workflows use their own request-scoped reports.
# Trigger model:
# - workflow_run completed for: validate-on-push, validate-on-pr, Dependency Review, Dependabot auto-merge, scheduled-health-check, collector-documentation-quality, Workflow maintenance audit, manual-gemini-bundle-build, manual-gemini-model-comparison, manual-github-artifact-readback, manual-collector-runtime-package-build, manual-collector-optional-exe-build, manual-test-framework-validate, manual-full-validation, Ops apply zip request, Ops dispatch request, Ops file delete request, Ops restructure map request, Publish Knowledge to Wiki, chatgpt-workflow-reporting-validation; workflow_dispatch inputs: note
# Required inputs:
# - note: Optional operator note for manual reporter smoke checks default=manual reporter smoke check
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses .github/scripts/write_workflow_report.py and GitHub CLI log fetch for failed source runs.
# Expected outputs/readback:
# - Reports under chatgpt_staging/status_reports/repo-workflows/<workflow-name>/<run-id>/workflow_report.md.
# Safety notes:
# - Do not add the reporter itself or retention cleanup to the allowlist. Update the allowlist when new report-worthy workflows are added.
# - For pull_request-sourced runs, do not embed failed source-workflow logs into committed reports; use the workflow summary and workflow_run_url instead.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: chatgpt-workflow-run-reporter

on:
  workflow_run:
    workflows:
      - validate-on-push
      - validate-on-pr
      - Dependency Review
      - Dependabot auto-merge
      - scheduled-health-check
      - collector-documentation-quality
      - Workflow maintenance audit
      - manual-gemini-bundle-build
      - manual-gemini-model-comparison
      - manual-github-artifact-readback
      - manual-collector-runtime-package-build
      - manual-collector-optional-exe-build
      - manual-test-framework-validate
      - manual-full-validation
      - Ops apply zip request
      - Ops dispatch request
      - Ops file delete request
      - Ops restructure map request
      - Publish Knowledge to Wiki
      - chatgpt-workflow-reporting-validation
    types:
      - completed
  workflow_dispatch:
    inputs:
      note:
        description: "Optional operator note for manual reporter smoke checks"
        required: false
        default: "manual reporter smoke check"
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: chatgpt-workflow-run-reporter-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  report-workflow-run:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.name != 'chatgpt-workflow-run-reporter' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch source workflow logs for failed non-PR runs
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' && github.event.workflow_run.event != 'pull_request' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          mkdir -p .github/tmp
          gh run view "$SOURCE_RUN_ID" --repo "$REPO" --log > .github/tmp/source_workflow.log 2> .github/tmp/source_workflow_log_fetch_error.txt
          rc=$?
          echo "LOG_FETCH_EXIT_CODE=$rc" >> "$GITHUB_ENV"
          exit 0

      - name: Write ChatGPT-readable workflow report
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mkdir -p chatgpt_staging/status_reports/repo-workflows/chatgpt-workflow-run-reporter/manual-${GITHUB_RUN_ID}
            cat > chatgpt_staging/status_reports/repo-workflows/chatgpt-workflow-run-reporter/manual-${GITHUB_RUN_ID}/workflow_report.md <<REPORT
          # ChatGPT workflow report

          ## Result

          - workflow: chatgpt-workflow-run-reporter
          - report_scope: repo-workflows
          - report_family: completed-run-summary
          - assistant_polling_target: false
          - identifier_type: github_run_id
          - do_not_use_for_live_polling: true
          - live_heartbeat_report_scope: progressive-in-session
          - result: success
          - conclusion: success
          - source_event: workflow_dispatch
          - workflow_run_id: ${GITHUB_RUN_ID}
          - reporter_run_id: ${GITHUB_RUN_ID}
          - reporter_sha: ${GITHUB_SHA}
          - report_created_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ## Report routing

          This is a completed-run summary under repo-workflows. Use it after completion or for reporter smoke validation. For active ChatGPT-staged jobs, poll the live-heartbeat report path by request_id instead.

          ## Troubleshooting context

          Manual reporter smoke check.

          ## Next ChatGPT action

          Verify this report by GitHub readback, then allow retention cleanup to remove it after the configured success-report retention window. Do not use this completed-run summary for live polling.
          REPORT
          else
            python .github/scripts/write_workflow_report.py workflow-run \
              --event-json "$GITHUB_EVENT_PATH" \
              --log-file .github/tmp/source_workflow.log \
              --log-error-file .github/tmp/source_workflow_log_fetch_error.txt \
              --max-log-lines 300 \
              --max-log-chars 40000
          fi

      - name: Commit workflow report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chatgpt_staging/status_reports/repo-workflows
          git commit -m "Record ChatGPT workflow run report [skip ci]" || exit 0
          git push
