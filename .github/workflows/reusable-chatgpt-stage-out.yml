# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: chatgpt-stage-out.yml
# Purpose: reusable implementation module for chatgpt-stage-out; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
name: 99 Module - Chatgpt Stage Out
run-name: Module Chatgpt Stage Out | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
      request_path:
        description: Forwarded `request_path` input from the entry workflow.
        required: false
        type: string
        default: 'chatgpt_staging/requests/request.json'
      commit_outputs:
        description: Forwarded `commit_outputs` input from the entry workflow.
        required: false
        type: boolean
        default: true
    outputs: {}
    secrets: {}

permissions:
  contents: write
jobs:
  stage-out:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'

      - name: Verify report push helper
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/scripts/Invoke-ChatGptReportPush.ps1

      - name: Resolve request path
        id: request
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.caller_event_name }}" == "workflow_dispatch" ]]; then
            REQUEST_PATH='${{ inputs.request_path }}'
          else
            REQUEST_PATH=""
            while IFS= read -r p; do
              if [[ "$p" == chatgpt_staging/requests/*.json && -f "$p" ]]; then
                REQUEST_PATH="$p"
                break
              fi
            done < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi
          if [[ -z "$REQUEST_PATH" ]]; then
            echo "No request JSON found in triggering commit; exiting successfully."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$REQUEST_PATH" != chatgpt_staging/requests/*.json ]]; then
            echo "Request path must be under chatgpt_staging/requests/ and end in .json" >&2
            exit 1
          fi
          if [[ ! -f "$REQUEST_PATH" ]]; then
            echo "Request file not found: $REQUEST_PATH" >&2
            exit 1
          fi
          REQUEST_ID="$(python -c 'import json,sys; print(json.load(open(sys.argv[1])).get("request_id", ""))' "$REQUEST_PATH")"
          if [[ -z "$REQUEST_ID" ]]; then
            echo "request_id is required" >&2
            exit 1
          fi
          case "$REQUEST_ID" in
            *[!A-Za-z0-9._-]*|'') echo "Unsafe request_id: $REQUEST_ID" >&2; exit 1 ;;
          esac
          echo "request_path=$REQUEST_PATH" >> "$GITHUB_OUTPUT"
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Write heartbeat - request resolved
        if: steps.request.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-stage-out \
            --request-id '${{ steps.request.outputs.request_id }}' \
            --request-path '${{ steps.request.outputs.request_path }}' \
            --phase request-resolved \
            --result running \
            --message 'Stage-out request path resolved. Request validation and bundle creation are next.'
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Progress chatgpt-stage-out ${{ steps.request.outputs.request_id }} request-resolved [skip ci]" \
            -Paths "chatgpt_staging/status_reports/chatgpt-stage-out/${{ steps.request.outputs.request_id }}"

      - name: Write heartbeat - running stage-out
        if: steps.request.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-stage-out \
            --request-id '${{ steps.request.outputs.request_id }}' \
            --request-path '${{ steps.request.outputs.request_path }}' \
            --phase running-stage-out \
            --result running \
            --message 'Stage-out bundle creation is about to run. If this report remains in this phase, inspect the GitHub run URL for runtime progress.'
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Progress chatgpt-stage-out ${{ steps.request.outputs.request_id }} running-stage-out [skip ci]" \
            -Paths "chatgpt_staging/status_reports/chatgpt-stage-out/${{ steps.request.outputs.request_id }}"

      - name: Validate request and create stage-out bundle
        if: steps.request.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          REQUEST_PATH='${{ steps.request.outputs.request_path }}'
          REQUEST_ID='${{ steps.request.outputs.request_id }}'

          OUT_DIR="chatgpt_staging/out/$REQUEST_ID"
          WORK_DIR="chatgpt_staging/work/$REQUEST_ID"
          REPORT_DIR="chatgpt_staging/status_reports/chatgpt-stage-out/$REQUEST_ID"
          REPORT_PATH="$REPORT_DIR/workflow_report.md"
          NATIVE_REPORT_PATH="$REPORT_DIR/native_stage_out_report.md"
          rm -rf "$OUT_DIR" "$WORK_DIR"
          mkdir -p "$OUT_DIR/files" "$OUT_DIR/chunks" "$WORK_DIR" "$REPORT_DIR"

          python - "$REQUEST_PATH" "$OUT_DIR" <<'PY'
          import hashlib, json, pathlib, shutil, subprocess, zipfile, sys

          request_path = pathlib.Path(sys.argv[1])
          out_dir = pathlib.Path(sys.argv[2])
          req = json.loads(request_path.read_text(encoding="utf-8"))
          schema = req.get("schema")
          if schema != "dcoir.chatgpt_staging.stage_out_request.v1":
              raise SystemExit(f"stage-out request schema must be dcoir.chatgpt_staging.stage_out_request.v1, got {schema!r}")
          allowed_roots = req.get("allowed_roots") or []
          paths = req.get("exact_paths") or []
          search_terms = req.get("search_terms") or []
          max_matches = int(req.get("max_matches_per_term", 20))
          chunk_lines = int(req.get("chunk_lines", 200))
          include_files_copy = bool(req.get("include_files_copy", True))

          if not allowed_roots:
              raise SystemExit("allowed_roots is required for live stage-out requests")

          def safe_rel(path: str) -> bool:
              p = pathlib.PurePosixPath(path)
              if path.startswith("/") or ".." in p.parts:
                  return False
              return any(path == root.rstrip("/") or path.startswith(root.rstrip("/") + "/") for root in allowed_roots)

          selected = []
          for p in paths:
              if not safe_rel(p):
                  raise SystemExit(f"Unsafe or disallowed path: {p}")
              pp = pathlib.Path(p)
              if not pp.is_file():
                  raise SystemExit(f"Requested file not found: {p}")
              selected.append(p)

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for term in search_terms:
              term_l = str(term).lower()
              count = 0
              for p in tracked:
                  if count >= max_matches:
                      break
                  if term_l in p.lower() and safe_rel(p) and pathlib.Path(p).is_file():
                      selected.append(p)
                      count += 1

          selected = sorted(set(selected))
          if not selected:
              raise SystemExit("No files selected")

          manifest = {"request_id": req["request_id"], "request_path": str(request_path), "mode": req.get("mode", "zip_first_with_chunks_fallback"), "allowed_roots": allowed_roots, "files": []}
          md = ["# ChatGPT stage-out manifest", "", f"- request_id: `{req['request_id']}`", f"- request_path: `{request_path}`", "", "## Files", ""]

          zip_path = out_dir / "staged_files.zip"
          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for idx, p in enumerate(selected, 1):
                  source = pathlib.Path(p)
                  data = source.read_bytes()
                  sha256 = hashlib.sha256(data).hexdigest()
                  ls = subprocess.check_output(["git", "ls-files", "-s", "--", p], text=True).split()
                  blob_sha = ls[1] if len(ls) > 1 else "UNTRACKED"
                  if include_files_copy:
                      rel_copy = out_dir / "files" / p
                      rel_copy.parent.mkdir(parents=True, exist_ok=True)
                      shutil.copy2(source, rel_copy)
                  zf.write(source, arcname=p)
                  text = source.read_text(encoding="utf-8", errors="replace")
                  lines = text.splitlines()
                  chunks = []
                  for chunk_no, start in enumerate(range(0, len(lines), chunk_lines), 1):
                      safe_name = source.name.replace("/", "_")
                      chunk_name = f"{idx:03d}__{safe_name}__chunk{chunk_no:03d}.txt"
                      chunk_path = out_dir / "chunks" / chunk_name
                      header = [f"original_path: {p}", f"blob_sha: {blob_sha}", f"sha256: {sha256}", f"chunk: {chunk_no}", f"line_start: {start+1}", f"line_end: {min(start+chunk_lines, len(lines))}", "---"]
                      chunk_path.write_text("\n".join(header + lines[start:start+chunk_lines]) + "\n", encoding="utf-8")
                      chunks.append(str(chunk_path.relative_to(out_dir)))
                  entry = {"path": p, "bytes": len(data), "lines": len(lines), "blob_sha": blob_sha, "sha256": sha256, "chunks": chunks}
                  manifest["files"].append(entry)
                  md.append(f"- `{p}` | bytes={len(data)} | lines={len(lines)} | blob_sha=`{blob_sha}` | sha256=`{sha256}`")

          (out_dir / "manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          (out_dir / "manifest.md").write_text("\n".join(md) + "\n", encoding="utf-8")
          PY

          {
            echo "# ChatGPT workflow report"
            echo
            echo "## Result"
            echo
            echo "- workflow: chatgpt-stage-out"
            echo "- result: success"
            echo "- phase: bundle-created"
            echo "- request_id: $REQUEST_ID"
            echo "- request_path: $REQUEST_PATH"
            echo "- output_dir: $OUT_DIR"
            echo "- github_run_id: $GITHUB_RUN_ID"
            echo "- github_sha: $GITHUB_SHA"
            echo "- github_ref: $GITHUB_REF"
            echo "- report_created_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Output"
            echo
            find "$OUT_DIR" -maxdepth 3 -type f | sort | sed 's/^/- /'
            echo
            echo "## Cleanup guidance"
            echo
            echo "After ChatGPT retrieves the needed output, create a cleanup marker for request id '$REQUEST_ID' with cleanup_out_bundles=true and cleanup_status_reports=true."
            echo
            echo "## Next ChatGPT action"
            echo
            echo "Read manifest.md/manifest.json and staged_files.zip or chunks under $OUT_DIR. Record evidence, then request cleanup when safe."
          } > "$NATIVE_REPORT_PATH"

          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-stage-out \
            --request-id "$REQUEST_ID" \
            --request-path "$REQUEST_PATH" \
            --phase bundle-created \
            --result success \
            --message 'Stage-out bundle was created successfully. Native stage-out output details are appended below.'
          {
            echo
            echo "## Native stage-out report"
            echo
            cat "$NATIVE_REPORT_PATH"
          } >> "$REPORT_PATH"

          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"
          echo "REQUEST_PATH=$REQUEST_PATH" >> "$GITHUB_ENV"
          echo "REQUEST_ID=$REQUEST_ID" >> "$GITHUB_ENV"
          echo "REPORT_DIR=$REPORT_DIR" >> "$GITHUB_ENV"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"

      - name: Upload stage-out artifact copy
        if: steps.request.outputs.skip != 'true'
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-stage-out
          path: ${{ env.OUT_DIR }}/**
          retention-days: 7

      - name: Commit stage-out bundle, report, and clean request
        if: steps.request.outputs.skip != 'true' && (inputs.caller_event_name == 'push' || inputs.commit_outputs)
        shell: bash
        run: |
          set -euo pipefail
          rm -f "$REQUEST_PATH" || true
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Stage ChatGPT readback bundle and report [skip ci]" \
            -Paths "$OUT_DIR" "$REPORT_DIR" "$REQUEST_PATH"

      - name: Capture stage-out failure report
        if: failure() && steps.request.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          REQUEST_PATH='${{ steps.request.outputs.request_path }}'
          REQUEST_ID='${{ steps.request.outputs.request_id }}'
          case "$REQUEST_ID" in
            *[!A-Za-z0-9._-]*|'') REQUEST_ID="unsafe_or_unknown" ;;
          esac
          REPORT_DIR="chatgpt_staging/status_reports/chatgpt-stage-out/$REQUEST_ID"
          REPORT_PATH="$REPORT_DIR/workflow_report.md"
          NATIVE_REPORT_PATH="$REPORT_DIR/native_stage_out_failure_report.md"
          mkdir -p "$REPORT_DIR"
          {
            echo "# ChatGPT workflow report"
            echo
            echo "## Result"
            echo
            echo "- workflow: chatgpt-stage-out"
            echo "- result: failure"
            echo "- phase: stage-out"
            echo "- request_id: $REQUEST_ID"
            echo "- request_path: $REQUEST_PATH"
            echo "- github_run_id: $GITHUB_RUN_ID"
            echo "- github_sha: $GITHUB_SHA"
            echo "- github_ref: $GITHUB_REF"
            echo "- report_created_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Troubleshooting notes"
            echo
            echo "The stage-out workflow failed before producing a trusted output bundle. Common causes include malformed JSON, missing or wrong schema, unsafe request_id, missing allowed_roots, disallowed paths, or no selected files. Inspect the GitHub Actions run logs for full details."
            echo
            echo "## Cleanup guidance"
            echo
            echo "Do not retry with the same request id until ChatGPT reads this report. Create a cleanup marker with cleanup_status_reports=true when this report is no longer needed."
            echo
            echo "## Next ChatGPT action"
            echo
            echo "Read this report, inspect the run log if needed, update Airtable with the failure phase, then repair or regenerate the request."
          } > "$NATIVE_REPORT_PATH"
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-stage-out \
            --request-id "$REQUEST_ID" \
            --request-path "$REQUEST_PATH" \
            --phase stage-out-failure \
            --result failure \
            --message 'The stage-out workflow failed. Native failure details are appended below.'
          {
            echo
            echo "## Native stage-out failure report"
            echo
            cat "$NATIVE_REPORT_PATH"
          } >> "$REPORT_PATH"
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Record ChatGPT stage-out failure report [skip ci]" \
            -Paths "$REPORT_DIR"
