# DCOIR REUSABLE WORKFLOW CONTRACT
# Source entry workflow: manual-github-artifact-readback.yml
# Purpose: reusable implementation module for chatgpt-github-artifact-readback; entry workflow retains triggers, permissions, concurrency, and operator-visible contract notes.
# Report contract: request-scoped live heartbeat reports include progress_history.jsonl and latest_progress_marker.json via .github/scripts/write_chatgpt_progress_report.py.
name: 99 Module - Manual Github Artifact Readback
run-name: Module Manual Github Artifact Readback | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Original caller event name so the reusable body can preserve push/workflow_dispatch/workflow_run branching.
        required: false
        type: string
        default: 'workflow_call'
      request_path:
        description: Forwarded `request_path` input from the entry workflow.
        required: false
        type: string
        default: ''
      source_run_id:
        description: Forwarded `source_run_id` input from the entry workflow.
        required: false
        type: string
        default: ''
      artifact_name:
        description: Forwarded `artifact_name` input from the entry workflow.
        required: false
        type: string
        default: ''
      artifact_id:
        description: Forwarded `artifact_id` input from the entry workflow.
        required: false
        type: string
        default: ''
      request_id:
        description: Forwarded `request_id` input from the entry workflow.
        required: false
        type: string
        default: ''
      artifact_subpath:
        description: Forwarded `artifact_subpath` input from the entry workflow.
        required: false
        type: string
        default: ''
      commit_outputs:
        description: Forwarded `commit_outputs` input from the entry workflow.
        required: false
        type: boolean
        default: true
    outputs: {}
    secrets: {}

permissions:
  contents: write
  actions: write
jobs:
  artifact_readback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'

      - name: Verify report helpers and artifact-readback scripts
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/scripts/write_chatgpt_progress_report.py
          test -f .github/scripts/Invoke-ChatGptReportPush.ps1
          test -f .github/scripts/parse_github_artifact_readback_request.py
          test -f .github/scripts/resolve_github_artifact_readback_plan.py
          test -f .github/scripts/stage_github_artifact_readback.py
          test -f .github/scripts/write_github_artifact_readback_success_report.py
          test -f .github/scripts/write_github_artifact_readback_failure_report.py

      - name: Resolve artifact readback plan
        id: plan
        shell: bash
        env:
          INPUT_REQUEST_PATH: ${{ inputs.request_path }}
          INPUT_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
          INPUT_ARTIFACT_ID: ${{ inputs.artifact_id }}
          INPUT_REQUEST_ID: ${{ inputs.request_id }}
          INPUT_ARTIFACT_SUBPATH: ${{ inputs.artifact_subpath }}
          INPUT_COMMIT_OUTPUTS: ${{ inputs.commit_outputs }}
          EVENT_NAME: ${{ inputs.caller_event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          python .github/scripts/resolve_github_artifact_readback_plan.py \
            --event-name "$EVENT_NAME" \
            --request-path-input "$INPUT_REQUEST_PATH" \
            --source-run-id "$INPUT_SOURCE_RUN_ID" \
            --artifact-name "$INPUT_ARTIFACT_NAME" \
            --artifact-id "$INPUT_ARTIFACT_ID" \
            --request-id "$INPUT_REQUEST_ID" \
            --artifact-subpath "$INPUT_ARTIFACT_SUBPATH" \
            --commit-outputs "$INPUT_COMMIT_OUTPUTS" \
            --before-sha "$BEFORE_SHA" \
            --github-sha "$GITHUB_SHA" \
            --runner-temp "$RUNNER_TEMP" \
            --output "$GITHUB_OUTPUT"

      - name: Write heartbeat - request resolved
        if: steps.plan.outputs.skip != 'true'
        shell: bash
        env:
          REQUEST_ID: ${{ steps.plan.outputs.request_id }}
          REQUEST_PATH: ${{ steps.plan.outputs.request_path }}
          SOURCE_RUN_ID: ${{ steps.plan.outputs.source_run_id }}
          ARTIFACT_NAME: ${{ steps.plan.outputs.artifact_name }}
          ARTIFACT_ID: ${{ steps.plan.outputs.artifact_id }}
          ARTIFACT_SUBPATH: ${{ steps.plan.outputs.artifact_subpath }}
          REPORT_DIR: ${{ steps.plan.outputs.report_dir }}
        run: |
          set -euo pipefail
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-github-artifact-readback \
            --request-id "$REQUEST_ID" \
            --request-path "$REQUEST_PATH" \
            --phase request-resolved \
            --result running \
            --artifact-name "$ARTIFACT_NAME" \
            --message 'Artifact readback inputs resolved. Artifact download is next.' \
            --extra "source_run_id: $SOURCE_RUN_ID" \
            --extra "artifact_id: $ARTIFACT_ID" \
            --extra "artifact_subpath: ${ARTIFACT_SUBPATH:-.}"
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Progress chatgpt-github-artifact-readback $REQUEST_ID request-resolved [skip ci]" \
            -Paths "$REPORT_DIR"

      - name: Write heartbeat - downloading artifact
        if: steps.plan.outputs.skip != 'true'
        shell: bash
        env:
          REQUEST_ID: ${{ steps.plan.outputs.request_id }}
          REQUEST_PATH: ${{ steps.plan.outputs.request_path }}
          SOURCE_RUN_ID: ${{ steps.plan.outputs.source_run_id }}
          ARTIFACT_NAME: ${{ steps.plan.outputs.artifact_name }}
          ARTIFACT_ID: ${{ steps.plan.outputs.artifact_id }}
          REPORT_DIR: ${{ steps.plan.outputs.report_dir }}
        run: |
          set -euo pipefail
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-github-artifact-readback \
            --request-id "$REQUEST_ID" \
            --request-path "$REQUEST_PATH" \
            --phase downloading-artifact \
            --result running \
            --artifact-name "$ARTIFACT_NAME" \
            --message 'The bounded GitHub Actions artifact download is starting.' \
            --extra "source_run_id: $SOURCE_RUN_ID" \
            --extra "artifact_id: $ARTIFACT_ID"
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Progress chatgpt-github-artifact-readback $REQUEST_ID downloading-artifact [skip ci]" \
            -Paths "$REPORT_DIR"

      - name: Download artifact by id
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.artifact_id != ''
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.plan.outputs.source_run_id }}
          artifact-ids: ${{ steps.plan.outputs.artifact_id }}
          github-token: ${{ github.token }}
          path: ${{ steps.plan.outputs.download_dir }}

      - name: Download artifact by name
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.artifact_id == ''
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.plan.outputs.source_run_id }}
          name: ${{ steps.plan.outputs.artifact_name }}
          github-token: ${{ github.token }}
          path: ${{ steps.plan.outputs.download_dir }}

      - name: Write heartbeat - artifact downloaded
        if: steps.plan.outputs.skip != 'true'
        shell: bash
        env:
          REQUEST_ID: ${{ steps.plan.outputs.request_id }}
          REQUEST_PATH: ${{ steps.plan.outputs.request_path }}
          ARTIFACT_NAME: ${{ steps.plan.outputs.artifact_name }}
          REPORT_DIR: ${{ steps.plan.outputs.report_dir }}
        run: |
          set -euo pipefail
          python .github/scripts/write_chatgpt_progress_report.py \
            --workflow chatgpt-github-artifact-readback \
            --request-id "$REQUEST_ID" \
            --request-path "$REQUEST_PATH" \
            --phase artifact-downloaded \
            --result running \
            --artifact-name "$ARTIFACT_NAME" \
            --message 'The artifact download completed. Extraction and manifest staging are next.'
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Progress chatgpt-github-artifact-readback $REQUEST_ID artifact-downloaded [skip ci]" \
            -Paths "$REPORT_DIR"

      - name: Stage extracted artifact into cleanup-managed path
        if: steps.plan.outputs.skip != 'true'
        shell: bash
        env:
          DOWNLOAD_DIR: ${{ steps.plan.outputs.download_dir }}
          OUT_DIR: ${{ steps.plan.outputs.out_dir }}
          REPORT_DIR: ${{ steps.plan.outputs.report_dir }}
          REQUEST_ID: ${{ steps.plan.outputs.request_id }}
          SOURCE_RUN_ID: ${{ steps.plan.outputs.source_run_id }}
          ARTIFACT_NAME: ${{ steps.plan.outputs.artifact_name }}
          ARTIFACT_ID: ${{ steps.plan.outputs.artifact_id }}
          ARTIFACT_SUBPATH: ${{ steps.plan.outputs.artifact_subpath }}
        run: |
          set -euo pipefail
          python .github/scripts/stage_github_artifact_readback.py \
            --download-dir "$DOWNLOAD_DIR" \
            --out-dir "$OUT_DIR" \
            --report-dir "$REPORT_DIR" \
            --request-id "$REQUEST_ID" \
            --source-run-id "$SOURCE_RUN_ID" \
            --artifact-name "$ARTIFACT_NAME" \
            --artifact-id "$ARTIFACT_ID" \
            --artifact-subpath "$ARTIFACT_SUBPATH"

      - name: Write artifact readback success report
        if: steps.plan.outputs.skip != 'true'
        shell: bash
        env:
          REQUEST_ID: ${{ steps.plan.outputs.request_id }}
          REQUEST_PATH: ${{ steps.plan.outputs.request_path }}
          SOURCE_RUN_ID: ${{ steps.plan.outputs.source_run_id }}
          ARTIFACT_NAME: ${{ steps.plan.outputs.artifact_name }}
          ARTIFACT_ID: ${{ steps.plan.outputs.artifact_id }}
          ARTIFACT_SUBPATH: ${{ steps.plan.outputs.artifact_subpath }}
          OUT_DIR: ${{ steps.plan.outputs.out_dir }}
          REPORT_DIR: ${{ steps.plan.outputs.report_dir }}
        run: |
          set -euo pipefail
          python .github/scripts/write_github_artifact_readback_success_report.py \
            --request-id "$REQUEST_ID" \
            --request-path "$REQUEST_PATH" \
            --source-run-id "$SOURCE_RUN_ID" \
            --artifact-name "$ARTIFACT_NAME" \
            --artifact-id "$ARTIFACT_ID" \
            --artifact-subpath "$ARTIFACT_SUBPATH" \
            --out-dir "$OUT_DIR" \
            --report-dir "$REPORT_DIR"

      - name: Commit staged artifact readback and report
        if: steps.plan.outputs.skip != 'true' && (inputs.caller_event_name == 'push' || steps.plan.outputs.commit_outputs == 'true')
        shell: bash
        env:
          REQUEST_PATH: ${{ steps.plan.outputs.request_path }}
          OUT_DIR: ${{ steps.plan.outputs.out_dir }}
          REPORT_DIR: ${{ steps.plan.outputs.report_dir }}
        run: |
          set -euo pipefail
          if [[ -n "$REQUEST_PATH" ]]; then
            rm -f "$REQUEST_PATH" || true
          fi
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Stage GitHub artifact readback bundle and report [skip ci]" \
            -Paths "$OUT_DIR" "$REPORT_DIR" "$REQUEST_PATH" \
            -RequirePush

      - name: Dispatch next queued artifact readback request
        if: steps.plan.outputs.skip != 'true' && (inputs.caller_event_name == 'push' || steps.plan.outputs.commit_outputs == 'true') && steps.plan.outputs.next_request_path != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NEXT_REQUEST_PATH: ${{ steps.plan.outputs.next_request_path }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PAYLOAD="$(python -c "import json, os; print(json.dumps({'ref': os.environ['REF_NAME'], 'inputs': {'request_path': os.environ['NEXT_REQUEST_PATH'], 'source_run_id': '', 'artifact_name': '', 'artifact_id': '', 'request_id': '', 'artifact_subpath': '', 'commit_outputs': 'true'}}))")"
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/manual-github-artifact-readback.yml/dispatches" \
            -d "$PAYLOAD"

      - name: Capture failure report
        if: failure() && steps.plan.outputs.skip != 'true'
        shell: bash
        env:
          REQUEST_ID: ${{ steps.plan.outputs.request_id }}
          REQUEST_PATH: ${{ steps.plan.outputs.request_path }}
          SOURCE_RUN_ID: ${{ steps.plan.outputs.source_run_id }}
          ARTIFACT_NAME: ${{ steps.plan.outputs.artifact_name }}
          ARTIFACT_ID: ${{ steps.plan.outputs.artifact_id }}
          ARTIFACT_SUBPATH: ${{ steps.plan.outputs.artifact_subpath }}
        run: |
          set -euo pipefail
          python .github/scripts/write_github_artifact_readback_failure_report.py \
            --request-id "$REQUEST_ID" \
            --request-path "$REQUEST_PATH" \
            --source-run-id "$SOURCE_RUN_ID" \
            --artifact-name "$ARTIFACT_NAME" \
            --artifact-id "$ARTIFACT_ID" \
            --artifact-subpath "$ARTIFACT_SUBPATH"
          pwsh -NoProfile -File .github/scripts/Invoke-ChatGptReportPush.ps1 \
            -CommitMessage "Record GitHub artifact readback failure report [skip ci]" \
            -Paths "chatgpt_staging/status_reports/chatgpt-github-artifact-readback/${REQUEST_ID:-artifact_readback_failure_$GITHUB_RUN_ID}"
