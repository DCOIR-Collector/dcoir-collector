name: chatgpt-apply-in

on:
  workflow_dispatch:
    inputs:
      payload_b64_path:
        description: "Repo-relative base64 ZIP payload under chatgpt_staging/in/<request_id>/payload.zip.b64"
        required: true
        default: "chatgpt_staging/in/request/payload.zip.b64"
        type: string
      commit_changes:
        description: "Commit applied file changes"
        required: true
        default: true
        type: boolean
      delete_payload_after_success:
        description: "Delete payload.zip.b64 after successful apply to reduce repo bloat"
        required: true
        default: true
        type: boolean
  push:
    paths:
      - "chatgpt_staging/in/*/payload.zip.b64"

permissions:
  contents: write

concurrency:
  group: chatgpt-apply-in-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-in:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve payload path
        id: payload
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PAYLOAD='${{ inputs.payload_b64_path }}'
          else
            PAYLOAD=""
            while IFS= read -r p; do
              if [[ "$p" == chatgpt_staging/in/*/payload.zip.b64 && -f "$p" ]]; then
                PAYLOAD="$p"
                break
              fi
            done < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi
          if [[ -z "$PAYLOAD" ]]; then
            echo "No payload.zip.b64 found in triggering commit; exiting successfully."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "payload_path=$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Decode ZIP payload and apply bundle
        if: steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD='${{ steps.payload.outputs.payload_path }}'

          if [[ "$PAYLOAD" != chatgpt_staging/in/*/payload.zip.b64 ]]; then
            echo "Payload must match chatgpt_staging/in/<request_id>/payload.zip.b64" >&2
            exit 1
          fi
          if [[ ! -f "$PAYLOAD" ]]; then
            echo "Payload file not found: $PAYLOAD" >&2
            exit 1
          fi

          REQUEST_ID="$(basename "$(dirname "$PAYLOAD")")"
          WORK_DIR="chatgpt_staging/work/$REQUEST_ID"
          REPORT_DIR="chatgpt_staging/status_reports/chatgpt-apply-in/$REQUEST_ID"
          REPORT_PATH="$REPORT_DIR/workflow_report.md"
          echo "REQUEST_ID=$REQUEST_ID" >> "$GITHUB_ENV"
          echo "PAYLOAD=$PAYLOAD" >> "$GITHUB_ENV"
          echo "WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"
          echo "REPORT_DIR=$REPORT_DIR" >> "$GITHUB_ENV"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"

          rm -rf "$WORK_DIR" "$REPORT_DIR"
          mkdir -p "$WORK_DIR/extract" "$REPORT_DIR"

          base64 -d "$PAYLOAD" > "$WORK_DIR/payload.zip"
          unzip -q "$WORK_DIR/payload.zip" -d "$WORK_DIR/extract"

          if [[ ! -f "$WORK_DIR/extract/apply_manifest.json" ]]; then
            echo "Decoded ZIP did not contain apply_manifest.json" >&2
            exit 1
          fi

          python - "$WORK_DIR/extract/apply_manifest.json" "$WORK_DIR/extract" <<'PY'
          import hashlib, json, pathlib, shutil, subprocess, sys

          manifest_path = pathlib.Path(sys.argv[1])
          extract_root = pathlib.Path(sys.argv[2])
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          allowed_roots = manifest.get("allowed_roots") or []
          if not allowed_roots:
              raise SystemExit("allowed_roots is required")

          allow_missing_current_hash = bool(manifest.get("allow_missing_current_hash", False))
          blocked_prefixes = [
              ".git/",
              "chatgpt_staging/out/",
              "chatgpt_staging/work/",
              "chatgpt_staging/apply_reports/",
              "chatgpt_staging/failure_reports/",
              "chatgpt_staging/cleanup_requests/",
              "chatgpt_staging/status_reports/",
          ]
          allow_workflows = bool(manifest.get("allow_workflow_changes", False))

          def safe_rel(path: str) -> bool:
              p = pathlib.PurePosixPath(path)
              if path.startswith("/") or ".." in p.parts:
                  return False
              if any(path.startswith(prefix) for prefix in blocked_prefixes):
                  return False
              if path.startswith(".github/workflows/") and not allow_workflows:
                  return False
              return any(path == root.rstrip("/") or path.startswith(root.rstrip("/") + "/") for root in allowed_roots)

          def tracked_blob_sha(target: str) -> str:
              try:
                  out = subprocess.check_output(["git", "ls-files", "-s", "--", target], text=True).split()
              except subprocess.CalledProcessError:
                  return ""
              return out[1] if len(out) > 1 else ""

          applied = []
          warnings = []
          for item in manifest.get("files", []):
              target = item.get("path", "")
              source = item.get("source", "")
              expected_blob_sha = item.get("expected_blob_sha")
              expected_current_sha256 = item.get("expected_current_sha256")
              expected_new_sha256 = item.get("expected_new_sha256")
              create_only = bool(item.get("create_only", False))

              if not safe_rel(target):
                  raise SystemExit(f"Unsafe or disallowed target path: {target}")
              if not source or source.startswith("/") or ".." in pathlib.PurePosixPath(source).parts:
                  raise SystemExit(f"Unsafe source path: {source}")

              src_path = extract_root / source
              if not src_path.is_file():
                  raise SystemExit(f"Source file missing in ZIP: {src_path}")

              dst_path = pathlib.Path(target)
              exists = dst_path.exists()
              blob_sha = tracked_blob_sha(target)
              is_tracked = bool(blob_sha)

              if create_only:
                  if exists:
                      raise SystemExit(f"create_only target already exists: {target}")
                  if not expected_new_sha256:
                      raise SystemExit(f"create_only requires expected_new_sha256 for {target}")
              elif exists:
                  if is_tracked and not (expected_blob_sha or expected_current_sha256):
                      if not allow_missing_current_hash:
                          raise SystemExit(
                              f"Existing tracked file requires expected_blob_sha or expected_current_sha256: {target}"
                          )
                      warnings.append(f"allow_missing_current_hash override used for {target}")
                  if not is_tracked:
                      raise SystemExit(f"Existing untracked file cannot be overwritten by apply-in: {target}")
              else:
                  if not expected_new_sha256:
                      raise SystemExit(f"New file requires expected_new_sha256 and create_only=true for {target}")
                  if not create_only:
                      raise SystemExit(f"New file requires create_only=true for {target}")

              if expected_blob_sha and is_tracked and blob_sha != expected_blob_sha:
                  raise SystemExit(f"Blob SHA mismatch for {target}: expected {expected_blob_sha}, got {blob_sha}")

              if expected_current_sha256 and exists:
                  actual = hashlib.sha256(dst_path.read_bytes()).hexdigest()
                  if actual != expected_current_sha256:
                      raise SystemExit(f"Current sha256 mismatch for {target}: expected {expected_current_sha256}, got {actual}")

              if expected_new_sha256:
                  actual_new = hashlib.sha256(src_path.read_bytes()).hexdigest()
                  if actual_new != expected_new_sha256:
                      raise SystemExit(f"New sha256 mismatch for {target}: expected {expected_new_sha256}, got {actual_new}")

              dst_path.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src_path, dst_path)
              applied.append(target)

          if not applied:
              raise SystemExit("No files applied")

          out = pathlib.Path("chatgpt_staging/apply_reports")
          out.mkdir(parents=True, exist_ok=True)
          request_id = manifest.get("request_id", "unknown")
          report = out / f"{request_id}_apply_report.md"
          lines = ["# ChatGPT apply-in report", ""]
          lines.extend(f"- applied: `{p}`" for p in applied)
          if warnings:
              lines.extend(["", "## Stale-write warnings", ""])
              lines.extend(f"- {w}" for w in warnings)
          report.write_text("\n".join(lines) + "\n", encoding="utf-8")
          pathlib.Path("chatgpt_staging/work/applied_paths.txt").parent.mkdir(parents=True, exist_ok=True)
          pathlib.Path("chatgpt_staging/work/applied_paths.txt").write_text("\n".join(applied) + "\n", encoding="utf-8")
          if warnings:
              pathlib.Path("chatgpt_staging/work/hash_warnings.txt").write_text("\n".join(warnings) + "\n", encoding="utf-8")
          PY

      - name: Write apply-in success report
        if: steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$REPORT_DIR"
          {
            echo "# ChatGPT workflow report"
            echo
            echo "## Result"
            echo
            echo "- workflow: chatgpt-apply-in"
            echo "- result: success"
            echo "- phase: bundle-applied-before-commit"
            echo "- request_id: $REQUEST_ID"
            echo "- payload_path: $PAYLOAD"
            echo "- github_run_id: $GITHUB_RUN_ID"
            echo "- github_sha: $GITHUB_SHA"
            echo "- github_ref: $GITHUB_REF"
            echo "- report_created_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Applied paths"
            echo
            if [[ -f chatgpt_staging/work/applied_paths.txt ]]; then
              sed 's/^/- /' chatgpt_staging/work/applied_paths.txt
            else
              echo "- No applied_paths.txt was found."
            fi
            if [[ -f chatgpt_staging/work/hash_warnings.txt ]]; then
              echo
              echo "## Stale-write override warnings"
              sed 's/^/- /' chatgpt_staging/work/hash_warnings.txt
            fi
            echo
            echo "## Cleanup guidance"
            echo
            echo "After ChatGPT verifies the commit/readback and no longer needs this report, create a cleanup marker for request id '$REQUEST_ID' with cleanup_status_reports=true."
            echo
            echo "## Next ChatGPT action"
            echo
            echo "Verify the committed target changes, hash policy outcome, and apply report. If readback is good, update Airtable and clean this status report when safe."
          } > "$REPORT_PATH"

      - name: Commit applied changes
        if: steps.payload.outputs.skip != 'true' && (github.event_name == 'push' || inputs.commit_changes)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -f chatgpt_staging/work/applied_paths.txt ]]; then
            while IFS= read -r p; do
              [[ -n "$p" ]] && git add -- "$p"
            done < chatgpt_staging/work/applied_paths.txt
          fi
          git add chatgpt_staging/apply_reports "$REPORT_DIR" || true
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.delete_payload_after_success }}" == "true" ]]; then
            git rm -f "$PAYLOAD" || true
          fi
          git commit -m "Apply ChatGPT staging bundle and report [skip validate-on-push]" || exit 0
          git push

      - name: Capture apply-in failure report
        if: failure() && steps.payload.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD="${PAYLOAD:-${{ steps.payload.outputs.payload_path }}}"
          REQUEST_ID="${REQUEST_ID:-unknown}"
          if [[ "$PAYLOAD" == chatgpt_staging/in/*/payload.zip.b64 ]]; then
            REQUEST_ID="$(basename "$(dirname "$PAYLOAD")")"
          fi
          case "$REQUEST_ID" in
            *[!A-Za-z0-9._-]*|'') REQUEST_ID="unsafe_or_unknown" ;;
          esac
          WORK_DIR="${WORK_DIR:-chatgpt_staging/work/$REQUEST_ID}"
          REPORT_DIR="chatgpt_staging/status_reports/chatgpt-apply-in/$REQUEST_ID"
          REPORT_PATH="$REPORT_DIR/workflow_report.md"
          ART_DIR="$RUNNER_TEMP/chatgpt_apply_in_failure/$REQUEST_ID"
          ARTIFACT_NAME="chatgpt-apply-in-failure-${GITHUB_RUN_ID}"
          rm -rf "$REPORT_DIR" "$ART_DIR"
          mkdir -p "$REPORT_DIR" "$ART_DIR"

          {
            echo "# ChatGPT workflow report"
            echo
            echo "## Result"
            echo
            echo "- workflow: chatgpt-apply-in"
            echo "- result: failure"
            echo "- phase: apply-in"
            echo "- request_id: $REQUEST_ID"
            echo "- payload_path: $PAYLOAD"
            echo "- github_run_id: $GITHUB_RUN_ID"
            echo "- github_ref: $GITHUB_REF"
            echo "- github_sha: $GITHUB_SHA"
            echo "- artifact_name: $ARTIFACT_NAME"
            echo "- artifact_retention_days: 7"
            echo "- report_created_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Troubleshooting context"
            echo
            echo "The apply-in workflow failed. Common causes are decode errors, missing apply_manifest.json, unsafe paths, missing sources, stale-write hash failures, create_only violations, hash mismatches, or git commit/push failure."
            echo
            echo "Hash policy: existing tracked files require expected_blob_sha or expected_current_sha256 unless manifest allow_missing_current_hash=true is explicitly set; new files require create_only=true and expected_new_sha256."
            echo
            if [[ -f "$WORK_DIR/extract/apply_manifest.json" ]]; then
              echo "### Manifest excerpt"
              echo
              echo '```json'
              python -c "import pathlib; p=pathlib.Path('$WORK_DIR/extract/apply_manifest.json'); print(p.read_text(encoding='utf-8', errors='replace')[:4000])" || true
              echo '```'
            fi
            if [[ -f chatgpt_staging/work/applied_paths.txt ]]; then
              echo
              echo "### Applied paths before failure"
              sed 's/^/- /' chatgpt_staging/work/applied_paths.txt
            fi
            echo
            echo "## Artifact pointer"
            echo
            echo "Detailed diagnostics, hashes, and any copied manifest are uploaded as GitHub Actions artifact '$ARTIFACT_NAME' for run $GITHUB_RUN_ID when available."
            echo
            echo "## Cleanup guidance"
            echo
            echo "After ChatGPT reads this report and retrieves any needed artifact/log details, create a cleanup marker for request id '$REQUEST_ID' with cleanup_status_reports=true and cleanup_in_payloads=true."
            echo
            echo "## Next ChatGPT action"
            echo
            echo "Read this report, inspect the artifact or run log if needed, decide whether to regenerate the payload with current hashes or repair the workflow, then update Airtable."
          } > "$REPORT_PATH"

          cp "$REPORT_PATH" "$ART_DIR/workflow_report.md"
          if [[ -f "$PAYLOAD" ]]; then sha256sum "$PAYLOAD" > "$ART_DIR/payload_b64.sha256"; fi
          if [[ -f "$WORK_DIR/payload.zip" ]]; then sha256sum "$WORK_DIR/payload.zip" > "$ART_DIR/payload_zip.sha256"; fi
          if [[ -f "$WORK_DIR/extract/apply_manifest.json" ]]; then cp "$WORK_DIR/extract/apply_manifest.json" "$ART_DIR/apply_manifest.json"; fi
          if [[ -f "chatgpt_staging/work/applied_paths.txt" ]]; then cp "chatgpt_staging/work/applied_paths.txt" "$ART_DIR/applied_paths_before_failure.txt"; fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --staged . || true
          git add "$REPORT_DIR"
          git commit -m "Record ChatGPT apply-in workflow report [skip validate-on-push]" || true
          git push || true
          echo "FAIL_ARTIFACT_DIR=$ART_DIR" >> "$GITHUB_ENV"

      - name: Upload apply-in failure evidence artifact
        if: failure() && steps.payload.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-apply-in-failure-${{ github.run_id }}
          path: ${{ env.FAIL_ARTIFACT_DIR }}/**
          retention-days: 7
