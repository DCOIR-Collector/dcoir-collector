# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-manual-full-validation-0013 (Airtable formula preview; final key may use table autonumber suffix)
# Purpose:
# - Run selected deep validation suite for collector/Gemini governed surfaces.
# Use when:
# - Use for manual regression beyond validate-on-push, especially before readiness claims or after structural changes.
# Do not use when:
# - Do not use as a quick push gate when validate-on-push is sufficient.
# Trigger model:
# - workflow_dispatch inputs: suite
# Required inputs:
# - suite: Validation suite to run default=FullRegression
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses collector documentation validator, required surface checks, collector package build/restore, selected harness suite, and Gemini bundle smoke build.
# Expected outputs/readback:
# - Validation artifacts and repo-workflows report.
# Safety notes:
# - The selected suite bounds the readiness claim. Full readiness requires selecting and passing FullRegression or explicit equivalent coverage.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep the Airtable GitHub Workflow Inventory row aligned when general routing guidance changes.
# Airtable routing:
# - General task-routing guidance belongs in Airtable table `GitHub Workflow Inventory`.
# - This header owns workflow-specific execution guidance; the workflow body remains the executable behavior.
name: manual-full-validation

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Validation suite to run
        required: true
        default: FullRegression
        type: choice
        options:
          - Core
          - Retrieval
          - QuickAliases
          - SessionBehavior
          - TargetedCollection
          - ChunkingOversizeArtifact
          - ChunkingReconstructionMetadata
          - MajorVersion
          - FailureGates
          - FullRegression

permissions:
  contents: read

concurrency:
  group: manual-full-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full_validation:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Verify required governed surfaces
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'project_sources/governance/control_plane/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/governance/control_plane/CP-02_DCOIR_Change_Log.txt',
            'project_sources/collector/source/DCOIR_Collector.ps1',
            'project_sources/collector/harness/run_DCOIR_Tests.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.01_Core_State_And_Utilities.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.02_Baseline_Collection_And_Reports.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.03A_Enrich_Session_State.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.03B_Enrich_Actions_Review.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.03C_Enrich_Actions_Retrieval.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.04_Quick_Interface_And_Output.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.04B_Feature_Wave_Targeted_Collection.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.04C_Explicit_Event_Window_Overrides.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.04D_Bounded_Parallel_Runtime.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.04E_Diagnostic_Context_Overrides.ps1',
            'project_sources/collector/source/parts/DCOIR_Collector.05_Main_Entry.ps1',
            'project_sources/collector/manifests/Collector_Runtime_Package_Manifest.json',
            'project_sources/gemini/docs/DOC-11_DCOIR_Gemini_Creation_Pipeline_v1_0_0.txt',
            'project_sources/collector/docs/DOC-12_DCOIR_Collector_Runtime_Packaging_Pipeline_v1_0_0.txt',
            'project_sources/gemini/bundle_source/Gemini_Bundle_Source_Manifest.json',
            'project_sources/gemini/tools/build_dcoir_gemini_release.py',
            'project_sources/gemini/tools/validate_dcoir_gemini_bundle.py',
            'project_sources/gemini/tools/validate_dcoir_gemini_behavior_scenarios.py',
            'project_sources/collector/tools/compile_dcoir_collector_runtime.py',
            'project_sources/collector/tools/validate_dcoir_collector_runtime_package.py',
            'project_sources/collector/tools/build_dcoir_collector_runtime_package.py',
            'project_sources/collector/tools/restore_dcoir_collector_runtime_zip.py',
            'project_sources/collector/tools/run_validate_dcoir_run_fixture_tests.ps1',
            'project_sources/collector/tools/verify_collector_documentation_quality.py',
            'project_sources/collector/tools/test_verify_collector_documentation_quality.py',
            '.github/workflows/manual-gemini-bundle-build.yml',
            '.github/workflows/manual-collector-runtime-package-build.yml',
            'dcoir_skills/project_discovery_contract.json',
            'supporting_assets/DCOIR_Collector.zip'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required governed surfaces: $($missing -join ', ')"
          }

          $geminiBundleRoot = 'project_sources/gemini/bundle_source'
          $geminiManifestPath = Join-Path $geminiBundleRoot 'Gemini_Bundle_Source_Manifest.json'
          if (-not (Test-Path -LiteralPath $geminiManifestPath -PathType Leaf)) {
            throw "Gemini manifest missing: $geminiManifestPath"
          }
          $geminiManifest = Get-Content -LiteralPath $geminiManifestPath -Raw -Encoding UTF8 | ConvertFrom-Json
          if (-not $geminiManifest.topology -or $geminiManifest.topology.topology_source_of_truth -ne 'manifest') {
            throw 'Gemini topology source of truth must be manifest.'
          }
          $manifestRequired = @($geminiManifest.required_files | ForEach-Object { Join-Path $geminiBundleRoot ([string]$_) })
          if ($manifestRequired.Count -eq 0) {
            throw 'Gemini manifest required_files is empty.'
          }
          $manifestSourceRequired = @($geminiManifest.source_required_files | ForEach-Object { Join-Path $geminiBundleRoot ([string]$_) })
          $manifestMissing = @(($manifestRequired + $manifestSourceRequired) | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($manifestMissing.Count -gt 0) {
            throw "Missing Gemini manifest-required/source-required surfaces: $($manifestMissing -join ', ')"
          }
          $manifestSubAgents = @($geminiManifest.topology.sub_agent_files | ForEach-Object { ([string]$_).Replace('\','/') })
          if ($manifestSubAgents.Count -eq 0) {
            throw 'Gemini manifest topology.sub_agent_files is empty.'
          }
          $missingSubAgents = @($manifestSubAgents | Where-Object { -not (Test-Path -LiteralPath (Join-Path $geminiBundleRoot $_)) })
          if ($missingSubAgents.Count -gt 0) {
            throw "Missing Gemini manifest-listed sub-agent files: $($missingSubAgents -join ', ')"
          }
          $agentBuildRoot = Join-Path $geminiBundleRoot '01_GEMINI_AGENT_BUILD'
          $bundleRootResolved = (Resolve-Path -LiteralPath $geminiBundleRoot).Path
          $discoveredSubAgents = @(Get-ChildItem -LiteralPath $agentBuildRoot -File -Filter 'Sub_Agent_*.md.txt' | ForEach-Object {
            ($_.FullName.Substring($bundleRootResolved.Length + 1)).Replace('\','/')
          })
          $unlistedSubAgents = @($discoveredSubAgents | Where-Object { $_ -notin $manifestSubAgents })
          if ($unlistedSubAgents.Count -gt 0) {
            throw "Discovered Gemini sub-agent files not listed in manifest topology: $($unlistedSubAgents -join ', ')"
          }
          Write-Host "Gemini manifest surfaces validated: required=$($manifestRequired.Count); source-required=$($manifestSourceRequired.Count); sub-agents=$($manifestSubAgents.Count)."

      - name: Run validate_DCOIR_Run fixture tests
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\tools\run_validate_dcoir_run_fixture_tests.ps1 -ValidatorPath .\collector\harness\validate_DCOIR_Run.ps1 -OutputRoot .\validation\out_manual_full_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_manual_full_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_manual_full_documentation_quality | Out-Null
          python project_sources/collector/tools/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/validation/out_manual_full_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector documentation quality gate failed before collector build.'
          }

      - name: Build fresh collector runtime zip for harness
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_manual_full_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_manual_full_collector | Out-Null
          python project_sources/collector/tools/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/validation/out_manual_full_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery package smoke test failed.'
          }
          $deliveryZip = Get-ChildItem -Path project_sources/validation/out_manual_full_collector -File -Filter 'DCOIR_Collector_Delivery_Package_*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $deliveryZip) {
            throw 'Collector delivery package zip was not produced.'
          }
          python project_sources/collector/tools/restore_dcoir_collector_runtime_zip.py --delivery-package-zip $deliveryZip.FullName --base-runtime-zip supporting_assets/DCOIR_Collector.zip --output-dir project_sources/validation/out_manual_full_collector --output-name DCOIR_Collector_runtime_for_harness.zip
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime zip restore bridge failed.'
          }
          $extractDir = 'project_sources/validation/out_manual_full_collector/runtime_harness'
          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -LiteralPath project_sources/validation/out_manual_full_collector/DCOIR_Collector_runtime_for_harness.zip -DestinationPath $extractDir -Force
          "HARNESS_RUNTIME_ZIP=$((Resolve-Path project_sources/validation/out_manual_full_collector/DCOIR_Collector_runtime_for_harness.zip).Path)" | Add-Content -Path $env:GITHUB_ENV
          "HARNESS_COLLECTOR_PATH=$((Resolve-Path project_sources/validation/out_manual_full_collector/runtime_harness/DCOIR_Collector.ps1).Path)" | Add-Content -Path $env:GITHUB_ENV


      - name: Run selected harness suite
        shell: pwsh
        working-directory: project_sources
        run: |
          $suite = '${{ github.event.inputs.suite }}'
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\harness\run_DCOIR_Tests.ps1 -CollectorPath $env:HARNESS_COLLECTOR_PATH -Suite $suite -MasterZipPath $env:HARNESS_RUNTIME_ZIP

      - name: Smoke-test Gemini bundle build algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_manual_full_gemini -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_manual_full_gemini | Out-Null
          python project_sources/gemini/tools/build_dcoir_gemini_release.py --source-root project_sources/gemini/bundle_source --output-dir project_sources/validation/out_manual_full_gemini
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle smoke test failed.'
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-full-validation-${{ github.event.inputs.suite }}
          path: |
            project_sources/TestResults/**
            project_sources/validation/out_manual_full_gemini/**
            project_sources/validation/out_manual_full_collector/**
            project_sources/validation/out_manual_full_validate_dcoir_run_fixtures/**
            project_sources/validation/out_preflight_documentation_quality/**
            project_sources/validation/out_manual_full_documentation_quality/**
          if-no-files-found: warn
          retention-days: 21
