# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-validation-manual-full-validation-0013
# Purpose:
# - Run selected deep validation suite for collector/Gemini governed surfaces.
# Use when:
# - Use for manual regression beyond validate-on-push, especially before readiness claims or after structural changes.
# Do not use when:
# - Do not use as a quick push gate when validate-on-push is sufficient.
# Trigger model:
# - schedule: 30 6 * * 0; workflow_dispatch inputs: suite
# Required inputs:
# - suite: Validation suite to run default=FullRegression
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses collector documentation validator, required surface checks, PowerShell 7 and Windows PowerShell 5.1 syntax parsing, collector package build/restore, selected harness suite, and Gemini bundle smoke build.
# Expected outputs/readback:
# - Validation artifacts, ChatGPT workflow report section artifact, and repo-workflows report.
# Safety notes:
# - The selected suite bounds the readiness claim. Full readiness requires selecting and passing FullRegression or explicit equivalent coverage.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: manual-full-validation

on:
  schedule:
    - cron: '30 6 * * 0'
  workflow_dispatch:
    inputs:
      suite:
        description: Validation suite to run
        required: true
        default: FullRegression
        type: choice
        options:
          - Core
          - Retrieval
          - QuickAliases
          - SessionBehavior
          - TargetedCollection
          - ChunkingOversizeArtifact
          - ChunkingReconstructionMetadata
          - Tier2BoundedCollect
          - MajorVersion
          - FailureGates
          - FullRegression

permissions:
  contents: read

env:
  MANUAL_FULL_VALIDATION_SUITE: ${{ github.event.inputs.suite || 'FullRegression' }}

concurrency:
  group: manual-full-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full_validation:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Run documentation validator self-tests
        shell: pwsh
        run: |
          python project_sources/collector/tools/test_verify_collector_documentation_quality.py
          if ($LASTEXITCODE -ne 0) {
            throw 'Documentation validator self-tests failed.'
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Validate Windows PowerShell 5.1 syntax
        shell: pwsh
        run: |
          $compatScript = Join-Path $env:RUNNER_TEMP 'validate-windows-powershell-5.1-syntax.ps1'
          @'
          $ErrorActionPreference = 'Stop'
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'Windows PowerShell 5.1 syntax validation failed.'
          }
          '@ | Set-Content -Path $compatScript -Encoding Unicode
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File $compatScript
          if ($LASTEXITCODE -ne 0) {
            throw 'Windows PowerShell 5.1 syntax validation failed.'
          }

      - name: Verify required governed surfaces
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/check_required_surfaces.py --profile manual_full_validation
          if ($LASTEXITCODE -ne 0) {
            throw 'Required surface validation failed.'
          }
          python project_sources/github_actions/tools/check_gemini_manifest_surfaces.py --source-root project_sources/gemini/bundle_source
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini manifest surface validation failed.'
          }


      - name: Run validate_DCOIR_Run fixture tests
        shell: pwsh
        working-directory: project_sources
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\tools\run_validate_dcoir_run_fixture_tests.ps1 -ValidatorPath .\collector\harness\validate_DCOIR_Run.ps1 -OutputRoot .\validation\out_manual_full_validate_dcoir_run_fixtures

      - name: Run collector documentation quality gate
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_manual_full_documentation_quality -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_manual_full_documentation_quality | Out-Null
          python project_sources/collector/tools/verify_collector_documentation_quality.py --repo-root . --output-json project_sources/validation/out_manual_full_documentation_quality/collector_documentation_quality.json --fail-on-missing-file-help --fail-on-undocumented-functions
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector documentation quality gate failed before collector build.'
          }

      - name: Build fresh collector runtime zip for harness
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_manual_full_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_manual_full_collector | Out-Null
          python project_sources/collector/tools/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/validation/out_manual_full_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery package smoke test failed.'
          }
          $deliveryZip = Get-ChildItem -Path project_sources/validation/out_manual_full_collector -File -Filter 'DCOIR_Collector_Delivery_Package_*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $deliveryZip) {
            throw 'Collector delivery package zip was not produced.'
          }
          python project_sources/collector/tools/restore_dcoir_collector_runtime_zip.py --delivery-package-zip $deliveryZip.FullName --base-runtime-zip supporting_assets/DCOIR_Collector.zip --output-dir project_sources/validation/out_manual_full_collector --output-name DCOIR_Collector_runtime_for_harness.zip
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime zip restore bridge failed.'
          }
          $extractDir = 'project_sources/validation/out_manual_full_collector/runtime_harness'
          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -LiteralPath project_sources/validation/out_manual_full_collector/DCOIR_Collector_runtime_for_harness.zip -DestinationPath $extractDir -Force
          "HARNESS_RUNTIME_ZIP=$((Resolve-Path project_sources/validation/out_manual_full_collector/DCOIR_Collector_runtime_for_harness.zip).Path)" | Add-Content -Path $env:GITHUB_ENV
          "HARNESS_COLLECTOR_PATH=$((Resolve-Path project_sources/validation/out_manual_full_collector/runtime_harness/DCOIR_Collector.ps1).Path)" | Add-Content -Path $env:GITHUB_ENV


      - name: Run selected harness suite
        shell: pwsh
        timeout-minutes: 120
        working-directory: project_sources
        run: |
          $suite = '${{ env.MANUAL_FULL_VALIDATION_SUITE }}'
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\collector\harness\run_DCOIR_Tests.ps1 -CollectorPath $env:HARNESS_COLLECTOR_PATH -Suite $suite -MasterZipPath $env:HARNESS_RUNTIME_ZIP -CollectorStepTimeoutSeconds 600

      - name: Smoke-test Gemini bundle build algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/validation/out_manual_full_gemini -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/validation/out_manual_full_gemini | Out-Null
          python project_sources/gemini/tools/build_dcoir_gemini_release.py --source-root project_sources/gemini/bundle_source --output-dir project_sources/validation/out_manual_full_gemini
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle smoke test failed.'
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-full-validation-${{ env.MANUAL_FULL_VALIDATION_SUITE }}
          path: |
            project_sources/TestResults/**
            project_sources/validation/out_manual_full_gemini/**
            project_sources/validation/out_manual_full_collector/**
            project_sources/validation/out_manual_full_validate_dcoir_run_fixtures/**
            project_sources/validation/out_preflight_documentation_quality/**
            project_sources/validation/out_manual_full_documentation_quality/**
          if-no-files-found: warn
          retention-days: 21

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Manual full validation summary

          - workflow: manual-full-validation
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - selected_suite: $env:MANUAL_FULL_VALIDATION_SUITE
          - primary_artifact: manual-full-validation-$env:MANUAL_FULL_VALIDATION_SUITE
          - artifact_note: includes TestResults, Gemini smoke-build output, collector runtime output, validate_DCOIR_Run fixture output, and documentation-quality output when produced.

          The workflow conclusion is the authoritative pass/fail signal. The selected suite bounds any readiness claim; use FullRegression or equivalent evidence for broad readiness.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14