name: manual-full-validation

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Validation suite to run
        required: true
        default: MajorVersion
        type: choice
        options:
          - Core
          - Retrieval
          - QuickAliases
          - SessionBehavior
          - TargetedCollection
          - MajorVersion
          - FullRegression

jobs:
  full_validation:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Verify required governed surfaces
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'project_sources/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/CP-02_DCOIR_Change_Log.txt',
            'project_sources/LOG-60_DCOIR_Major_Version_Collector_And_Gemini_Feature_Wave_Implementation_2026-04-08.txt',
            'project_sources/live_test_notes/2026-04-08_DCOIR_Major_Version_Functionality_Test_Plan.md.txt',
            'project_sources/DCOIR_Collector.ps1',
            'project_sources/run_DCOIR_Tests.ps1',
            'project_sources/collector_parts/DCOIR_Collector.04B_Feature_Wave_Targeted_Collection.ps1',
            'project_sources/Collector_Runtime_Package_Manifest.json.txt',
            'project_sources/DOC-11_DCOIR_Gemini_Creation_Pipeline_v1_0_0.txt',
            'project_sources/DOC-12_DCOIR_Collector_Runtime_Packaging_Pipeline_v1_0_0.txt',
            'project_sources/generation_validation/sync_dcoir_gemini_knowledge_attachments.py',
            'project_sources/generation_validation/build_dcoir_gemini_release.py',
            'project_sources/generation_validation/validate_dcoir_gemini_bundle.py',
            'project_sources/generation_validation/compile_dcoir_collector_runtime.py',
            'project_sources/generation_validation/validate_dcoir_collector_runtime_package.py',
            'project_sources/generation_validation/build_dcoir_collector_runtime_package.py',
            'project_sources/generation_validation/restore_dcoir_collector_runtime_zip.py',
            '.github/workflows/manual-gemini-bundle-build.yml',
            '.github/workflows/manual-collector-runtime-package-build.yml',
            'dcoir_skills/project_discovery_contract.json',
            'supporting_assets/DCOIR_Collector.zip'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required governed surfaces: $($missing -join ', ')"
          }

      - name: Build fresh collector runtime zip for harness
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_manual_full_collector -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_manual_full_collector | Out-Null
          python project_sources/generation_validation/build_dcoir_collector_runtime_package.py --source-dir . --output-dir project_sources/generation_validation/out_manual_full_collector
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery package smoke test failed.'
          }
          $deliveryZip = Get-ChildItem -Path project_sources/generation_validation/out_manual_full_collector -File -Filter 'DCOIR_Collector_Delivery_Package_*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $deliveryZip) {
            throw 'Collector delivery package zip was not produced.'
          }
          python project_sources/generation_validation/restore_dcoir_collector_runtime_zip.py --delivery-package-zip $deliveryZip.FullName --base-runtime-zip supporting_assets/DCOIR_Collector.zip --output-dir project_sources/generation_validation/out_manual_full_collector --output-name DCOIR_Collector_runtime_for_harness.zip
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime zip restore bridge failed.'
          }
          $extractDir = 'project_sources/generation_validation/out_manual_full_collector/runtime_harness'
          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -LiteralPath project_sources/generation_validation/out_manual_full_collector/DCOIR_Collector_runtime_for_harness.zip -DestinationPath $extractDir -Force
          "HARNESS_RUNTIME_ZIP=$((Resolve-Path project_sources/generation_validation/out_manual_full_collector/DCOIR_Collector_runtime_for_harness.zip).Path)" | Add-Content -Path $env:GITHUB_ENV
          "HARNESS_COLLECTOR_PATH=$((Resolve-Path project_sources/generation_validation/out_manual_full_collector/runtime_harness/DCOIR_Collector.ps1).Path)" | Add-Content -Path $env:GITHUB_ENV

      - name: Run selected harness suite
        shell: pwsh
        working-directory: project_sources
        run: |
          $suite = '${{ github.event.inputs.suite }}'
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\run_DCOIR_Tests.ps1 -CollectorPath $env:HARNESS_COLLECTOR_PATH -Suite $suite -MasterZipPath $env:HARNESS_RUNTIME_ZIP

      - name: Smoke-test Gemini bundle build algorithm
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force project_sources/generation_validation/out_manual_full_gemini -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path project_sources/generation_validation/out_manual_full_gemini | Out-Null
          python project_sources/generation_validation/build_dcoir_gemini_release.py --source-root project_sources/DCOIR_Gemini_Bundle_Source --output-dir project_sources/generation_validation/out_manual_full_gemini
          if ($LASTEXITCODE -ne 0) {
            throw 'Gemini bundle smoke test failed.'
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-full-validation-${{ github.event.inputs.suite }}
          path: |
            project_sources/TestResults/**
            project_sources/generation_validation/out_manual_full_gemini/**
            project_sources/generation_validation/out_manual_full_collector/**
          if-no-files-found: warn
          retention-days: 21
