name: manual-full-validation

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Validation suite to run
        required: true
        default: FullRegression
        type: choice
        options:
          - Core
          - Retrieval
          - QuickAliases
          - FullRegression

jobs:
  full_validation:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        shell: pwsh
        run: |
          $pyFiles = git ls-files "*.py"
          if (-not $pyFiles) {
            Write-Host "No tracked Python files found."
            exit 0
          }
          $failed = @()
          foreach ($file in $pyFiles) {
            python -m py_compile $file
            if ($LASTEXITCODE -ne 0) {
              $failed += $file
            }
          }
          if ($failed.Count -gt 0) {
            throw "Python syntax validation failed: $($failed -join ', ')"
          }

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $psFiles = git ls-files "*.ps1" "*.psm1" "*.psd1"
          if (-not $psFiles) {
            Write-Host "No tracked PowerShell files found."
            exit 0
          }
          $parseFailures = @()
          foreach ($file in $psFiles) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $messages = ($parseErrors | ForEach-Object { $_.Message }) -join ' | '
              $parseFailures += "${file}: $messages"
            }
          }
          if ($parseFailures.Count -gt 0) {
            $parseFailures | ForEach-Object { Write-Error $_ }
            throw 'PowerShell syntax validation failed.'
          }

      - name: Verify required governed surfaces
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'project_sources/CP-01_DCOIR_Version_Manifest.txt',
            'project_sources/CP-02_DCOIR_Change_Log.txt',
            'project_sources/DCOIR_Collector.ps1',
            'project_sources/run_DCOIR_Tests.ps1',
            'dcoir_skills/project_discovery_contract.json',
            'supporting_assets/DCOIR_Collector.zip'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Missing required governed surfaces: $($missing -join ', ')"
          }

      - name: Run selected harness suite
        shell: pwsh
        working-directory: project_sources
        run: |
          $suite = '${{ github.event.inputs.suite }}'
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\run_DCOIR_Tests.ps1 -Suite $suite -MasterZipPath ..\supporting_assets\DCOIR_Collector.zip

      - name: Render browser-readable summary
        if: always()
        shell: pwsh
        run: |
          try {
            if (-not $env:GITHUB_STEP_SUMMARY) {
              Write-Warning 'GITHUB_STEP_SUMMARY is not set. Skipping summary render.'
              exit 0
            }

            $suite = '${{ github.event.inputs.suite }}'
            $summaryRoot = 'project_sources/TestResults'
            $summaryTxt = $null
            $summaryJson = $null
            if (Test-Path -LiteralPath $summaryRoot) {
              $summaryTxt = Get-ChildItem -Path $summaryRoot -Recurse -File -Filter summary.txt -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
              $summaryJson = Get-ChildItem -Path $summaryRoot -Recurse -File -Filter summary.json -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
            }

            $lines = New-Object System.Collections.Generic.List[string]
            $lines.Add('## manual-full-validation')
            $lines.Add('')
            $lines.Add("- Selected suite: $suite")
            $lines.Add('- Harness zip path override: `..\\supporting_assets\\DCOIR_Collector.zip`')
            $lines.Add('')

            if ($summaryTxt) {
              $lines.Add('### Latest harness summary')
              $lines.Add('```text')
              foreach ($line in (Get-Content -LiteralPath $summaryTxt.FullName -ErrorAction SilentlyContinue)) {
                $lines.Add([string]$line)
              }
              $lines.Add('```')
            }
            else {
              $lines.Add('_No harness summary.txt was found._')
            }

            if ($summaryJson) {
              $lines.Add('')
              $lines.Add('- Summary JSON artifact was generated.')
            }

            $tempSummary = Join-Path $env:RUNNER_TEMP 'manual-full-validation-summary.md'
            $lines | Set-Content -LiteralPath $tempSummary -Encoding utf8
            Get-Content -LiteralPath $tempSummary | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          }
          catch {
            Write-Warning ("Non-fatal summary render issue: {0}" -f $_.Exception.Message)
            exit 0
          }
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-full-validation-${{ github.event.inputs.suite }}
          path: |
            project_sources/TestResults/**
          if-no-files-found: warn
          retention-days: 21
