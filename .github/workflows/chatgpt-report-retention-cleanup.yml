# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-staging_lane-chatgpt-report-retention-cleanup-0004
# Purpose:
# - Clean old ChatGPT workflow status reports, stale staged request JSON files, and aged staged output bundles according to retention windows.
# Use when:
# - Use for scheduled or manual cleanup of status reports, staged requests, and staged output bundles after ChatGPT has consumed needed readback evidence.
# Do not use when:
# - Do not use to delete source files, active evidence that must be retained, or reports/bundles that have not been reviewed.
# Trigger model:
# - schedule: 0 22 * * *, 0 23 * * *; workflow_dispatch inputs: dry_run, success_days, failure_days, cleanup_days, request_days, bundle_days, workflow_filter
# Required inputs:
# - dry_run: Preview cleanup without deleting paths default=false; success_days: Delete success reports at or above this age in days default=1; failure_days: Delete failure reports at or above this age in days default=7; cleanup_days: Delete cleanup reports at or above this age in days default=2; request_days: Delete stale staged request JSON files at or above this age in days default=1; bundle_days: Delete stale staged output bundles at or above this age in days default=2; workflow_filter: Optional path/name filter; leave blank for all cleanup-managed paths default=
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses repository status report folders under chatgpt_staging/status_reports/, staged request folders under chatgpt_staging/requests/, and staged output bundles under chatgpt_staging/out/.
# Expected outputs/readback:
# - Cleanup commits, cleanup status reports under chatgpt_staging/status_reports/retention-cleanup/<run-id>/, direct final retention-report URL in the run summary, and a step-summary skip note for the inactive DST-pair cron run.
# Safety notes:
# - Cleanup must stay under chatgpt_staging/status_reports, chatgpt_staging/requests, and chatgpt_staging/out, preserve latest workflow-run reports by policy, and use dry_run=true when previewing.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: chatgpt-report-retention-cleanup

on:
  schedule:
    # GitHub cron is UTC. Run at both DST-relevant UTC hours, then gate
    # execution to local midnight in Europe/Berlin so Stuttgart cleanup runs
    # at 00:00 local time across CET and CEST.
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview cleanup without deleting paths"
        required: true
        default: false
        type: boolean
      success_days:
        description: "Delete success reports at or above this age in days"
        required: true
        default: 1
        type: number
      failure_days:
        description: "Delete failure reports at or above this age in days"
        required: true
        default: 7
        type: number
      cleanup_days:
        description: "Delete cleanup reports at or above this age in days"
        required: true
        default: 2
        type: number
      request_days:
        description: "Delete staged request JSON files at or above this age in days"
        required: true
        default: 1
        type: number
      bundle_days:
        description: "Delete staged output bundles at or above this age in days"
        required: true
        default: 2
        type: number
      workflow_filter:
        description: "Optional path/name filter; leave blank for all cleanup-managed paths"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: chatgpt-report-retention-cleanup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup-reports:
    name: Cleanup ChatGPT staging retention surfaces
    runs-on: ubuntu-latest
    steps:
      - name: Check Stuttgart midnight gate
        id: midnight_gate
        shell: python
        run: |
          import datetime as dt
          import os
          from zoneinfo import ZoneInfo

          event_name = "${{ github.event_name }}"
          schedule_cron = "${{ github.event.schedule }}"
          now = dt.datetime.now(dt.timezone.utc).astimezone(ZoneInfo("Europe/Berlin"))
          active_cron = "0 22 * * *" if now.utcoffset() == dt.timedelta(hours=2) else "0 23 * * *"
          should_run = event_name != "schedule" or schedule_cron == active_cron
          skip_reason = ""
          if event_name == "schedule" and not should_run:
              skip_reason = f"inactive DST-pair cron {schedule_cron}; active cron is {active_cron}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_run={str(should_run).lower()}\n")
              fh.write(f"local_time={now.isoformat()}\n")
              fh.write(f"schedule_cron={schedule_cron}\n")
              fh.write(f"active_cron={active_cron}\n")
              fh.write(f"skip_reason={skip_reason}\n")

          print(f"Europe/Berlin local time: {now.isoformat()}")
          print(f"schedule_cron={schedule_cron}")
          print(f"active_cron={active_cron}")
          print(f"should_run={should_run}")
          if skip_reason:
              print(skip_reason)

      - name: Note inactive scheduled cleanup window
        if: ${{ steps.midnight_gate.outputs.should_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Retention cleanup skipped: ${{ steps.midnight_gate.outputs.skip_reason }}"
          echo "## ChatGPT retention cleanup skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.midnight_gate.outputs.skip_reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Europe/Berlin local time: ${{ steps.midnight_gate.outputs.local_time }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: ${{ steps.midnight_gate.outputs.should_run == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        if: ${{ steps.midnight_gate.outputs.should_run == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build retention cleanup plan
        if: ${{ steps.midnight_gate.outputs.should_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          DRY_RUN="false"
          SUCCESS_DAYS="1"
          FAILURE_DAYS="7"
          CLEANUP_DAYS="2"
          REQUEST_DAYS="1"
          BUNDLE_DAYS="2"
          WORKFLOW_FILTER=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DRY_RUN="${{ inputs.dry_run }}"
            SUCCESS_DAYS="${{ inputs.success_days }}"
            FAILURE_DAYS="${{ inputs.failure_days }}"
            CLEANUP_DAYS="${{ inputs.cleanup_days }}"
            REQUEST_DAYS="${{ inputs.request_days }}"
            BUNDLE_DAYS="${{ inputs.bundle_days }}"
            WORKFLOW_FILTER="${{ inputs.workflow_filter }}"
          fi
          mkdir -p .github/tmp
          ARGS=(cleanup --success-days "$SUCCESS_DAYS" --failure-days "$FAILURE_DAYS" --cleanup-days "$CLEANUP_DAYS" --request-days "$REQUEST_DAYS" --bundle-days "$BUNDLE_DAYS" --workflow-filter "$WORKFLOW_FILTER" --removed-paths-file .github/tmp/chatgpt_report_cleanup_removed.txt --report-id "retention-cleanup-${GITHUB_RUN_ID}")
          if [[ "$DRY_RUN" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          REPORT_PATH="$(python .github/scripts/write_workflow_report.py "${ARGS[@]}")"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"

      - name: Remove expired staged paths from cleanup plan
        if: ${{ steps.midnight_gate.outputs.should_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -s .github/tmp/chatgpt_report_cleanup_removed.txt ]]; then
            while IFS= read -r path; do
              [[ -n "$path" ]] || continue
              case "$path" in
                chatgpt_staging/status_reports/*/workflow_report.md|chatgpt_staging/status_reports/*/*/workflow_report.md|chatgpt_staging/status_reports/*/*/*/workflow_report.md)
                  git rm -f "$path" || true
                  ;;
                chatgpt_staging/requests/*.json|chatgpt_staging/requests/*/*.json|chatgpt_staging/requests/*/*/*.json)
                  git rm -f "$path" || true
                  ;;
                chatgpt_staging/out/*)
                  if [[ -d "$path" ]]; then
                    git rm -r -f "$path" || true
                  else
                    echo "Refusing to remove unexpected non-directory staged output path: $path" >&2
                    exit 1
                  fi
                  ;;
                *)
                  echo "Refusing to remove unexpected path: $path" >&2
                  exit 1
                  ;;
              esac
            done < .github/tmp/chatgpt_report_cleanup_removed.txt
          fi

      - name: Commit retention cleanup report and deletions
        if: ${{ steps.midnight_gate.outputs.should_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chatgpt_staging/status_reports/retention-cleanup || true
          git add -u chatgpt_staging/status_reports chatgpt_staging/requests chatgpt_staging/out || true
          git commit -m "Clean ChatGPT staging retention surfaces by policy [skip ci]" || exit 0
          git push

      - name: Output final retention cleanup report URL
        if: ${{ steps.midnight_gate.outputs.should_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          report_path="${REPORT_PATH:-}"
          if [[ -z "$report_path" || ! -f "$report_path" ]]; then
            echo "No retention cleanup report path available for final URL output."
            exit 0
          fi
          branch_name="${GITHUB_REF_NAME:-}"
          if [[ -z "$branch_name" ]]; then
            branch_name="$(git branch --show-current || true)"
          fi
          if [[ -z "$branch_name" ]]; then
            branch_name="main"
          fi
          report_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${branch_name}/${report_path}"
          echo "ChatGPT retention cleanup report: $report_url"
          echo "## ChatGPT retention cleanup report" >> "$GITHUB_STEP_SUMMARY"
          echo "$report_url" >> "$GITHUB_STEP_SUMMARY"
