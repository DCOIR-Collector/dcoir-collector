# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-staging_lane-chatgpt-report-retention-cleanup-0004
# Purpose:
# - Clean old ChatGPT workflow status reports, stale staged request JSON files, and aged staged output bundles according to retention windows.
# Use when:
# - Use for scheduled or manual cleanup of status reports, staged requests, and staged output bundles after ChatGPT has consumed needed readback evidence.
# Do not use when:
# - Do not use to delete source files, active evidence that must be retained, or reports/bundles that have not been reviewed.
# Trigger model:
# - schedule: 0 22 * * *; workflow_dispatch inputs: dry_run, success_days, failure_days, cleanup_days, request_days, bundle_days, workflow_filter
# Required inputs:
# - dry_run: Preview cleanup without deleting paths default=false; success_days: Delete success reports at or above this age in days default=1; failure_days: Delete failure reports at or above this age in days default=7; cleanup_days: Delete cleanup reports at or above this age in days default=2; request_days: Delete stale staged request JSON files at or above this age in days default=1; bundle_days: Delete stale staged output bundles at or above this age in days default=2; workflow_filter: Optional path/name filter; leave blank for all cleanup-managed paths default=
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses repository status report folders under chatgpt_staging/status_reports/, staged request folders under chatgpt_staging/requests/, and staged output bundles under chatgpt_staging/out/.
# Expected outputs/readback:
# - Cleanup commits, cleanup status reports under chatgpt_staging/status_reports/retention-cleanup/<run-id>/, and direct final retention-report URL in the run summary.
# Safety notes:
# - Cleanup must stay under chatgpt_staging/status_reports, chatgpt_staging/requests, and chatgpt_staging/out, preserve latest workflow-run reports by policy, and use dry_run=true when previewing.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep this header aligned with current repo-root GitHub guidance and the active `ircore` operating model when authority or routing language changes.
# Authority routing:
# - GitHub is canonical for workflow/source truth and this header owns workflow-specific execution guidance.
# - Supabase `ircore` owns operational routing, validation rules, reusable lessons, and active state.
# - Use legacy Airtable only when a file explicitly requires a migration or historical lookup.
name: chatgpt-report-retention-cleanup

on:
  schedule:
    # GitHub cron is UTC. This runs at 00:00 Europe/Berlin during CEST
    # and 23:00 Europe/Berlin during CET.
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview cleanup without deleting paths"
        required: true
        default: false
        type: boolean
      success_days:
        description: "Delete success reports at or above this age in days"
        required: true
        default: 1
        type: number
      failure_days:
        description: "Delete failure reports at or above this age in days"
        required: true
        default: 7
        type: number
      cleanup_days:
        description: "Delete cleanup reports at or above this age in days"
        required: true
        default: 2
        type: number
      request_days:
        description: "Delete staged request JSON files at or above this age in days"
        required: true
        default: 1
        type: number
      bundle_days:
        description: "Delete stale staged output bundles at or above this age in days"
        required: true
        default: 2
        type: number
      workflow_filter:
        description: "Optional path/name filter; leave blank for all cleanup-managed paths"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: chatgpt-report-retention-cleanup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup-reports:
    uses: ./.github/workflows/reusable-chatgpt-report-retention-cleanup.yml
    permissions:
      contents: write
    with:
      caller_event_name: ${{ github.event_name }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      success_days: ${{ inputs.success_days || 1 }}
      failure_days: ${{ inputs.failure_days || 7 }}
      cleanup_days: ${{ inputs.cleanup_days || 2 }}
      request_days: ${{ inputs.request_days || 1 }}
      bundle_days: ${{ inputs.bundle_days || 2 }}
      workflow_filter: ${{ inputs.workflow_filter || '' }}
