# DCOIR reusable workflow module.
# Entry workflow keeps manual trigger inputs, permissions, and concurrency visible.
name: 99 Module - Collector Runtime Package Build
run-name: Module Collector Runtime Package Build | ${{ github.workflow }} | #${{ github.run_number }}

on:
  workflow_call:
    inputs:
      package_version_override:
        required: false
        default: ""
        type: string

    outputs: {}
    secrets: {}

permissions:
  contents: read

jobs:
  build_collector_runtime_package:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      PACKAGE_VERSION_OVERRIDE: ${{ inputs.package_version_override }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up workflow runtime
        uses: ./.github/actions/setup-workflow-runtime
        with:
          setup-python: 'false'

      - name: Set up Python runtime
        uses: ./.github/actions/setup-python-runtime
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        uses: ./.github/actions/validate-python-syntax

      - name: Validate collector PowerShell syntax
        uses: ./.github/actions/validate-powershell-syntax
        with:
          paths: |
            project_sources/collector/source/DCOIR_Collector.ps1
          include-collector-parts: "true"
          require-files: "true"

      - name: Verify collector runtime package surfaces
        uses: ./.github/actions/verify-required-surfaces
        with:
          profile: manual_collector_runtime_package_build
          include-gemini-manifest: "false"

      - name: Create output directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path project_sources/validation/out | Out-Null

      - name: Run collector runtime package validation
        uses: ./.github/actions/run-collector-runtime-package-validation
        with:
          output-dir: project_sources/validation/out

      - name: Run collector documentation quality gate
        uses: ./.github/actions/run-collector-documentation-quality
        with:
          output-json: project_sources/validation/out_preflight_documentation_quality/collector_documentation_quality.json

      - name: Build collector runtime package
        shell: pwsh
        run: |
          $versionOverride = $env:PACKAGE_VERSION_OVERRIDE
          $cmd = @(
            'python',
            'project_sources/collector/tools/build_dcoir_collector_runtime_package.py',
            '--source-dir', '.',
            '--output-dir', 'project_sources/validation/out'
          )
          if (-not [string]::IsNullOrWhiteSpace($versionOverride)) {
            $cmd += @('--version', $versionOverride)
          }
          & $cmd[0] $cmd[1..($cmd.Count - 1)]
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector runtime package build failed.'
          }

      - name: Surface collector delivery zip
        shell: pwsh
        run: |
          python project_sources/github_actions/tools/surface_delivery_zip.py `
            --build-report project_sources/validation/out/build_dcoir_collector_runtime_package_report.json `
            --output-dir project_sources/validation/delivery_artifact/collector-runtime `
            --manifest-dir project_sources/validation/out/delivery_manifest `
            --extract-for-artifact `
            --artifact-label dcoir-collector-runtime-delivery-zip `
            --workflow-name manual-collector-runtime-package-build
          if ($LASTEXITCODE -ne 0) {
            throw 'Collector delivery zip surfacing failed.'
          }

      - name: Set collector delivery artifact name
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -Path project_sources/validation/out/delivery_manifest/delivery_manifest.json | ConvertFrom-Json
          $artifactName = [System.IO.Path]::GetFileNameWithoutExtension([string]$manifest.delivery_zip_name)
          if ([string]::IsNullOrWhiteSpace($artifactName)) {
            throw 'Collector delivery artifact name could not be derived from delivery manifest.'
          }
          "COLLECTOR_DELIVERY_ARTIFACT_NAME=$artifactName" | Add-Content -Path $env:GITHUB_ENV

      - name: Upload collector delivery zip
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: ${{ env.COLLECTOR_DELIVERY_ARTIFACT_NAME || 'dcoir-collector-runtime-delivery-zip' }}
          path: project_sources/validation/delivery_artifact/collector-runtime/**
          if-no-files-found: error
          retention-days: 21

      - name: Upload collector runtime package artifacts
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: manual-collector-runtime-package-build
          path: |
            project_sources/validation/out/*.zip
            project_sources/validation/out/*report.json
            project_sources/validation/out/delivery_manifest/**
            project_sources/validation/out/compiled_runtime/**
            project_sources/validation/out_preflight_documentation_quality/**
          if-no-files-found: warn
          retention-days: 21

      - name: Write ChatGPT workflow report section
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path chatgpt_workflow_report_section | Out-Null
          @"
          ## Collector runtime package summary

          - workflow: manual-collector-runtime-package-build
          - workflow_run_id: $env:GITHUB_RUN_ID
          - workflow_run_attempt: $env:GITHUB_RUN_ATTEMPT
          - head_sha: $env:GITHUB_SHA
          - ref: $env:GITHUB_REF
          - package_version_override: $env:PACKAGE_VERSION_OVERRIDE
          - primary_artifact: manual-collector-runtime-package-build
          - direct_delivery_artifact: $env:COLLECTOR_DELIVERY_ARTIFACT_NAME
          - direct_delivery_artifact_path: project_sources/validation/delivery_artifact/collector-runtime/**
          - direct_delivery_manifest: project_sources/validation/out/delivery_manifest/delivery_manifest.md
          - artifact_note: full evidence artifact includes delivery package zips, package reports, delivery manifest, compiled runtime output, and documentation-quality output when produced.

          Download the direct delivery artifact when the operator needs the production collector runtime package without a nested ZIP. Use manual-collector-runtime-package-build for the full evidence package and delivery manifest.
          The workflow conclusion is the authoritative pass/fail signal for packaging only. Harness regression validation belongs in manual-full-validation.
          Package validity still requires artifact readback before release or operator-distribution claims.
          "@ | Set-Content -Path chatgpt_workflow_report_section/chatgpt_workflow_report_section.md -Encoding utf8

      - name: Upload ChatGPT workflow report section
        if: always()
        uses: ./.github/actions/upload-chatgpt-artifact
        with:
          name: chatgpt-workflow-report-section
          path: chatgpt_workflow_report_section/chatgpt_workflow_report_section.md
          if-no-files-found: error
          retention-days: 14
