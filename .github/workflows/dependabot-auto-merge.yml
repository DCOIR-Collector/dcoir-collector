# DCOIR WORKFLOW OPERATOR NOTES
# Workflow key:
# - workflow-maintenance-dependabot-auto-merge-0009 (Airtable formula preview; final key may use table autonumber suffix)
# Purpose:
# - Enable auto-merge for qualifying Dependabot GitHub Actions update pull requests.
# Use when:
# - Use automatically on Dependabot PRs after repository auto-merge and required checks support the branch policy.
# Do not use when:
# - Do not use for non-Dependabot PRs, source-code/security-sensitive updates needing human review, or untrusted forks.
# Trigger model:
# - pull_request
# Required inputs:
# - none
# Required secrets/config:
# - Use secret/config names only as defined in this workflow body and Local Configuration Registry; never place secret values in workflow comments, requests, reports, logs, or bundles.
# Runtime dependencies:
# - Uses GitHub CLI/API with GITHUB_TOKEN permissions for pull request auto-merge.
# Expected outputs/readback:
# - Auto-merge enabled on qualifying PRs and repo-workflows report.
# Safety notes:
# - Only low-risk GitHub Actions dependency updates should auto-merge after required checks pass.
# Maintenance notes:
# - Keep this header aligned with executable behavior whenever triggers, inputs, scripts, reports, artifacts, permissions, or safety checks change.
# - Keep the Airtable GitHub Workflow Inventory row aligned when general routing guidance changes.
# Airtable routing:
# - General task-routing guidance belongs in Airtable table `GitHub Workflow Inventory`.
# - This header owns workflow-specific execution guidance; the workflow body remains the executable behavior.
name: Dependabot auto-merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable_auto_merge:
    name: Enable auto-merge for safe Dependabot PRs
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'malwaredevil/dcoir-collector' &&
      github.event.pull_request.draft == false
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for GitHub Actions updates
        if: steps.metadata.outputs.package-ecosystem == 'github_actions'
        shell: bash
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
