name: Knowledge docs correction
description: Report stale, conflicting, missing, or misleading maintained knowledge documentation.
title: "[Knowledge docs]: "
labels:
  - area:knowledge-docs
  - type:maintenance
body:
  - type: textarea
    id: knowledge_surface
    attributes:
      label: Knowledge surface
      description: Name the knowledge file, section, index entry, or maintained documentation surface.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is stale, missing, conflicting, or misleading?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Correct behavior or wording
      description: Describe the correction or source of truth that should govern the update.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add source references, issue links, validation output, or contradictory text.
    validations:
      required: false
