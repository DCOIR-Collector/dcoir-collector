# Governed OpenRouter PR Review configuration for DCOIR-Collector/dcoir-collector.
# This is the production review-assist config used by .github/workflows/openrouter-pr-review.yml.
# The legacy .github/openrouter-pr-review.yml remains the explicit smoke-test/free-router config.

commands:
  - /or-review
  - /openrouter-review
  - /dcoir-review

# Use OpenRouter Auto Router for governed review quality/cost balancing.
# The hardened runner rejects free-router models unless smoke_test_free_model is true.
model: openrouter/auto
model_stack:
  - openrouter/auto
smoke_test_free_model: false

# Auto Router plugin controls. Lower cost_quality_tradeoff values favor quality;
# higher values favor lower cost. PR #287 showed that the previous balanced
# setting could route to a flash-lite model and miss obvious probe defects.
auto_cost_quality_tradeoff: 2
auto_allowed_models:
  - anthropic/claude-sonnet*
  - openai/gpt-5*
  - google/gemini-2.5-pro*
  - google/gemini-3.1-pro*
  - qwen/qwen3-coder*
  - deepseek/deepseek-v3*

# Optional OpenRouter-native model fallback list. Leave empty until a current
# paid fallback stack is selected from the live catalog for this account.
fallback_models:

# Optional OpenRouter routing/service controls.
openrouter_route:
openrouter_service_tier:
openrouter_session_id_prefix: dcoir-openrouter-pr-review

max_prompt_chars: 60000
max_files: 30
max_inline_comments: 12

# Keep the gate conservative until the hardened default-branch retest passes.
request_changes_on_findings: false

# A finding needs at least this confidence to become an inline review comment.
minimum_confidence: 0.70

# If the model indicates a problem but no actionable inline finding survives
# normalization, fail loudly instead of posting a false clean review.
fail_on_unanchored_findings: true
fail_on_summary_only_problem: true

# If changed lines contain high-risk primitives, a zero-finding model response
# gets one anchored retry and then fails visibly instead of posting a false
# clean review.
risk_sentinel_quality_gate: true
risk_sentinel_retry_on_empty: true
risk_sentinel_max_anchors: 12

# Keep the GitHub thread quiet. Inline findings include the model name.
# A top-level summary is posted only when no inline findings are generated.
post_summary_when_findings: false
include_confidence: false
redact_secret_literals: true

# Retry temporary OpenRouter/provider failures and skip a provider that reports
# rate limiting during retry.
openrouter_max_attempts: 4
openrouter_retry_max_seconds: 45

# Keep this lower than the workflow timeout so the script can remove the eyes
# reaction and update the progress comment with a visible failure.
script_timeout_seconds: 1500
post_progress_comment: true

# Optional provider denylist. Leave empty by default; the script also adds
# temporarily failing providers to the retry ignore list automatically.
ignored_providers:

# These are pushed into the model context and shown inside individual findings when relevant.
validation_commands:
  - bash scripts/validate-codex-local.sh
  - python3 scripts/openrouter_pr_review_hardened_selftest.py
  - pwsh -NoProfile -File scripts/validate-windows-powershell-51.ps1 -AllowPowerShell7 -AllowEmpty
  - python3 scripts/validate-codeql-security-workflow.py

# Files used as repository-local guidance when present on the default branch.
guidance_files:
  - AGENTS.md
  - docs/review/codex-pr-review-playbook.md
  - README.md

# The workflow job skips bot comments, but this denylist is checked again in code.
# Only these GitHub users may trigger the reviewer in this public repository.
allowed_authors:
  - malwaredevil

ignored_authors:
  - github-actions[bot]
  - dependabot[bot]
  - chatgpt-codex-connector[bot]
