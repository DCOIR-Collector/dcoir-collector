name: Write progress heartbeat
description: Mechanical wrapper for writing a caller-owned progress heartbeat file.
inputs:
  output-path:
    description: Caller-owned heartbeat path.
    required: true
  status:
    description: Heartbeat status text.
    required: true
  detail:
    description: Heartbeat detail text.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Write progress heartbeat
      shell: bash
      env:
        OUTPUT_PATH: ${{ inputs.output-path }}
        STATUS: ${{ inputs.status }}
        DETAIL: ${{ inputs.detail }}
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import json
        import os
        import sys
        from pathlib import Path

        output_path = Path(os.environ["OUTPUT_PATH"])
        if output_path.is_absolute() or ".." in output_path.parts:
            print(f"Unsafe output-path for progress heartbeat: {output_path}", file=sys.stderr)
            sys.exit(1)

        output_path.parent.mkdir(parents=True, exist_ok=True)
        output_path.write_text(
            json.dumps(
                {
                    "status": os.environ["STATUS"],
                    "detail": os.environ["DETAIL"],
                    "source": "write-progress-heartbeat",
                },
                indent=2,
                sort_keys=True,
            ) + "\n",
            encoding="utf-8",
        )
        print(f"Wrote progress heartbeat: {output_path}")
        PY
# Compensating evidence: caller-visible output path, stdout marker, and the
# generated heartbeat file preserve evidence despite composite action grouping.
