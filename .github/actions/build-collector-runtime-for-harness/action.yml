name: Build collector runtime for harness
description: Build and restore a collector runtime zip, then expose harness environment variables.
inputs:
  output-dir:
    description: Output directory for collector package artifacts.
    required: true
  runtime-zip-env-name:
    description: Environment variable name to receive the restored runtime zip path.
    required: false
    default: HARNESS_RUNTIME_ZIP
  collector-path-env-name:
    description: Environment variable name to receive the extracted collector script path.
    required: false
    default: HARNESS_COLLECTOR_PATH
runs:
  using: composite
  steps:
    - name: Build collector runtime zip for harness
      shell: pwsh
      env:
        COLLECTOR_OUTPUT_DIR: ${{ inputs.output-dir }}
        RUNTIME_ZIP_ENV_NAME: ${{ inputs.runtime-zip-env-name }}
        COLLECTOR_PATH_ENV_NAME: ${{ inputs.collector-path-env-name }}
      run: |
        $ErrorActionPreference = 'Stop'
        Remove-Item -Recurse -Force $env:COLLECTOR_OUTPUT_DIR -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path $env:COLLECTOR_OUTPUT_DIR | Out-Null
        python project_sources/collector/tools/build_dcoir_collector_runtime_package.py --source-dir . --output-dir $env:COLLECTOR_OUTPUT_DIR
        if ($LASTEXITCODE -ne 0) {
          throw 'Collector delivery package smoke test failed.'
        }
        $deliveryZip = Get-ChildItem -Path $env:COLLECTOR_OUTPUT_DIR -File -Filter 'DCOIR_Collector_Delivery_Package_*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if (-not $deliveryZip) {
          throw 'Collector delivery package zip was not produced.'
        }
        python project_sources/collector/tools/restore_dcoir_collector_runtime_zip.py --delivery-package-zip $deliveryZip.FullName --base-runtime-zip supporting_assets/DCOIR_Collector.zip --output-dir $env:COLLECTOR_OUTPUT_DIR --output-name DCOIR_Collector_runtime_for_harness.zip
        if ($LASTEXITCODE -ne 0) {
          throw 'Collector runtime zip restore bridge failed.'
        }
        $extractDir = Join-Path $env:COLLECTOR_OUTPUT_DIR 'runtime_harness'
        Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
        Expand-Archive -LiteralPath (Join-Path $env:COLLECTOR_OUTPUT_DIR 'DCOIR_Collector_runtime_for_harness.zip') -DestinationPath $extractDir -Force
        "$env:RUNTIME_ZIP_ENV_NAME=$((Resolve-Path (Join-Path $env:COLLECTOR_OUTPUT_DIR 'DCOIR_Collector_runtime_for_harness.zip')).Path)" | Add-Content -Path $env:GITHUB_ENV
        "$env:COLLECTOR_PATH_ENV_NAME=$((Resolve-Path (Join-Path $extractDir 'DCOIR_Collector.ps1')).Path)" | Add-Content -Path $env:GITHUB_ENV

# Compensating evidence: caller-visible step name, stdout markers, explicit inputs,
# and generated output paths/artifacts preserve review evidence despite composite
# action grouping.
