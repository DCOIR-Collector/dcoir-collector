name: Validate Python syntax
description: Validate tracked Python syntax or a caller-supplied file list.
inputs:
  paths:
    description: Newline-separated Python files. When empty, all tracked Python files are checked.
    required: false
    default: ""
  require-files:
    description: Fail when no matching files are found.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Validate Python syntax
      shell: pwsh
      env:
        PYTHON_SYNTAX_PATHS: ${{ inputs.paths }}
        REQUIRE_FILES: ${{ inputs.require-files }}
      run: |
        $ErrorActionPreference = 'Stop'
        $rawPaths = $env:PYTHON_SYNTAX_PATHS
        if ([string]::IsNullOrWhiteSpace($rawPaths)) {
          $pyFiles = @(git ls-files "*.py")
        } else {
          $pyFiles = @($rawPaths -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ })
        }
        if (-not $pyFiles) {
          if ($env:REQUIRE_FILES -eq 'true') {
            throw 'No Python files found for syntax validation.'
          }
          Write-Host 'No Python files found.'
          exit 0
        }
        $failed = @()
        foreach ($file in $pyFiles) {
          if (-not (Test-Path -LiteralPath $file)) {
            $failed += "${file}: missing"
            continue
          }
          python -m py_compile $file
          if ($LASTEXITCODE -ne 0) {
            $failed += $file
          }
        }
        if ($failed.Count -gt 0) {
          throw "Python syntax validation failed: $($failed -join ', ')"
        }

# Compensating evidence: caller-visible step name, stdout markers, explicit inputs,
# and generated output paths/artifacts preserve review evidence despite composite
# action grouping.
