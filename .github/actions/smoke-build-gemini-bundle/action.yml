name: Smoke build Gemini bundle
description: Build the Gemini release bundle into a caller-owned validation output directory.
inputs:
  output-dir:
    description: Output directory for the Gemini build.
    required: true
runs:
  using: composite
  steps:
    - name: Smoke build Gemini bundle
      shell: pwsh
      env:
        GEMINI_OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        $ErrorActionPreference = 'Stop'
        Remove-Item -Recurse -Force $env:GEMINI_OUTPUT_DIR -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path $env:GEMINI_OUTPUT_DIR | Out-Null
        python project_sources/gemini/tools/build_dcoir_gemini_release.py --source-root project_sources/gemini/bundle_source --output-dir $env:GEMINI_OUTPUT_DIR
        if ($LASTEXITCODE -ne 0) {
          throw 'Gemini bundle smoke test failed.'
        }

# Compensating evidence: caller-visible step name, stdout markers, explicit inputs,
# and generated output paths/artifacts preserve review evidence despite composite
# action grouping.
