name: Setup Python runtime
description: Checkout-dependent Python setup wrapper for DCOIR workflows.
inputs:
  python-version:
    description: Python version for actions/setup-python.
    required: false
    default: "3.11"
  emit-summary:
    description: Whether to emit caller-visible setup evidence.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Set up Python runtime
      uses: ./.github/actions/setup-workflow-runtime
      with:
        setup-python: "true"
        python-version: ${{ inputs.python-version }}
        emit-summary: ${{ inputs.emit-summary }}

# Compensating evidence: caller-visible step name, stdout markers, explicit inputs,
# and generated output paths/artifacts preserve review evidence despite composite
# action grouping.
