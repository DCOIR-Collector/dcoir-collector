name: Write ChatGPT report section
description: Create the standard chatgpt-workflow-report-section artifact payload for workflows that already own report content.
inputs:
  output-path:
    description: Path to write the report-section markdown file.
    required: false
    default: "chatgpt_workflow_report_section.md"
  title:
    description: Report section title.
    required: true
  body:
    description: Markdown body to write below the title.
    required: true
runs:
  using: composite
  steps:
    - name: Write report section markdown
      shell: bash
      env:
        OUTPUT_PATH: ${{ inputs.output-path }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import os
        import sys
        from pathlib import Path

        output_path = Path(os.environ["OUTPUT_PATH"])
        if output_path.is_absolute() or ".." in output_path.parts:
            print(f"Unsafe output-path for report section: {output_path}", file=sys.stderr)
            sys.exit(1)

        output_path.parent.mkdir(parents=True, exist_ok=True)
        output_path.write_text(
            f"## {os.environ['TITLE']}\n\n{os.environ['BODY']}\n",
            encoding="utf-8",
        )
        print(f"Wrote ChatGPT workflow report section: {output_path}")
        PY
# Compensating evidence: caller-visible step name, explicit output path in stdout,
# and the generated markdown file that later upload/report steps expose.
