name: Run PSScriptAnalyzer on collector source
description: >
  Run PSScriptAnalyzer against all collector PS1 source files and emit a
  dcoir_powershell_analyzer_report_v1 JSON report.  The report is written
  to the output-json path so the run-powershell-review-assist action can
  promote it from optional_missing to present_validated.
  Fails the step on any Error-severity finding.
inputs:
  output-json:
    description: Repo-relative path for the JSON report.
    required: false
    default: project_sources/collector/powershell_analyzer_report.json
  fail-on-error-severity:
    description: Exit non-zero when any Error-severity finding is found.
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Run PSScriptAnalyzer against collector source
      shell: pwsh
      env:
        PSSCRIPTANALYZER_OUTPUT_JSON: ${{ inputs.output-json }}
        FAIL_ON_ERROR_SEVERITY: ${{ inputs.fail-on-error-severity }}
        DCOIR_ACTION_SCRIPT: ${{ github.action_path }}/Invoke-DcoirPSScriptAnalyzer.ps1
      run: |
        $ErrorActionPreference = 'Stop'
        & $env:DCOIR_ACTION_SCRIPT
# Compensating evidence: step name, stdout severity breakdown, and generated JSON artifact
# preserve review evidence despite composite action grouping.
