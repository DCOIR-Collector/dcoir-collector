name: Upload ChatGPT artifact
description: Upload a standardized ChatGPT workflow artifact while keeping artifact names and retention visible at the caller.
inputs:
  name:
    description: Artifact name supplied by the caller workflow.
    required: true
  path:
    description: Artifact path supplied by the caller workflow.
    required: true
  retention-days:
    description: Retention days supplied by the caller workflow.
    required: false
    default: "7"
  if-no-files-found:
    description: Missing-file behavior supplied by the caller workflow. Preserve existing workflow behavior during migration.
    required: false
    default: "warn"
runs:
  using: composite
  steps:
    - name: Record artifact upload contract
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.name }}
        ARTIFACT_PATH: ${{ inputs.path }}
        RETENTION_DAYS: ${{ inputs.retention-days }}
        IF_NO_FILES_FOUND: ${{ inputs.if-no-files-found }}
      run: |
        set -euo pipefail
        printf 'artifact-name: %s\n' "$ARTIFACT_NAME"
        printf 'artifact-path: %s\n' "$ARTIFACT_PATH"
        printf 'retention-days: %s\n' "$RETENTION_DAYS"
        printf 'if-no-files-found: %s\n' "$IF_NO_FILES_FOUND"
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}
# Compensating evidence: caller supplies artifact name/path/retention explicitly,
# this action prints those values, and GitHub records the uploaded artifact.
