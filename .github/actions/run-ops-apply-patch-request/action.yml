name: Run ops apply-patch request
description: Resolve, apply, and clean up governed ops apply-patch requests.
inputs:
  operation:
    description: "Action operation to run: apply or cleanup."
    required: true
    default: apply
  caller-event-name:
    description: Original caller event name forwarded from the entry workflow.
    required: false
    default: workflow_call
  request-path:
    description: Repo-relative request JSON path for workflow_dispatch runs.
    required: false
    default: ops/requests/apply_patch/request/request.json
  default-branch:
    description: Repository default branch name.
    required: false
    default: main
  report-root:
    description: Parent directory for apply-patch report folders.
    required: false
    default: ops-apply-patch-report
  request-id:
    description: Request id to clean up after report upload.
    required: false
    default: ''
  request-dir:
    description: Repo-relative request directory to clean up after report upload.
    required: false
    default: ''
  request-source-ref:
    description: Branch that staged the request files.
    required: false
    default: ''
  report-dir:
    description: Report directory containing result.json for cleanup decisions.
    required: false
    default: ''
outputs:
  skip:
    description: Whether request processing was intentionally skipped.
    value: ${{ steps.resolve.outputs.skip }}
  request_path:
    description: Resolved repo-relative request JSON path.
    value: ${{ steps.resolve.outputs.request_path }}
  request_dir:
    description: Resolved repo-relative request directory.
    value: ${{ steps.resolve.outputs.request_dir }}
  request_id:
    description: Resolved request id.
    value: ${{ steps.resolve.outputs.request_id }}
  report_dir:
    description: Report directory for the resolved request.
    value: ${{ steps.resolve.outputs.report_dir }}
runs:
  using: composite
  steps:
    - name: Validate apply-patch action operation
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.operation }}" in
          apply|cleanup) ;;
          *)
            echo "operation must be apply or cleanup" >&2
            exit 1
            ;;
        esac

    - name: Resolve apply-patch request
      if: ${{ inputs.operation == 'apply' }}
      id: resolve
      shell: bash
      env:
        CALLER_EVENT_NAME: ${{ inputs.caller-event-name }}
        INPUT_REQUEST_PATH: ${{ inputs.request-path }}
        REPORT_ROOT: ${{ inputs.report-root }}
      run: |
        set -euo pipefail

        safe_request_path() {
          local p="$1"
          case "$p" in
            ops/requests/apply_patch/*/request.json) return 0 ;;
            *) return 1 ;;
          esac
        }

        if [[ "$CALLER_EVENT_NAME" == "workflow_dispatch" ]]; then
          REQUEST_PATH="$INPUT_REQUEST_PATH"
          if ! safe_request_path "$REQUEST_PATH"; then
            echo "request_path must match ops/requests/apply_patch/<request_id>/request.json" >&2
            exit 1
          fi
        else
          declare -A request_paths=()
          removed_request_path_count=0
          mapfile -t changed_records < <(
            python - "$GITHUB_EVENT_PATH" "$GITHUB_SHA" <<'PY'
import json
import pathlib
import subprocess
import sys

event_path = pathlib.Path(sys.argv[1])
head_sha = sys.argv[2]
zero_sha = "0" * 40
changed = {}


def add(status, path):
    if isinstance(path, str) and path:
        changed[path] = status


def add_name_status_line(line):
    parts = line.split("\t")
    if len(parts) < 2:
        return
    status = parts[0]
    if status.startswith(("R", "C")) and len(parts) >= 3:
        path = parts[2]
    else:
        path = parts[1]
    add(status, path)


try:
    event = json.loads(event_path.read_text(encoding="utf-8"))
except (OSError, json.JSONDecodeError):
    event = {}

for commit in event.get("commits", []):
    if not isinstance(commit, dict):
        continue
    for path in commit.get("added", []):
        add("A", path)
    for path in commit.get("modified", []):
        add("M", path)
    for path in commit.get("removed", []):
        add("D", path)

before = event.get("before")
after = event.get("after") or head_sha
if isinstance(before, str) and isinstance(after, str) and before and after and before != zero_sha:
    proc = subprocess.run(
        ["git", "diff", "--name-status", f"{before}..{after}"],
        check=False,
        text=True,
        stdout=subprocess.PIPE,
        stderr=subprocess.PIPE,
    )
    if proc.returncode == 0:
        for line in proc.stdout.splitlines():
            add_name_status_line(line)

if not changed:
    proc = subprocess.run(
        ["git", "diff-tree", "--no-commit-id", "--name-status", "-r", "-m", head_sha],
        check=False,
        text=True,
        stdout=subprocess.PIPE,
        stderr=subprocess.PIPE,
    )
    if proc.returncode == 0:
        for line in proc.stdout.splitlines():
            add_name_status_line(line)

for path in sorted(changed):
    print(f"{changed[path]}\t{path}")
PY
          )
          for record in "${changed_records[@]}"; do
            IFS=$'\t' read -r status changed _ <<< "$record"
            if [[ -z "${changed:-}" ]]; then
              continue
            fi
            case "$changed" in
              ops/requests/apply_patch/*/request.json)
                if [[ "$status" == D* ]]; then
                  removed_request_path_count=$((removed_request_path_count + 1))
                else
                  request_paths["$changed"]=1
                fi
                ;;
              ops/requests/apply_patch/*/*.patch|ops/requests/apply_patch/*/*.diff)
                if [[ "$status" == D* ]]; then
                  removed_request_path_count=$((removed_request_path_count + 1))
                else
                  request_paths["$(dirname "$changed")/request.json"]=1
                fi
                ;;
            esac
          done

          if [[ "${#request_paths[@]}" -eq 0 ]]; then
            if [[ "$removed_request_path_count" -gt 0 ]]; then
              echo "Only removed apply-patch request files were found; treating this as cleanup and skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$CALLER_EVENT_NAME" == "push" ]]; then
              echo "Apply-patch workflow was triggered by push, but no request path could be resolved from the push range." >&2
              exit 1
            fi
            echo "No apply-patch request found in triggering event; exiting successfully."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${#request_paths[@]}" -gt 1 ]]; then
            printf 'Only one apply-patch request may be staged per triggering commit. Found:\n' >&2
            printf '%s\n' "${!request_paths[@]}" >&2
            exit 1
          fi
          REQUEST_PATH="${!request_paths[@]}"
        fi

        if [[ ! -f "$REQUEST_PATH" ]]; then
          echo "Request file not found: $REQUEST_PATH" >&2
          exit 1
        fi
        REQUEST_ID="$(basename "$(dirname "$REQUEST_PATH")")"
        case "$REQUEST_ID" in
          *[!A-Za-z0-9._-]*|'')
            echo "Unsafe request id: $REQUEST_ID" >&2
            exit 1
            ;;
        esac
        REQUEST_DIR="$(dirname "$REQUEST_PATH")"
        REPORT_DIR="${REPORT_ROOT%/}/$REQUEST_ID"
        echo "request_path=$REQUEST_PATH" >> "$GITHUB_OUTPUT"
        echo "request_dir=$REQUEST_DIR" >> "$GITHUB_OUTPUT"
        echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "report_dir=$REPORT_DIR" >> "$GITHUB_OUTPUT"
        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Apply governed patch request
      if: ${{ inputs.operation == 'apply' && steps.resolve.outputs.skip != 'true' }}
      shell: bash
      env:
        REQUEST_PATH: ${{ steps.resolve.outputs.request_path }}
        DEFAULT_BRANCH: ${{ inputs.default-branch }}
        REPORT_DIR: ${{ steps.resolve.outputs.report_dir }}
      run: |
        set -euo pipefail
        mkdir -p "$REPORT_DIR"
        python ops/tools/apply_patch_request.py apply \
          --repo . \
          --request "$REQUEST_PATH" \
          --default-branch "$DEFAULT_BRANCH" \
          --report-dir "$REPORT_DIR"

    - name: Cleanup staged apply-patch request
      if: ${{ inputs.operation == 'cleanup' }}
      shell: bash
      env:
        REQUEST_DIR: ${{ inputs.request-dir }}
        REQUEST_ID: ${{ inputs.request-id }}
        REQUEST_SOURCE_REF: ${{ inputs.request-source-ref }}
        REPORT_DIR: ${{ inputs.report-dir }}
      run: |
        set -euo pipefail

        if [[ -z "$REQUEST_ID" || -z "$REQUEST_DIR" || -z "$REQUEST_SOURCE_REF" || -z "$REPORT_DIR" ]]; then
          echo "request-id, request-dir, request-source-ref, and report-dir are required for cleanup" >&2
          exit 1
        fi
        if [[ ! -f "$REPORT_DIR/result.json" ]]; then
          echo "Apply-patch result not found for cleanup decision: $REPORT_DIR/result.json" >&2
          exit 1
        fi

        should_cleanup="$(python - "$REPORT_DIR/result.json" <<'PY'
import json
import pathlib
import sys

result_path = pathlib.Path(sys.argv[1])
try:
    result = json.loads(result_path.read_text(encoding="utf-8"))
except (OSError, json.JSONDecodeError):
    print("false")
    raise SystemExit

print("true" if result.get("result") == "success" and result.get("mode") == "apply" else "false")
PY
        )"
        if [[ "$should_cleanup" != "true" ]]; then
          echo "Apply-patch request was not a successful apply operation; leaving request files for review."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git fetch --no-tags origin "refs/heads/$REQUEST_SOURCE_REF:refs/remotes/origin/$REQUEST_SOURCE_REF"
        git checkout -B ops-apply-patch-request-source "origin/$REQUEST_SOURCE_REF"
        if [[ ! -d "$REQUEST_DIR" ]]; then
          echo "Request directory is already absent: $REQUEST_DIR"
          exit 0
        fi

        rm -rf "$REQUEST_DIR"
        git add -A -- "$REQUEST_DIR"
        if git diff --cached --quiet -- "$REQUEST_DIR"; then
          echo "No staged request files needed cleanup."
          exit 0
        fi

        git commit -m "Clean applied ops patch request $REQUEST_ID [skip ci]"
        git push origin "HEAD:refs/heads/$REQUEST_SOURCE_REF"

# Compensating evidence: caller-visible step names, explicit inputs/outputs,
# generated result.json/workflow_report.md paths, target-branch commit output,
# and cleanup commit message preserve review evidence despite composite action
# grouping.
