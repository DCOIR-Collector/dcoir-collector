validated_observations:
  - Google-documented function calling and tool use separate model intent from actual execution; planner text, status text, and function-call payloads are request artifacts rather than proof that work already happened.
  - The safest truthful state model is four-layer: planned action, requested action, executed action, and returned result; only the executed-action layer should authorize completion claims.
  - Gemini Enterprise native assistant actions are gated by admin enablement, user authorization, and confirmation flows rather than being unconditional instant completions.
  - StreamAssist and ADK expose progress, terminal state, invocation identifiers, and result-linked evidence separately from planner or status narration.
  - Google-documented anti-fabrication patterns favor explicit small tool sets, structured outputs, clarifying questions, low-variance generation, and visibly provisional progress wording over fake completion narration.
actionable_findings_for_later_governed_updates:
  prompt_source_files:
    - Add an explicit boundary rule that planned, requested, or narrated actions are not the same as completed execution.
    - Add a four-state action language contract so prompt-source distinguishes planned action, requested action, executed action, and returned result.
    - Preserve native assistant-action gates such as awaiting authorization and awaiting confirmation instead of collapsing them into success wording.
    - Prefer provisional progress language and result-linked wording over "I'm doing X now" completion narration.
  validation_rows:
    - Add a claimed-versus-completed-action row that fails when Gemini narrates a search, lookup, retrieval, or delegated action without a real result-bearing completion state.
    - Add a state-collapse row that fails when planned or requested actions are phrased as executed or completed actions.
    - Add an enterprise-action-gating row that fails when connected-app actions skip authorization or confirmation language where those gates are still pending.
    - Add an observability-receipt row that checks for truthful terminal-state or result-linked wording instead of planner-step wording being treated as proof.
  runtime_only_tests:
    - Retest visible transitions from requested or in-progress wording to executed and returned-result wording in fresh sessions.
    - Retest native assistant-action examples and confirm user-facing wording preserves awaiting authorization, awaiting confirmation, success, failure, and skipped states honestly.
    - Retest whether any runtime-exposed invocation identifiers, tool-result references, or terminal-state markers can be surfaced cleanly without leaking internal scaffold.
false_hypotheses_to_avoid:
  - Do not claim that model-produced planner text or status text proves execution.
  - Do not treat function-call payload generation as the same thing as tool execution.
  - Do not assume Gemini Enterprise itself is the executor for every downstream action path.
  - Do not collapse authorization, confirmation, execution, and completion into one user-facing state.
  - Do not treat progress narration as a substitute for result-linked evidence.
operator_impact:
  - T3.9.3 is now durably preserved for later Gemini source, validation, and runtime-follow-through work without starting the broad governed sweep.
  - Future Gemini file updates can now consume this action-boundary batch alongside the already-stored enterprise-grounding and deterministic-output batches instead of relying on chat memory.
