validated_observations:
  - Google documents multiple Gemini and Vertex control surfaces, but does not publish a universal precedence hierarchy across assistant instructions, Agent Designer instructions, Answer API preambles, ADK instructions, memory, tools, and user prompts.
  - Vertex structured output is the clearest documented schema-constrained response contract in the stack and remains API-scoped rather than a documented Gemini Enterprise web/no-code guarantee.
  - Gemini Enterprise Answer API documents citations, support scores, rephrasing, query classification, follow-up sessions, filters, and boosts, but does not guarantee universal automatic rescue of narrow retrieval misses.
  - Connector and indexing limits can independently cause search misses, so retrieval failures are not safely attributable to planner quality alone.
  - Agent Engine provides the strongest documented session, execution-evidence, tracing, logging, monitoring, and code-path proof surfaces.
  - Gemini Enterprise web/no-code session semantics, response-envelope guarantees, and observability completeness remain materially less explicit than Agent Engine equivalents.
  - Memory is a real surface in both Gemini Enterprise and Agent Engine, but Agent Engine Memory Bank explicitly raises memory poisoning and prompt injection concerns.
false_hypotheses_to_avoid:
  - Do not claim a universal instruction-precedence model from public docs alone.
  - Do not claim exact response-envelope guarantees for Gemini Enterprise web/no-code agents based on Vertex structured-output docs.
  - Do not assume a narrow search miss will always be broadened or reformulated automatically.
  - Do not treat enterprise web observability as equivalent to Agent Engine runtime instrumentation.
  - Do not assume enterprise web/no-code session semantics are documented with the same rigor as Agent Engine sessions.
operator_impact:
  - Future Gemini design and validation work should consult both DR-2026-04-21-01 and DR-2026-04-21-02 findings in the same Airtable Gemini Research Reference layer.
  - DCOIR runtime-truthfulness, query-broadening, citation-discipline, and execution-evidence requirements should now default to test-first treatment on enterprise web/no-code paths.
  - The safest documented architecture split remains Gemini Enterprise for enterprise distribution and Agent Engine or ADK or Vertex surfaces for harder runtime guarantees.
