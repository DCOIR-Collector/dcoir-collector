  - Do not claim exact response-contract obedience, exact retrieval determinism, or exact planner precedence from public documentation alone.
  - Do not treat enterprise registration of a custom agent as proof that enterprise web safety settings fully cover the custom runtime path.
  - Do not rely on chat memory alone for future Gemini platform assumptions when the Airtable research reference table exists.
