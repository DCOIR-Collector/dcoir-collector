  - Treat retrieval, ranking, and query-planning behavior as only partially configurable and not fully deterministic from public documentation alone.
  - Treat universal instruction-precedence claims across assistant config, Agent Designer, ADK, tools, user prompts, and memory as unproven unless validated directly.
