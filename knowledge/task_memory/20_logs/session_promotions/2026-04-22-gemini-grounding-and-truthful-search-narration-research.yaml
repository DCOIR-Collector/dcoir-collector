validated_observations:
  - Treat public web grounding, enterprise or your-data grounding, and uploaded-file-only reasoning as distinct evidence lanes rather than one generic search capability.
  - Treat grounded citations and support objects as evidence-bearing outputs that should be preserved in narration rather than paraphrased away.
  - Treat tool and function proposals as non-executed until the application returns a real execution result or action-state receipt.
  - Treat truthful search and action narration as a staged control problem: decide whether grounding or a tool is needed, execute it, then narrate only from the returned evidence.
  - Treat exact UI-proof citation rendering, source highlighting, and action-state honesty in the deployed Gemini Enterprise surface as runtime-validation obligations even when the public documentation defines the intended evidence model.
false_hypotheses_to_avoid:
  - Do not claim that public citations prove enterprise connector search occurred.
  - Do not collapse Google Search grounding, Vertex AI Search grounding, and uploaded-file reasoning into the same operator-facing wording.
  - Do not treat structured status fields or tool-call proposals as proof that a search or action already completed.
  - Do not promote doc-aligned but unobserved UI evidence behavior into unconditional runtime claims.
operator_impact:
  - Later governed Gemini prompt-source edits should add source-lane honesty, evidence-gated completion wording, and explicit plan-then-execute-then-narrate sequencing.
  - Later Gemini validation updates should add claimed-versus-completed search and action checks, citation/support-evidence checks, and no-fake-enterprise-search checks when only uploads or public grounding were used.
  - Later runtime-only testing should verify exact citation rendering, source highlighting, public-grounding receipts, and action-state honesty in fresh sessions.
