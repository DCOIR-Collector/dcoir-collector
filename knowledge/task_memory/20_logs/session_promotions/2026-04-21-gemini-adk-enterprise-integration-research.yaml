validated_observations:
  - Gemini Enterprise is the discovery, sharing, and web-app access layer for surfaced ADK agents, while Vertex AI Agent Engine remains the runtime that processes the agent queries.
  - Gemini Enterprise registration supports explicit authorizationConfig toolAuthorizations for delegated access, rather than implicit user-delegated authority.
  - Google does not document whether custom Agent Engine operations beyond the default conversational path are reachable through the Gemini Enterprise surfaced path.
  - Google does not document how Gemini Enterprise sessions map to Agent Engine Sessions for a surfaced ADK conversation.
  - Registered ADK agents receive the user's email from Gemini Enterprise, but the exact field-level mapping into ADK code is undocumented.
  - Gemini Enterprise Model Armor does not automatically protect registered ADK agents; runtime-local configuration remains required.
  - Gemini Enterprise observability is useful at the app layer, but Agent Engine and downstream logs remain the stronger evidence plane for proving execution.
  - Google does not document generic user-facing execution receipts, universal action confirmations, or surfaced citation fidelity guarantees for registered ADK-agent answers in the Gemini Enterprise web UI.
false_hypotheses_to_avoid:
  - Do not claim Gemini Enterprise itself executes surfaced ADK-agent logic.
  - Do not assume surfaced custom Agent Engine operations are available in the Gemini Enterprise web app without direct testing.
  - Do not assume enterprise UI traces, invocationTools, or tool counts are full proof of downstream execution.
  - Do not assume enterprise UI confirmation flows exist for surfaced ADK-agent actions just because native assistant actions document them.
  - Do not assume citation or source-attribution fidelity for surfaced ADK-agent answers without direct validation.
operator_impact:
  - Future Gemini design and validation work should consult all three deep-research batches in the same Airtable Gemini Research Reference layer.
  - DCOIR designs that depend on strong execution proof, runtime-local safety, session mapping, or user-facing evidence should default to Agent Engine-side instrumentation and validation for this path.
  - The registered-ADK-in-Gemini-Enterprise path now has a specific must-test set beyond the earlier generic Gemini behavior and control findings.
