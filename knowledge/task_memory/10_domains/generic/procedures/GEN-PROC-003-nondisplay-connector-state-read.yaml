record_id: GEN-PROC-003
domain: generic
record_type: procedure
operation: nondisplay_connector_state_read
object_type: interactive_connector_table_surface
problem_signature: when connector-backed startup or status work only needs state, routing, or summary information, prefer non-display retrieval paths and avoid rendering visible connector tables unless the operator explicitly asks or approves
primary_lane: silent_read_first_then_ask_before_display
preconditions:
  - the task only needs connector-backed state, routing, or summary information
  - a non-display connector read path exists for the needed state
  - the operator did not explicitly ask to see the connector table or board
step_sequence:
  - step: classify_information_need
    action: reasoning
    purpose: decide whether the task needs only state or summary information instead of operator-facing table inspection
  - step: choose_non_display_read
    action: reasoning
    purpose: select a connector function or lane that returns the needed state without rendering an interactive table
  - step: read_minimum_required_state
    action: fetch_file
    purpose: retrieve only the connector-backed state needed to decide the next move or answer the status question
  - step: summarize_without_rendering
    action: reasoning
    purpose: report the result in normal chat text instead of surfacing a connector table by default
  - step: ask_before_display
    action: reasoning
    purpose: ask the operator first if a visible connector table might help and only render it after explicit approval
verification_steps:
  - confirm the retrieved state is sufficient before considering any visible connector display
  - if the available non-display path cannot answer the question, say that plainly and ask before using a visible table-rendering path
anti_patterns:
  - do not use visible connector table rendering as the default state-read path
  - do not treat "might help" as permission to render a connector table
  - do not render a full connector table when a short state summary is enough
fallbacks:
  - GH-PROC-007
  - GH-PROC-008
last_validated: 2026-04-17
confidence: medium
