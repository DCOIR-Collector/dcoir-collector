record_id: GH-PROC-005
domain: github
record_type: procedure
operation: post_write_verification
object_type: repo_state
problem_signature: any GitHub write must be verified before work proceeds
primary_lane: direct_readback_verification
step_sequence:
  - step: fetch_updated_path
    action: fetch_file on main for the exact path changed
  - step: compare_content
    action: confirm file content matches intended result
  - step: verify_authority_files
    action: if structural change occurred, verify manifest/change-log/layout docs
  - step: verify_queue_state
    action: if continuity-critical work was queued, verify the handoff or follow-up file
anti_patterns:
  - do not stop at commit success
  - do not verify against assumptions or stale local content
