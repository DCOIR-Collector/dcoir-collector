record_id: GH-PROC-001
domain: github
record_type: procedure
operation: existing_file_update
object_type: governed_readable_text
problem_signature: existing file must be updated reliably in GitHub connector workflow
primary_lane: low_level_git_object_flow
preconditions:
  - repository and path are known
  - replacement content is fully prepared before write
  - current ref is known or treated as main
step_sequence:
  - step: read_live_state
    action: fetch_file
    purpose: confirm current path, content, and that the target exists
  - step: prepare_replacement
    action: generate exact replacement content locally
    purpose: avoid partial edit drift
  - step: resolve_head_sha
    action: compare_commits
    purpose: recover the current head commit sha when it is needed for parent_sha or base_tree_sha
    note: compare_commits with base=main and head=main was accepted as a reliable way to recover current head sha when fetch_commit was flaky upstream
  - step: create_blob
    action: create_blob
    purpose: create immutable content object for replacement text
  - step: create_tree
    action: create_tree
    purpose: attach replacement blob to target path
    note: in this connector workflow the current head commit sha was repeatedly accepted as base_tree_sha
  - step: create_commit
    action: create_commit
    purpose: point a new commit at the replacement tree
  - step: move_ref
    action: update_ref
    purpose: move main to the new commit
  - step: verify
    action: fetch_file
    purpose: confirm the exact file content on main after the write
verification_steps:
  - fetch_file on the exact target path from main
  - compare content, not just commit success
  - if structural change occurred, also verify impacted control-plane docs
anti_patterns:
  - do not assume create_file is reliable for existing-file updates
  - do not treat commit creation alone as success
  - do not continue with dependent work before readback succeeds
known_good_signatures:
  - compare_commits base=head=main returned current head sha
  - create_tree accepted replacement path and blob
  - create_commit returned new sha
  - update_ref returned success true
  - fetch_file returned updated content from main
fallbacks:
  - GH-PROC-004
  - GH-PROC-005
last_validated: 2026-04-02
confidence: high
