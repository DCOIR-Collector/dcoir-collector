schema_version: 1
memory_bank_id: dcoir-task-memory-bank
storage_mode: github_canonical_with_compiled_indexes
root_path: knowledge/task_memory
canonical_read_order:
  - knowledge/task_memory/00_registry/task_memory_manifest.yaml
  - knowledge/task_memory/30_compiled/fast_lookup.json
  - knowledge/task_memory/00_registry/alias_map.yaml
  - knowledge/task_memory/00_registry/failure_signature_index.yaml
record_types:
  procedure:
    path_glob: knowledge/task_memory/10_domains/**/procedures/*.yaml
    purpose: exact repeatable task execution methods
  limitation:
    path_glob: knowledge/task_memory/10_domains/**/limitations/*.yaml
    purpose: connector or tool capability boundaries
  failure_signature:
    path_glob: knowledge/task_memory/10_domains/**/failure_signatures/*.yaml
    purpose: if-seen-then-do mappings
  session_promotion:
    path_glob: knowledge/task_memory/20_logs/session_promotions/*.yaml
    purpose: promoted session lessons and deltas
retrieval_policy:
  default_domain_order:
    - github
    - generic
  disambiguation_keys:
    - domain
    - operation
    - object_type
    - problem_signature
    - tool
  verification_required: true
update_policy:
  preserve_canonical_records: true
  update_compiled_indexes_after_record_changes: true
  store_false_hypotheses_explicitly: true
  promote_validated_session_lessons: true
current_priority_records:
  - GH-PROC-001
  - GH-PROC-002
  - GH-PROC-003
  - GH-PROC-004
  - GH-PROC-005
  - GH-PROC-006
  - GH-PROC-007
  - GH-PROC-008
  - GH-LIM-001
  - GH-LIM-002
  - GH-FSIG-001
  - GH-FSIG-002
  - GEN-PROC-001
  - GEN-PROC-002
  - SP-2026-04-01-GH
notes:
  - GitHub is the canonical storage substrate for this memory bank.
  - Compiled indexes are acceleration layers, not sources of truth.
  - When in doubt, prefer canonical procedure records over chat memory.
  - Governed GitHub connector reference material lives under knowledge/github_connector_reference and should be mined into canonical task memory when durable patterns are validated.
