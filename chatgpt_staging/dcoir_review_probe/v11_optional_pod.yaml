apiVersion: v1
kind: Pod
metadata:
  name: dcoir-review-v11-pressure
spec:
  hostNetwork: true
  containers:
    - name: collector
      image: alpine:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
