apiVersion: v1
kind: Pod
metadata:
  name: dcoir-v14-optional
spec:
  hostNetwork: true
  hostPID: true
  containers:
    - name: worker
      image: alpine:3.20
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
