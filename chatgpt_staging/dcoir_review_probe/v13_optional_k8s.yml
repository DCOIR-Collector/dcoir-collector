apiVersion: v1
kind: Pod
metadata:
  name: dcoir-v13-pressure
spec:
  hostPID: true
  containers:
    - name: probe
      image: busybox:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
