apiVersion: v1
kind: Pod
metadata:
  name: v13-optional-pressure
spec:
  hostPID: true
  hostNetwork: true
  containers:
    - name: collector
      image: example.invalid/collector:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
