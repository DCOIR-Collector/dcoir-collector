apiVersion: v1
kind: Pod
metadata:
  name: dcoir-review-probe
spec:
  hostPID: true
  containers:
    - name: collector
      image: example.invalid/dcoir/probe:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
