apiVersion: v1
kind: Pod
metadata:
  name: dcoir-review-privileged-pressure
spec:
  containers:
    - name: collector
      image: busybox
      securityContext:
        privileged: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
